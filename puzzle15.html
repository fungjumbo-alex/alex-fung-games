<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15 Puzzle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; color: #fff; }
        h1 { margin-bottom: 10px; }
        .info { margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(4, 70px); gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        .tile { width: 70px; height: 70px; background: rgba(255,255,255,0.9); border: none; border-radius: 8px; font-size: 1.8em; font-weight: bold; color: #11998e; cursor: pointer; transition: all 0.15s; }
        .tile:hover { transform: scale(1.05); }
        .tile.empty { background: transparent; cursor: default; }
        button { margin-top: 15px; padding: 10px 25px; font-size: 14px; border: none; border-radius: 8px; background: #fff; color: #11998e; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;">← Back</a>
    <h1>🧩 15 Puzzle</h1>
    <div class="info">Moves: <b id="moves">0</b></div>
    <div class="grid" id="grid"></div>
    <button onclick="init()">Shuffle</button>
    <script>
        let tiles, empty, moves;

        function init() {
            tiles = [...Array(15).keys()].map(i => i + 1);
            tiles.push(null);
            empty = 15;
            moves = 0;
            document.getElementById('moves').textContent = 0;
            shuffle();
            render();
        }

        function shuffle() {
            for (let i = 0; i < 200; i++) {
                const neighbors = getNeighbors(empty);
                const rand = neighbors[Math.floor(Math.random() * neighbors.length)];
                swap(rand);
            }
            moves = 0;
            document.getElementById('moves').textContent = 0;
        }

        function getNeighbors(i) {
            const n = [];
            if (i % 4 > 0) n.push(i - 1);
            if (i % 4 < 3) n.push(i + 1);
            if (i > 3) n.push(i - 4);
            if (i < 12) n.push(i + 4);
            return n;
        }

        function swap(i) {
            tiles[empty] = tiles[i];
            tiles[i] = null;
            empty = i;
        }

        function click(i) {
            if (getNeighbors(empty).includes(i)) {
                swap(i);
                moves++;
                document.getElementById('moves').textContent = moves;
                render();
                if (checkWin()) setTimeout(() => alert(`🎉 Solved in ${moves} moves!`), 100);
            }
        }

        function checkWin() {
            for (let i = 0; i < 15; i++) {
                if (tiles[i] !== i + 1) return false;
            }
            return true;
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            tiles.forEach((t, i) => {
                const el = document.createElement('button');
                el.className = 'tile' + (t === null ? ' empty' : '');
                el.textContent = t || '';
                el.onclick = () => click(i);
                grid.appendChild(el);
            });
        }

        init();
    </script>
</body>
</html>
