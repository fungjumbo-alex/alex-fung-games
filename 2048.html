<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
            padding: 10px;
        }

        .container {
            text-align: center;
            padding: 10px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #776e65;
            font-size: 60px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: #bbada0;
            padding: 10px 25px;
            border-radius: 6px;
            color: white;
            min-width: 100px;
        }

        .score-box .label {
            font-size: 13px;
            text-transform: uppercase;
            color: #eee4da;
        }

        .score-box .value {
            font-size: 25px;
            font-weight: 700;
        }

        .game-container {
            position: relative;
            margin-top: 20px;
        }

        .grid-container {
            background: #bbada0;
            border-radius: 6px;
            padding: 10px;
            position: relative;
            display: inline-block;
            margin: 0 auto;
        }

        .grid-background {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grid-cell {
            width: 75px;
            height: 75px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tiles-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
        }

        .tile {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 35px;
            transition: top 0.15s ease-in-out, left 0.15s ease-in-out;
            z-index: 10;
        }

        .tile-new {
            animation: appear 0.2s ease-in-out;
        }

        .tile-merged {
            animation: pop 0.2s ease-in-out;
            z-index: 20;
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Tile colors */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 40px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 40px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 40px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 35px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 35px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 30px; }

        .game-message {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            border-radius: 6px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-message.active {
            display: flex;
            animation: fade-in 0.3s ease-in-out;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .game-message p {
            font-size: 40px;
            font-weight: 700;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message.game-won p {
            color: #f9f6f2;
        }

        .game-message.game-won {
            background: rgba(237, 194, 46, 0.5);
        }

        .btn {
            background: #8f7a66;
            border: none;
            border-radius: 6px;
            color: #f9f6f2;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin: 5px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #9f8b77;
        }

        .controls {
            margin-top: 20px;
        }

        .instructions {
            margin-top: 20px;
            color: #776e65;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .grid-cell, .tile {
                width: 70px;
                height: 70px;
            }
            
            .grid-background {
                gap: 10px;
            }
            
            .grid-container {
                padding: 10px;
            }
            
            .tiles-container {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
            }
            
            h1 {
                font-size: 40px;
            }
            
            .tile {
                font-size: 35px;
            }
            
            .tile-128, .tile-256, .tile-512 {
                font-size: 30px;
            }
            
            .tile-1024, .tile-2048, .tile-super {
                font-size: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        
        <div class="score-container">
            <div class="score-box">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">Best</div>
                <div class="value" id="best-score">0</div>
            </div>
        </div>

        <div class="game-container">
            <div class="grid-container">
                <div class="grid-background">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="tiles-container" id="tiles-container"></div>
            </div>
            
            <div class="game-message" id="game-message">
                <p id="message-text">Game Over!</p>
                <button class="btn" onclick="game.restart()">Try Again</button>
                <button class="btn" id="keep-playing-btn" onclick="game.keepPlaying()" style="display: none;">Keep Playing</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="game.restart()">New Game</button>
        </div>

        <p class="instructions">
            Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles. Combine matching numbers to reach <strong>2048</strong>!
        </p>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.gridSize = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
                this.gameOver = false;
                this.won = false;
                this.keepPlaying = false;
                this.tileId = 0;
                this.gameStarted = false;

                this.init();
            }

            init() {
                this.grid = Array(this.gridSize).fill(null).map(() => Array(this.gridSize).fill(null));
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.keepPlaying = false;
                this.tileId = 0;
                this.gameStarted = false;

                this.updateScore();
                this.addRandomTile();
                this.addRandomTile();
                this.render();
                this.hideMessage();
                
                this.setupInputHandlers();
            }

            restart() {
                if (this.gameStarted && !confirm('Game is in progress. Start a new game? Current progress will be lost.')) return;
                this.init();
            }

            keepPlaying() {
                this.keepPlaying = true;
                this.hideMessage();
            }

            setupInputHandlers() {
                // Keyboard
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        this.handleInput(e.key.replace('Arrow', '').toLowerCase());
                    }
                });

                // Touch
                let startX, startY;
                const threshold = 30;

                document.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                });

                document.addEventListener('touchend', (e) => {
                    if (!startX || !startY) return;

                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const diffX = endX - startX;
                    const diffY = endY - startY;

                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (Math.abs(diffX) > threshold) {
                            this.handleInput(diffX > 0 ? 'right' : 'left');
                        }
                    } else {
                        if (Math.abs(diffY) > threshold) {
                            this.handleInput(diffY > 0 ? 'down' : 'up');
                        }
                    }

                    startX = null;
                    startY = null;
                });
            }

            handleInput(direction) {
                if (this.gameOver || (this.won && !this.keepPlaying)) return;

                const moved = this.move(direction);
                
                if (moved) {
                    this.gameStarted = true;
                    this.addRandomTile();
                    this.render();
                    
                    if (this.checkWin() && !this.keepPlaying) {
                        this.showWin();
                    } else if (this.checkGameOver()) {
                        this.showGameOver();
                    }
                }
            }

            move(direction) {
                let moved = false;
                const mergedPositions = [];

                const processLine = (line) => {
                    // Remove nulls
                    let tiles = line.filter(t => t !== null);
                    let result = [];
                    let merged = [];

                    for (let i = 0; i < tiles.length; i++) {
                        if (i < tiles.length - 1 && tiles[i].value === tiles[i + 1].value) {
                            const newValue = tiles[i].value * 2;
                            result.push({ value: newValue, merged: true });
                            this.score += newValue;
                            merged.push(result.length - 1);
                            i++; // Skip next tile
                        } else {
                            result.push({ value: tiles[i].value, merged: false });
                        }
                    }

                    // Pad with nulls
                    while (result.length < this.gridSize) {
                        result.push(null);
                    }

                    return { result, merged };
                };

                const getLine = (index, isRow, reverse) => {
                    let line = [];
                    for (let i = 0; i < this.gridSize; i++) {
                        const pos = reverse ? this.gridSize - 1 - i : i;
                        const tile = isRow ? this.grid[index][pos] : this.grid[pos][index];
                        line.push(tile);
                    }
                    return line;
                };

                const setLine = (index, line, isRow, reverse, merged) => {
                    for (let i = 0; i < this.gridSize; i++) {
                        const pos = reverse ? this.gridSize - 1 - i : i;
                        const tileData = line[i];
                        
                        if (tileData) {
                            const r = isRow ? index : pos;
                            const c = isRow ? pos : index;
                            
                            if (this.grid[r][c]?.value !== tileData.value) {
                                moved = true;
                            }
                            
                            this.grid[r][c] = {
                                value: tileData.value,
                                id: this.grid[r][c]?.id || this.tileId++,
                                merged: tileData.merged
                            };
                            
                            if (tileData.merged) {
                                mergedPositions.push({ r, c });
                            }
                        } else {
                            if (this.grid[isRow ? index : pos][isRow ? pos : index] !== null) {
                                moved = true;
                            }
                            this.grid[isRow ? index : pos][isRow ? pos : index] = null;
                        }
                    }
                };

                const isRow = direction === 'left' || direction === 'right';
                const reverse = direction === 'right' || direction === 'down';

                for (let i = 0; i < this.gridSize; i++) {
                    const line = getLine(i, isRow, reverse);
                    const { result, merged } = processLine(line);
                    setLine(i, result, isRow, reverse, merged);
                }

                if (moved) {
                    this.updateScore();
                }

                return moved;
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.grid[r][c]) {
                            emptyCells.push({ r, c });
                        }
                    }
                }

                if (emptyCells.length > 0) {
                    const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[r][c] = {
                        value: Math.random() < 0.9 ? 2 : 4,
                        id: this.tileId++,
                        isNew: true
                    };
                }
            }

            checkWin() {
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c]?.value === 2048) {
                            this.won = true;
                            return true;
                        }
                    }
                }
                return false;
            }

            checkGameOver() {
                // Check for empty cells
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (!this.grid[r][c]) return false;
                    }
                }

                // Check for possible merges
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        const current = this.grid[r][c].value;
                        if (c < this.gridSize - 1 && this.grid[r][c + 1].value === current) return false;
                        if (r < this.gridSize - 1 && this.grid[r + 1][c].value === current) return false;
                    }
                }

                this.gameOver = true;
                return true;
            }

            updateScore() {
                document.getElementById('score').textContent = this.score;
                
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('bestScore2048', this.bestScore);
                }
                document.getElementById('best-score').textContent = this.bestScore;
            }

            render() {
                const container = document.getElementById('tiles-container');
                container.innerHTML = '';

                const cellSize = container.offsetWidth / this.gridSize;
                const gap = 10;
                const tileSize = (container.offsetWidth - gap * (this.gridSize - 1)) / this.gridSize;

                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        const tile = this.grid[r][c];
                        if (tile) {
                            const tileElement = document.createElement('div');
                            tileElement.className = `tile tile-${tile.value > 2048 ? 'super' : tile.value}`;
                            
                            if (tile.isNew) {
                                tileElement.classList.add('tile-new');
                                tile.isNew = false;
                            }
                            
                            if (tile.merged) {
                                tileElement.classList.add('tile-merged');
                                tile.merged = false;
                            }
                            
                            tileElement.textContent = tile.value;
                            tileElement.style.top = `${r * (tileSize + gap)}px`;
                            tileElement.style.left = `${c * (tileSize + gap)}px`;
                            tileElement.style.width = `${tileSize}px`;
                            tileElement.style.height = `${tileSize}px`;
                            tileElement.style.fontSize = tile.value >= 1024 ? '30px' : tile.value >= 128 ? '35px' : '45px';
                            
                            container.appendChild(tileElement);
                        }
                    }
                }
            }

            showMessage(text, isWin) {
                const messageEl = document.getElementById('game-message');
                const textEl = document.getElementById('message-text');
                const keepPlayingBtn = document.getElementById('keep-playing-btn');
                
                textEl.textContent = text;
                messageEl.classList.add('active');
                
                if (isWin) {
                    messageEl.classList.add('game-won');
                    keepPlayingBtn.style.display = 'inline-block';
                } else {
                    messageEl.classList.remove('game-won');
                    keepPlayingBtn.style.display = 'none';
                }
            }

            hideMessage() {
                document.getElementById('game-message').classList.remove('active');
            }

            showGameOver() {
                this.showMessage('Game Over!', false);
            }

            showWin() {
                this.showMessage('You Win!', true);
            }
        }

        const game = new Game2048();
    </script>

</html>
