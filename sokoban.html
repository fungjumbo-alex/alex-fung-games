<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>📦 Sokoban</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        a.back-link { color: #888; text-decoration: none; font-size: 14px; margin-bottom: 5px; }
        h1 { font-size: 1.5em; margin-bottom: 5px; }
        .info { display: flex; gap: 20px; margin-bottom: 10px; font-size: 0.9em; }
        .info span { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 8px; }
        canvas { border-radius: 8px; touch-action: none; max-width: 95vw; max-height: 55vh; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 3px; margin-top: 10px; }
        .row { display: flex; gap: 3px; }
        .btn { width: 56px; height: 56px; border: none; border-radius: 12px; font-size: 1.4em; background: rgba(255,255,255,0.15); color: #fff; touch-action: manipulation; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: rgba(255,255,255,0.3); }
        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .actions .btn { width: auto; padding: 0 16px; font-size: 0.9em; height: 40px; }
        .levels { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
        .levels .btn { width: 40px; height: 40px; font-size: 0.8em; }
        .levels .btn.active { background: #4a90d9; }
        .win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10; align-items: center; justify-content: center; }
        .win-overlay.show { display: flex; }
        .win-box { background: #2a2a4e; padding: 30px; border-radius: 15px; text-align: center; }
        .win-box h2 { color: #f1c40f; margin-bottom: 10px; }
        .win-box p { margin-bottom: 15px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back</a>
    <h1>📦 Sokoban</h1>
    <div class="info">
        <span id="level">Level 1</span>
        <span id="moves">Moves: 0</span>
        <span id="pushes">Pushes: 0</span>
    </div>
    <canvas id="game"></canvas>
    <div class="controls">
        <div class="row"><div class="btn" data-dir="up">▲</div></div>
        <div class="row">
            <div class="btn" data-dir="left">◀</div>
            <div class="btn" data-dir="down">▼</div>
            <div class="btn" data-dir="right">▶</div>
        </div>
    </div>
    <div class="actions">
        <div class="btn" onclick="undo()">↩ Undo</div>
        <div class="btn" onclick="restart()">🔄 Restart</div>
    </div>
    <div class="levels" id="levels"></div>
    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2>🎉 Level Complete!</h2>
            <p id="winMsg"></p>
            <div class="btn" style="margin:0 auto;padding:0 20px;" onclick="nextLevel()">Next Level →</div>
        </div>
    </div>
    <script>
    const LEVELS = [
        { map: ["#####","#.  #","# $ #","#@  #","#####"] },
        { map: ["######","#.   #","#  $ #","# @$ #","# .  #","######"] },
        { map: ["#######","#     #","# .$. #","#  $  #","# .$. #","#  @  #","#######"] },
        { map: ["######","#    #","# $# #","#  $.#","# @$.#","#  . #","######"] },
        { map: ["#####","#.  #","#  $#","#@$ #","#.  #","#####"] },
        { map: [" ####","##  #","# $.#","# $.#","# @ #","######"] },
        { map: ["#######","#  .  #","# #.# #","#  $  #","# $$$ #","#  .@ #","#######"] },
        { map: ["#######","#     #","#.$$  #","# $.# #","#  .$ #","# @   #","#######"] },
        { map: ["########","#      #","# .$$. #","#  ##  #","# .$$. #","#  @   #","########"] },
        { map: ["#########","#       #","# .$.$. #","#  ###  #","# .$.$. #","#   @   #","#########"] },
    ];
    const CELL = 48;
    const COLORS = { wall: '#4a5568', floor: '#2d3748', target: '#e53e3e', box: '#ecc94b', boxDone: '#48bb78', player: '#4299e1' };

    let currentLevel = 0, map, player, boxes, targets, history, moves, pushes, won;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function loadLevel(n) {
        currentLevel = n;
        const lv = LEVELS[n];
        map = lv.map.map(r => r.split(''));
        boxes = []; targets = []; history = []; moves = 0; pushes = 0; won = false;
        for (let y = 0; y < map.length; y++)
            for (let x = 0; x < map[y].length; x++) {
                if (map[y][x] === '@') { player = {x,y}; map[y][x] = ' '; }
                if (map[y][x] === '$') { boxes.push({x,y}); map[y][x] = ' '; }
                if (map[y][x] === '.') targets.push({x,y});
                if (map[y][x] === '*') { boxes.push({x,y}); targets.push({x,y}); map[y][x] = ' '; }
                if (map[y][x] === '+') { player = {x,y}; targets.push({x,y}); map[y][x] = ' '; }
            }
        resizeCanvas();
        draw();
        updateUI();
    }

    function resizeCanvas() {
        const w = map[0].length * CELL, h = map.length * CELL;
        canvas.width = w; canvas.height = h;
    }

    function isWall(x,y) { return y < 0 || y >= map.length || x < 0 || x >= map[y].length || map[y][x] === '#'; }
    function boxAt(x,y) { return boxes.findIndex(b => b.x === x && b.y === y); }

    function move(dx, dy) {
        if (won) return;
        const nx = player.x + dx, ny = player.y + dy;
        if (isWall(nx, ny)) return;
        const bi = boxAt(nx, ny);
        if (bi >= 0) {
            const bx = nx + dx, by = ny + dy;
            if (isWall(bx, by) || boxAt(bx, by) >= 0) return;
            history.push({px: player.x, py: player.y, bi, bx: boxes[bi].x, by: boxes[bi].y});
            boxes[bi].x = bx; boxes[bi].y = by;
            player.x = nx; player.y = ny;
            moves++; pushes++;
        } else {
            history.push({px: player.x, py: player.y, bi: -1, bx: 0, by: 0});
            player.x = nx; player.y = ny;
            moves++;
        }
        checkWin();
        draw();
        updateUI();
    }

    function undo() {
        if (!history.length) return;
        const h = history.pop();
        player.x = h.px; player.y = h.py;
        if (h.bi >= 0) { boxes[h.bi].x = h.bx; boxes[h.bi].y = h.by; pushes--; }
        moves--;
        won = false;
        draw(); updateUI();
    }

    function restart() { loadLevel(currentLevel); }

    function checkWin() {
        if (targets.every(t => boxAt(t.x, t.y) >= 0)) {
            won = true;
            document.getElementById('winMsg').textContent = `Moves: ${moves}, Pushes: ${pushes}`;
            document.getElementById('winOverlay').classList.add('show');
        }
    }

    function nextLevel() {
        document.getElementById('winOverlay').classList.remove('show');
        if (currentLevel < LEVELS.length - 1) loadLevel(currentLevel + 1);
    }

    function draw() {
        ctx.fillStyle = COLORS.floor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let y = 0; y < map.length; y++)
            for (let x = 0; x < map[y].length; x++) {
                if (map[y][x] === '#') {
                    ctx.fillStyle = COLORS.wall;
                    ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
                    ctx.fillStyle = '#5a6578';
                    ctx.fillRect(x*CELL+2, y*CELL+2, CELL-4, CELL-4);
                }
            }
        targets.forEach(t => {
            ctx.fillStyle = COLORS.target;
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.arc(t.x*CELL+CELL/2, t.y*CELL+CELL/2, CELL/3, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.strokeStyle = COLORS.target;
            ctx.lineWidth = 2;
            ctx.stroke();
        });
        boxes.forEach(b => {
            const onTarget = targets.some(t => t.x === b.x && t.y === b.y);
            ctx.fillStyle = onTarget ? COLORS.boxDone : COLORS.box;
            roundRect(b.x*CELL+4, b.y*CELL+4, CELL-8, CELL-8, 6);
            ctx.fill();
            ctx.strokeStyle = onTarget ? '#38a169' : '#d69e2e';
            ctx.lineWidth = 2;
            roundRect(b.x*CELL+4, b.y*CELL+4, CELL-8, CELL-8, 6);
            ctx.stroke();
            ctx.fillStyle = onTarget ? '#276749' : '#975a16';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('📦', b.x*CELL+CELL/2, b.y*CELL+CELL/2);
        });
        ctx.fillStyle = COLORS.player;
        ctx.beginPath();
        ctx.arc(player.x*CELL+CELL/2, player.y*CELL+CELL/2, CELL/2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🧑', player.x*CELL+CELL/2, player.y*CELL+CELL/2);
    }

    function roundRect(x,y,w,h,r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

    function updateUI() {
        document.getElementById('level').textContent = `Level ${currentLevel+1}`;
        document.getElementById('moves').textContent = `Moves: ${moves}`;
        document.getElementById('pushes').textContent = `Pushes: ${pushes}`;
    }

    // Build level selector
    const levDiv = document.getElementById('levels');
    LEVELS.forEach((_, i) => {
        const b = document.createElement('div');
        b.className = 'btn' + (i === 0 ? ' active' : '');
        b.textContent = i + 1;
        b.onclick = () => {
            document.querySelectorAll('.levels .btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            loadLevel(i);
        };
        levDiv.appendChild(b);
    });

    // Controls
    document.querySelectorAll('.controls .btn').forEach(b => {
        const dir = b.dataset.dir;
        const dirs = { up: [0,-1], down: [0,1], left: [-1,0], right: [1,0] };
        b.addEventListener('touchstart', e => { e.preventDefault(); move(...dirs[dir]); });
        b.addEventListener('click', () => move(...dirs[dir]));
    });

    // Keyboard
    document.addEventListener('keydown', e => {
        const km = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0], w: [0,-1], s: [0,1], a: [-1,0], d: [1,0] };
        if (km[e.key]) { e.preventDefault(); move(...km[e.key]); }
        if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
    });

    // Swipe
    let tx, ty;
    canvas.addEventListener('touchstart', e => { e.preventDefault(); tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
    canvas.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
        if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : -1, 0);
        else move(0, dy > 0 ? 1 : -1);
    });

    loadLevel(0);
    </script>
</body>
</html>
