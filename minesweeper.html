<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #fff;
            touch-action: manipulation;
        overflow-x:hidden;}
        h1 { margin-bottom: 10px; font-size: 1.8em; }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 14px;
            font-size: 13px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4a90d9;
            color: white;
            transition: all 0.2s;
        outline:none;}}
        button:hover { background: #357abd; }
        button:active { transform: scale(0.95); }
        button.active { background: #28a745; }
        #btn-flag { background: #f39c12; }
        #btn-flag.active { background: #e74c3c; }
        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .info span { display: flex; align-items: center; gap: 5px; }
        #board {
            display: grid;
            gap: 2px;
            background: #2a2a4a;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }
        .cell {
            width: 32px;
            height: 32px;
            background: #4a4a6a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .cell:active { transform: scale(0.9); }
        .cell.revealed {
            background: #3a3a5a;
            cursor: default;
        }
        .cell.mine { background: #e74c3c; }
        .cell.flagged { background: #f39c12; }
        .cell[data-num="1"] { color: #3498db; }
        .cell[data-num="2"] { color: #27ae60; }
        .cell[data-num="3"] { color: #e74c3c; }
        .cell[data-num="4"] { color: #9b59b6; }
        .cell[data-num="5"] { color: #e67e22; }
        .cell[data-num="6"] { color: #1abc9c; }
        .cell[data-num="7"] { color: #34495e; }
        .cell[data-num="8"] { color: #95a5a6; }
        #message {
            margin-top: 10px;
            font-size: 1.3em;
            font-weight: bold;
            min-height: 30px;
        }
        .win { color: #27ae60; }
        .lose { color: #e74c3c; }
        .mode-indicator {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .mode-flag { color: #f39c12; }
        .mode-reveal { color: #4a90d9; }
    button:focus-visible{outline:2px solid #fff;outline-offset:2px;}</style>
</head>
<body>
    <h1>💣 Minesweeper</h1>
    <div class="mode-indicator" id="mode-indicator">Mode: <span class="mode-reveal">🔍 Reveal</span></div>
    <div class="controls">
        <button onclick="setDifficulty('easy')" id="btn-easy" class="active">Easy</button>
        <button onclick="setDifficulty('medium')" id="btn-medium">Medium</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">Hard</button>
        <button onclick="initGame()">🔄 New</button>
        <button onclick="toggleFlagMode()" id="btn-flag">🚩 Flag</button>
    </div>
    <div class="info">
        <span>💣 <span id="mines-left">10</span></span>
        <span>⏱️ <span id="timer">0</span>s</span>
    </div>
    <div id="board"></div>
    <div id="message"></div>

    <script>
        let rows, cols, mines, board, revealed, flagged, gameOver, firstClick, timer, timerInterval;
        let flagMode = false;
        let longPressTimer;
        
        const difficulties = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };
        let currentDifficulty = 'easy';

        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + diff).classList.add('active');
            initGame();
        }

        function toggleFlagMode() {
            flagMode = !flagMode;
            const btn = document.getElementById('btn-flag');
            const indicator = document.getElementById('mode-indicator');
            if (flagMode) {
                btn.classList.add('active');
                indicator.innerHTML = 'Mode: <span class="mode-flag">🚩 Flag (tap to mark)</span>';
            } else {
                btn.classList.remove('active');
                indicator.innerHTML = 'Mode: <span class="mode-reveal">🔍 Reveal (tap to open)</span>';
            }
        }

        function initGame() {
            const d = difficulties[currentDifficulty];
            rows = d.rows;
            cols = d.cols;
            mines = d.mines;
            board = [];
            revealed = Array(rows).fill().map(() => Array(cols).fill(false));
            flagged = Array(rows).fill().map(() => Array(cols).fill(false));
            gameOver = false;
            firstClick = true;
            flagMode = false;
            timer = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').textContent = '0';
            document.getElementById('mines-left').textContent = mines;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = '';
            document.getElementById('btn-flag').classList.remove('active');
            document.getElementById('mode-indicator').innerHTML = 'Mode: <span class="mode-reveal">🔍 Reveal</span>';
            renderBoard();
        }

        function placeMines(excludeR, excludeC) {
            board = Array(rows).fill().map(() => Array(cols).fill(0));
            let placed = 0;
            while (placed < mines) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                if (board[r][c] !== -1 && !(Math.abs(r - excludeR) <= 1 && Math.abs(c - excludeC) <= 1)) {
                    board[r][c] = -1;
                    placed++;
                }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] !== -1) {
                        board[r][c] = countAdjacentMines(r, c);
                    }
                }
            }
        }

        function countAdjacentMines(r, c) {
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) {
                        count++;
                    }
                }
            }
            return count;
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${cols}, 32px)`;
            boardEl.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('button');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    // Tap/click handler
                    cell.addEventListener('click', (e) => {
                        e.preventDefault();
                        handleTap(r, c);
                    });
                    
                    // Long press for flagging (mobile)
                    cell.addEventListener('touchstart', (e) => {
                        longPressTimer = setTimeout(() => {
                            handleRightClick(r, c);
                        }, 500);
                    }, { passive: true });
                    
                    cell.addEventListener('touchend', () => {
                        clearTimeout(longPressTimer);
                    });
                    
                    cell.addEventListener('touchmove', () => {
                        clearTimeout(longPressTimer);
                    });
                    
                    // Right-click for desktop
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });
                    
                    boardEl.appendChild(cell);
                }
            }
        }

        function handleTap(r, c) {
            if (gameOver || revealed[r][c]) return;
            
            if (flagMode) {
                // Flag mode: toggle flag
                if (!revealed[r][c]) {
                    flagged[r][c] = !flagged[r][c];
                    updateDisplay();
                    document.getElementById('mines-left').textContent = mines - flagged.flat().filter(f => f).length;
                }
            } else {
                // Reveal mode: normal click
                if (flagged[r][c]) return;
                
                if (firstClick) {
                    firstClick = false;
                    placeMines(r, c);
                    timerInterval = setInterval(() => {
                        timer++;
                        document.getElementById('timer').textContent = timer;
                    }, 1000);
                }

                reveal(r, c);
                updateDisplay();
                checkWin();
            }
        }

        function handleRightClick(r, c) {
            if (gameOver || revealed[r][c]) return;
            flagged[r][c] = !flagged[r][c];
            updateDisplay();
            document.getElementById('mines-left').textContent = mines - flagged.flat().filter(f => f).length;
        }

        function reveal(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols || revealed[r][c] || flagged[r][c]) return;
            revealed[r][c] = true;

            if (board[r][c] === -1) {
                gameOver = true;
                clearInterval(timerInterval);
                revealAllMines();
                document.getElementById('message').textContent = '💥 Game Over!';
                document.getElementById('message').className = 'lose';
                return;
            }

            if (board[r][c] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }

        function revealAllMines() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] === -1) {
                        revealed[r][c] = true;
                    }
                }
            }
        }

        function updateDisplay() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                cell.className = 'cell';
                if (revealed[r][c]) {
                    cell.classList.add('revealed');
                    if (board[r][c] === -1) {
                        cell.classList.add('mine');
                        cell.textContent = '💣';
                    } else if (board[r][c] > 0) {
                        cell.textContent = board[r][c];
                        cell.dataset.num = board[r][c];
                    } else {
                        cell.textContent = '';
                    }
                } else if (flagged[r][c]) {
                    cell.classList.add('flagged');
                    cell.textContent = '🚩';
                } else {
                    cell.textContent = '';
                }
            });
        }

        function checkWin() {
            if (gameOver) return;
            let unrevealed = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!revealed[r][c]) unrevealed++;
                }
            }
            if (unrevealed === mines) {
                gameOver = true;
                clearInterval(timerInterval);
                document.getElementById('message').textContent = '🎉 You Win!';
                document.getElementById('message').className = 'win';
            }
        }

        setDifficulty('easy');
    </script>
<a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;" aria-label="Back to games">← Back</a></body>
</html>
