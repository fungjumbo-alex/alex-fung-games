<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #fff; overflow-x: hidden; }
        h1 { margin: 10px 0; text-shadow: 0 0 10px #4a90d9; }
        .score { font-size: 2em; margin-bottom: 10px; letter-spacing: 4px; }
        .score .p1 { color: #4a90d9; }
        .score .p2 { color: #e74c3c; }
        .score .sep { color: #555; }
        canvas { border-radius: 10px; background: #0a0a1a; max-width: 100%; height: auto; touch-action: none; box-shadow: 0 0 30px rgba(74, 144, 217, 0.2); }
        .touch-btns { display: flex; gap: 20px; margin-top: 15px; }
        .touch-btn { width: 70px; height: 70px; font-size: 28px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: #fff; cursor: pointer; }
        .touch-btn:active { background: #4a90d9; transform: scale(1.1); }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 10px 20px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; background: #4a90d9; color: white; font-weight: bold; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; }
        .overlay.show { display: block; }
        .overlay h2 { font-size: 1.8em; margin-bottom: 10px; }
        .overlay p { font-size: 1.1em; margin-bottom: 15px; color: #aaa; }
        .info { margin-top: 10px; font-size: 0.85em; color: #666; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;">← Back</a>
    <h1>🏓 Pong</h1>
    <div class="score"><span class="p1" id="p1">0</span><span class="sep"> - </span><span class="p2" id="p2">0</span></div>
    <div style="position:relative;display:inline-block;">
        <canvas id="game" width="360" height="480"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="overlay-title">🏆 You Win!</h2>
            <p id="overlay-text">11 - 5</p>
            <button onclick="restart()" aria-label="Play again">🔄 Play Again</button>
        </div>
    </div>
    <div class="touch-btns">
        <button class="touch-btn" id="up" aria-label="Move up">⬆️</button>
        <button class="touch-btn" id="down" aria-label="Move down">⬇️</button>
    </div>
    <div class="controls"><button onclick="startGame()" aria-label="Start game" id="startBtn">▶️ Start</button><button onclick="restart()" aria-label="Restart">🔄 Restart</button></div>
    <div class="info">First to 11 wins · Arrow keys or touch</div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const WIN_SCORE = 11;
        const overlay = document.getElementById('overlay');
        let p1Y, p2Y, ballX, ballY, ballDX, ballDY, s1, s2, running, gameOver, animId;
        const paddleH = 80, paddleW = 10, ballR = 8;
        const paddleSpeed = 6;
        const aiSpeed = 3.5;
        let touchUp = false, touchDown = false;

        function reset() {
            p1Y = canvas.height / 2 - paddleH / 2;
            p2Y = canvas.height / 2 - paddleH / 2;
            s1 = 0; s2 = 0;
            running = false; gameOver = false;
            overlay.classList.remove('show');
            document.getElementById('p1').textContent = 0;
            document.getElementById('p2').textContent = 0;
            resetBall();
            draw();
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballDX = (Math.random() > 0.5 ? 1 : -1) * 4;
            ballDY = (Math.random() - 0.5) * 4;
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Center line
            ctx.setLineDash([5, 10]);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Center circle
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 40, 0, Math.PI * 2);
            ctx.stroke();

            // Player paddle with glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#4a90d9';
            ctx.fillStyle = '#4a90d9';
            ctx.beginPath();
            ctx.roundRect(10, p1Y, paddleW, paddleH, 5);
            ctx.fill();

            // AI paddle with glow
            ctx.shadowColor = '#e74c3c';
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.roundRect(canvas.width - 20, p2Y, paddleW, paddleH, 5);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Ball
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Start message
            if (!running && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('▶ Press Start', canvas.width/2, canvas.height/2 - 10);
                ctx.font = '14px sans-serif';
                ctx.fillStyle = '#888';
                ctx.fillText('or press any arrow key', canvas.width/2, canvas.height/2 + 20);
            }
        }

        function update() {
            if (!running || gameOver) return;

            // Touch input
            if (touchUp && p1Y > 0) p1Y -= paddleSpeed;
            if (touchDown && p1Y < canvas.height - paddleH) p1Y += paddleSpeed;

            ballX += ballDX;
            ballY += ballDY;

            // Top/bottom bounce
            if (ballY - ballR < 0) { ballY = ballR; ballDY = Math.abs(ballDY); }
            if (ballY + ballR > canvas.height) { ballY = canvas.height - ballR; ballDY = -Math.abs(ballDY); }

            // Player paddle collision
            if (ballX - ballR < 20 + paddleW && ballY > p1Y && ballY < p1Y + paddleH && ballDX < 0) {
                ballDX = Math.abs(ballDX) * 1.05;
                const hitPos = (ballY - p1Y - paddleH/2) / (paddleH/2);
                ballDY = hitPos * 5;
                ballX = 20 + paddleW + ballR;
            }

            // AI paddle collision
            if (ballX + ballR > canvas.width - 20 - paddleW && ballY > p2Y && ballY < p2Y + paddleH && ballDX > 0) {
                ballDX = -Math.abs(ballDX) * 1.05;
                const hitPos = (ballY - p2Y - paddleH/2) / (paddleH/2);
                ballDY = hitPos * 5;
                ballX = canvas.width - 20 - paddleW - ballR;
            }

            // Clamp ball speed
            const maxSpeed = 12;
            ballDX = Math.max(-maxSpeed, Math.min(maxSpeed, ballDX));
            ballDY = Math.max(-maxSpeed, Math.min(maxSpeed, ballDY));

            // Score
            if (ballX < -ballR) {
                s2++;
                document.getElementById('p2').textContent = s2;
                if (s2 >= WIN_SCORE) { endGame('AI'); return; }
                resetBall();
            }
            if (ballX > canvas.width + ballR) {
                s1++;
                document.getElementById('p1').textContent = s1;
                if (s1 >= WIN_SCORE) { endGame('You'); return; }
                resetBall();
            }

            // AI - smarter: predict ball position
            const aiTarget = ballDX > 0 ? ballY + (ballDX > 0 ? (canvas.width - 20 - ballX) / ballDX * ballDY * 0.3 : 0) : canvas.height / 2;
            const aiCenter = p2Y + paddleH / 2;
            const diff = aiTarget - aiCenter;
            if (Math.abs(diff) > 10) {
                p2Y += Math.sign(diff) * Math.min(aiSpeed, Math.abs(diff));
            }
            p2Y = Math.max(0, Math.min(canvas.height - paddleH, p2Y));

            draw();
            animId = requestAnimationFrame(update);
        }

        function endGame(winner) {
            gameOver = true;
            running = false;
            cancelAnimationFrame(animId);
            const title = winner === 'You' ? '🏆 You Win!' : '😢 AI Wins!';
            document.getElementById('overlay-title').textContent = title;
            document.getElementById('overlay-text').textContent = s1 + ' - ' + s2;
            overlay.classList.add('show');
        }

        function startGame() {
            if (running) return;
            running = true;
            gameOver = false;
            overlay.classList.remove('show');
            animId = requestAnimationFrame(update);
        }

        function restart() { cancelAnimationFrame(animId); reset(); }

        // Keyboard
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'w' || e.key === 's') e.preventDefault();
            if (!running && !gameOver) startGame();
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        // Continuous keyboard movement
        setInterval(() => {
            if (!running || gameOver) return;
            if ((keys['ArrowUp'] || keys['w']) && p1Y > 0) p1Y -= paddleSpeed;
            if ((keys['ArrowDown'] || keys['s']) && p1Y < canvas.height - paddleH) p1Y += paddleSpeed;
        }, 16);

        // Touch buttons - hold to move
        const upBtn = document.getElementById('up');
        const downBtn = document.getElementById('down');
        upBtn.addEventListener('touchstart', e => { e.preventDefault(); touchUp = true; if (!running && !gameOver) { running = true; animId = requestAnimationFrame(update); } });
        upBtn.addEventListener('touchend', () => { touchUp = false; });
        upBtn.addEventListener('mousedown', () => { touchUp = true; if (!running && !gameOver) { running = true; animId = requestAnimationFrame(update); } });
        upBtn.addEventListener('mouseup', () => { touchUp = false; });
        downBtn.addEventListener('touchstart', e => { e.preventDefault(); touchDown = true; if (!running && !gameOver) { running = true; animId = requestAnimationFrame(update); } });
        downBtn.addEventListener('touchend', () => { touchDown = false; });
        downBtn.addEventListener('mousedown', () => { touchDown = true; if (!running && !gameOver) { running = true; animId = requestAnimationFrame(update); } });
        downBtn.addEventListener('mouseup', () => { touchDown = false; });

        // Swipe on canvas
        let swipeStartY = 0;
        canvas.addEventListener('touchstart', e => {
            swipeStartY = e.touches[0].clientY;
            if (!running && !gameOver) { running = true; animId = requestAnimationFrame(update); }
        }, {passive: true});
        canvas.addEventListener('touchmove', e => {
            const dy = e.touches[0].clientY - swipeStartY;
            p1Y += dy * 0.8;
            p1Y = Math.max(0, Math.min(canvas.height - paddleH, p1Y));
            swipeStartY = e.touches[0].clientY;
        }, {passive: true});

        reset();
    </script>
</body>
</html>
