<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #fff; }
        h1 { margin: 10px 0; }
        .score { font-size: 2em; margin-bottom: 10px; }
        canvas { border-radius: 10px; background: #0a0a1a; }
        .touch-btns { display: flex; gap: 20px; margin-top: 15px; }
        .touch-btn { width: 70px; height: 70px; font-size: 28px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: #fff; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;">← Back</a>
    <h1>🏓 Pong</h1>
    <div class="score"><span id="p1">0</span> - <span id="p2">0</span></div>
    <canvas id="game" width="360" height="480"></canvas>
    <div class="touch-btns"><button class="touch-btn" id="up">⬆️</button><button class="touch-btn" id="down">⬇️</button></div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let p1Y = 190, p2Y = 190;
        let ballX = 180, ballY = 240, ballDX = 4, ballDY = 3;
        let s1 = 0, s2 = 0, running = false;
        const paddleH = 80, paddleW = 10;

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Center line
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            // Paddles
            ctx.fillStyle = '#4a90d9';
            ctx.fillRect(10, p1Y, paddleW, paddleH);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(canvas.width - 20, p2Y, paddleW, paddleH);
            // Ball
            ctx.beginPath();
            ctx.arc(ballX, ballY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }

        function update() {
            if (!running) return;
            ballX += ballDX;
            ballY += ballDY;

            // Top/bottom bounce
            if (ballY < 8 || ballY > canvas.height - 8) ballDY = -ballDY;

            // Paddle collision
            if (ballX < 25 && ballY > p1Y && ballY < p1Y + paddleH) { ballDX = Math.abs(ballDX); ballDY += (ballY - p1Y - paddleH/2) / 20; }
            if (ballX > canvas.width - 25 && ballY > p2Y && ballY < p2Y + paddleH) { ballDX = -Math.abs(ballDX); ballDY += (ballY - p2Y - paddleH/2) / 20; }

            // Score
            if (ballX < 0) { s2++; document.getElementById('p2').textContent = s2; reset(); }
            if (ballX > canvas.width) { s1++; document.getElementById('p1').textContent = s1; reset(); }

            // AI
            if (p2Y + paddleH/2 < ballY - 10) p2Y += 3;
            if (p2Y + paddleH/2 > ballY + 10) p2Y -= 3;

            draw();
            requestAnimationFrame(update);
        }

        function reset() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballDX = -ballDX;
            ballDY = (Math.random() - 0.5) * 6;
        }

        function start() { running = true; update(); }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && p1Y > 0) p1Y -= 20;
            if (e.key === 'ArrowDown' && p1Y < canvas.height - paddleH) p1Y += 20;
            if (!running) start();
        });

        document.getElementById('up').addEventListener('touchstart', () => { if (p1Y > 0) p1Y -= 30; if (!running) start(); });
        document.getElementById('down').addEventListener('touchstart', () => { if (p1Y < canvas.height - paddleH) p1Y += 30; if (!running) start(); });

        draw();
    </script>
</body>
</html>
