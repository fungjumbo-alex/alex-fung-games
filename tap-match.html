<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>👆 Tap Match - Classic Games</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  /* Color Palette - Vibrant & Modern */
  --coral: #FF6B6B;
  --coral-light: #FF8E8E;
  --peach: #FFD4A3;
  --peach-light: #FFE4C4;
  --navy: #2C3E50;
  --navy-dark: #1A252F;
  --teal: #4ECDC4;
  --teal-light: #7FE5DD;
  --yellow: #FFE66D;
  --yellow-light: #FFF4A3;
  --green: #95E1D3;
  --green-dark: #5FB8A8;
  --purple: #A8E6CF;
  --blue: #6C5CE7;

  /* Gradients */
  --gradient-coral: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
  --gradient-peach: linear-gradient(135deg, #FFD4A3 0%, #FFE4C4 100%);
  --gradient-navy: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%);
  --gradient-teal: linear-gradient(135deg, #4ECDC4 0%, #7FE5DD 100%);
  --gradient-yellow: linear-gradient(135deg, #FFE66D 0%, #FFF4A3 100%);
  --gradient-green: linear-gradient(135deg, #95E1D3 0%, #5FB8A8 100%);
  --gradient-blue: linear-gradient(135deg, #6C5CE7 0%, #a39bfe 100%);
  --gradient-purple: linear-gradient(135deg, #a55eea 0%, #d6a2e8 100%);

  /* Spacing */
  --spacing-xs: 0.5rem;
  --spacing-sm: 1rem;
  --spacing-md: 1.5rem;
  --spacing-lg: 2rem;
  --spacing-xl: 3rem;

  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
  --shadow-glow: 0 0 20px rgba(255, 107, 107, 0.3);

  /* Transitions */
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  /* Prevent auto-zoom on double tap for all interactive elements */
  touch-action: manipulation;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  /* Use a solid background color on body/html to prevent white flashes */
  background-color: #667eea;
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* Animated Background */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  /* Combine the base gradient and the bubbles animation */
  background:
    radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.2) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.2) 0%, transparent 50%),
    radial-gradient(circle at 40% 20%, rgba(255, 230, 109, 0.2) 0%, transparent 50%),
    linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  animation: backgroundShift 15s ease infinite;
  z-index: -1;
  /* Ensure background doesn't scroll with content */
  will-change: transform;
}

@keyframes backgroundShift {

  0%,
  100% {
    opacity: 1;
    transform: scale(1);
  }

  50% {
    opacity: 0.8;
    transform: scale(1.05);
    /* Reduced scale slightly for better performance */
  }
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--spacing-lg);
}

/* Header */
header {
  text-align: center;
  padding: var(--spacing-xl) 0;
  animation: fadeInDown 0.6s ease;
}

header h1 {
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: var(--spacing-sm);
  text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

header p {
  font-size: 1.2rem;
  opacity: 0.9;
  font-weight: 500;
}

/* Game Grid */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: var(--spacing-lg);
  margin-top: var(--spacing-xl);
  animation: fadeInUp 0.8s ease;
}

/* Game Card */
.game-card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  padding: var(--spacing-lg);
  cursor: pointer;
  transition: all var(--transition-normal);
  border: 2px solid rgba(255, 255, 255, 0.2);
  position: relative;
  overflow: hidden;
}

.game-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
  opacity: 0;
  transition: opacity var(--transition-normal);
}

.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: var(--shadow-lg);
  border-color: rgba(255, 255, 255, 0.4);
}

.game-card:hover::before {
  opacity: 1;
}

.game-card-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
  margin-bottom: var(--spacing-md);
}

.game-icon {
  width: 60px;
  height: 60px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform var(--transition-normal);
  color: white;
  /* Ensure SVG color is white */
}

.game-icon svg {
  width: 32px;
  height: 32px;
  stroke: currentColor;
  stroke-width: 2px;
}

.game-card:hover .game-icon {
  transform: rotate(5deg) scale(1.1);
}

.game-card h2 {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
}

.game-card p {
  opacity: 0.8;
  font-size: 0.95rem;
  line-height: 1.5;
}

/* Game Colors */
.game-card[data-game="tap-match"] .game-icon {
  background: var(--gradient-coral);
}

.game-card[data-game="word-guess"] .game-icon {
  background: var(--gradient-peach);
}

.game-card[data-game="minesweeper"] .game-icon {
  background: var(--gradient-navy);
}

.game-card[data-game="hangman"] .game-icon {
  background: linear-gradient(135deg, #FF9A76 0%, #FFBC94 100%);
}

.game-card[data-game="sound-memory"] .game-icon {
  background: var(--gradient-navy);
}

.game-card[data-game="snake"] .game-icon {
  background: var(--gradient-yellow);
}

.game-card[data-game="fruit-merge"] .game-icon {
  background: var(--gradient-green);
}

.game-card[data-game="chopper"] .game-icon {
  background: var(--gradient-teal);
}

.game-card[data-game="risk-battles"] .game-icon {
  background: var(--gradient-navy);
}

.game-card[data-game="poker"] .game-icon {
  background: var(--gradient-purple);
}

.game-card[data-game="mahjong"] .game-icon {
  background: var(--gradient-coral);
}

.game-card[data-game="bubble-shooter"] .game-icon {
  background: var(--gradient-blue);
}

.game-card[data-game="big2"] .game-icon {
  background: var(--gradient-peach);
}

.game-card[data-game="2048"] .game-icon {
  background: var(--gradient-yellow);
}

/* Game Container */
html,
body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

/* Ensure game container fills viewport without scrolling */
.game-container {
  display: none;
  animation: fadeIn 0.5s ease;
  position: relative;
  /* for HUD overlay */
  height: 100vh;
  /* fill viewport */
  overflow: hidden;
}

.game-container.active {
  display: block;
}

#menu-container {
  max-height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
  /* Firefox */
  -ms-overflow-style: none;
  /* IE/Edge */
}

#menu-container::-webkit-scrollbar {
  display: none;
  /* Chrome/Safari */
}

/* Hide scrollbar for horizontal controls */
.game-controls-bar::-webkit-scrollbar {
  display: none;
}

.game-controls-bar {
  scrollbar-width: none;
}


.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--spacing-lg);
  flex-wrap: wrap;
  gap: var(--spacing-md);
}

.game-title {
  font-size: 2.5rem;
  font-weight: 700;
}

.game-controls {
  display: flex;
  gap: var(--spacing-sm);
  align-items: center;
}

/* Buttons */
.btn {
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: 'Inter', sans-serif;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.btn:active::before {
  width: 300px;
  height: 300px;
}

.btn-primary {
  background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
  color: white;
}

.btn-primary:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255, 255, 255, 0.3);
}

.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(1.05);
}

.difficulty-btn.active {
  background: linear-gradient(135deg, #4ECDC4 0%, #7FE5DD 100%);
  border-color: #4ECDC4;
  box-shadow: 0 4px 20px rgba(78, 205, 196, 0.4);
  transform: scale(1.05);
}


/* Back Button - Circular Icon Style */
.btn-back-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  padding: 0;
  transition: all var(--transition-fast);
  backdrop-filter: blur(10px);
  cursor: pointer;
  flex-shrink: 0;
}

.btn-back-icon:hover {
  background: rgba(0, 0, 0, 0.5);
  transform: scale(1.1);
  border-color: rgba(255, 255, 255, 0.4);
}

.btn-back-icon svg {
  width: 24px;
  height: 24px;
  stroke: currentColor;
  stroke-width: 2.5;
}

/* Header Layout Alignment */
.game-header-left {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}

.btn-back:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* Game Board Styles */
.game-board {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  padding: var(--spacing-lg);
  border: 2px solid rgba(255, 255, 255, 0.2);
  margin-top: var(--spacing-lg);
}

.game-stats {
  display: flex;
  gap: var(--spacing-lg);
  justify-content: center;
  margin-bottom: var(--spacing-lg);
  flex-wrap: wrap;
}

.stat {
  text-align: center;
  background: rgba(255, 255, 255, 0.1);
  padding: var(--spacing-sm) var(--spacing-md);
  border-radius: var(--radius-md);
  min-width: 120px;
}

.stat-label {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-bottom: 0.25rem;
}

.stat-value {
  font-size: 1.8rem;
  font-weight: 700;
}

/* Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {

  0%,
  100% {
    transform: scale(1);
  }

  50% {
    transform: scale(1.05);
  }
}

@keyframes shake {

  0%,
  100% {
    transform: translateX(0);
  }

  25% {
    transform: translateX(-10px);
  }

  75% {
    transform: translateX(10px);
  }
}

/* Responsive Design */
@media (max-width: 768px) {

  /* Prevent horizontal scroll */
  body {
    overflow-x: hidden;
  }

  header h1 {
    font-size: 2.5rem;
  }

  header p {
    font-size: 1rem;
  }

  .game-grid {
    grid-template-columns: 1fr;
    gap: var(--spacing-md);
  }

  .game-title {
    font-size: 1.8rem;
  }

  .container {
    padding: var(--spacing-sm);
  }

  .game-board {
    padding: var(--spacing-sm);
    overflow-x: auto;
  }

  /* Ensure game cards are tappable */
  .game-card {
    padding: var(--spacing-md);
    min-height: 80px;
  }

  .game-card h2 {
    font-size: 1.5rem;
  }

  .game-card p {
    font-size: 0.85rem;
  }

  /* Button improvements */
  .btn {
    padding: 0.875rem 1.25rem;
    font-size: 1rem;
    min-height: 44px;
    min-width: 44px;
  }

  .game-header {
    flex-direction: row;
    /* Keep row layout on mobile */
    align-items: center;
    gap: var(--spacing-sm);
  }

  .game-controls {
    width: auto;
    /* Don't take full width */
    justify-content: flex-end;
    /* Align to right */
    flex-wrap: wrap;
    flex-grow: 1;
    /* Allow to grow if needed, or keeping it auto is fine */
  }

  /* Reduce title size slightly to fit */
  .game-title {
    font-size: 1.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Stats adjustments */
  .game-stats {
    gap: var(--spacing-sm);
    font-size: 0.9rem;
  }

  .stat {
    min-width: 100px;
    padding: var(--spacing-xs) var(--spacing-sm);
  }

  .stat-value {
    font-size: 1.5rem;
  }

  /* Card game specific */
  .card {
    width: 60px;
    height: 85px;
    font-size: 14px;
  }

  .card-corner {
    font-size: 14px;
  }

  .card-center {
    font-size: 28px;
  }

  /* Mahjong tiles */
  .mahjong-tile {
    width: 35px;
    height: 45px;
    font-size: 20px;
  }

  /* Modal improvements */
  .game-modal-content {
    padding: var(--spacing-lg);
    max-width: 90%;
  }

  .game-modal-content h2 {
    font-size: 1.8rem;
  }

  .instructions-content {
    padding: var(--spacing-lg);
    max-width: 90%;
  }

  .instructions-content h3 {
    font-size: 1.5rem;
  }

  .instructions-content li {
    font-size: 0.9rem;
  }

  /* Mahjong mobile fixes */
  #mahjong-board {
    height: 400px;
    /* Reduced from 500px for better mobile fit */
  }

  /* Big 2 mobile fixes - reduce card overlap */
  #big2-player-hand {
    gap: -10px !important;
    /* Override inline style, less cramped than -30px */
    padding: 10px !important;
  }

  /* Poker mobile fixes - improve spacing */
  #poker-controls {
    gap: var(--spacing-sm) !important;
    flex-wrap: wrap;
  }

  #poker-community-cards {
    gap: 5px;
    flex-wrap: wrap;
  }

  #poker-player-hand {
    gap: 5px;
    flex-wrap: wrap;
  }

  /* Bubble Shooter mobile fixes */
  #bubble-shooter-canvas {
    max-width: 100%;
    height: auto;
  }

  #bubble-shooter-board {
    height: auto;
    min-height: 400px;
  }
}


/* Hidden utility */
.hidden {
  display: none !important;
}

/* Game Instructions Overlay */
.game-instructions {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.3s ease;
  padding: var(--spacing-lg);
}

.instructions-content {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  padding: var(--spacing-xl);
  max-width: 500px;
  width: 100%;
  border: 2px solid rgba(255, 255, 255, 0.3);
  box-shadow: var(--shadow-lg);
  animation: fadeInUp 0.5s ease;
}

.instructions-content h3 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: var(--spacing-md);
  text-align: center;
}

.instructions-content ul {
  list-style: none;
  margin-bottom: var(--spacing-lg);
}

.instructions-content li {
  padding: var(--spacing-xs) 0;
  font-size: 1rem;
  line-height: 1.6;
  position: relative;
  padding-left: 1.5rem;
}

.instructions-content li::before {
  content: '•';
  position: absolute;
  left: 0;
  color: var(--teal);
  font-weight: 700;
  font-size: 1.2rem;
}

.instructions-content strong {
  color: var(--yellow);
  font-weight: 600;
}

.instructions-content .btn {
  width: 100%;
  font-size: 1.1rem;
  padding: 1rem;
}

@media (max-width: 768px) {
  .instructions-content {
    padding: var(--spacing-lg);
  }

  .instructions-content h3 {
    font-size: 1.5rem;
  }

  .instructions-content li {
    font-size: 0.9rem;
  }
}

/* Game Modal */
.game-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  animation: fadeIn 0.3s ease;
  padding: var(--spacing-lg);
}

.game-modal-content {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(30px);
  border-radius: var(--radius-xl);
  padding: var(--spacing-xl);
  max-width: 450px;
  width: 100%;
  border: 2px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  text-align: center;
  animation: modalSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalSlideIn {
  from {
    opacity: 0;
    transform: scale(0.8) translateY(-50px);
  }

  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.game-modal-icon {
  font-size: 5rem;
  margin-bottom: var(--spacing-md);
  animation: iconBounce 0.6s ease;
  display: inline-block;
}

@keyframes iconBounce {

  0%,
  100% {
    transform: scale(1);
  }

  25% {
    transform: scale(1.2);
  }

  50% {
    transform: scale(0.9);
  }

  75% {
    transform: scale(1.1);
  }
}

.game-modal-content h2 {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: var(--spacing-sm);
  background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.game-modal-content p {
  font-size: 1.2rem;
  opacity: 0.9;
  margin-bottom: var(--spacing-lg);
  line-height: 1.6;
}

.game-modal-content .btn {
  width: 100%;
  font-size: 1.2rem;
  padding: 1rem;
}

@media (max-width: 768px) {
  .game-modal-content {
    padding: var(--spacing-lg);
  }

  .game-modal-icon {
    font-size: 4rem;
  }

  .game-modal-content h2 {
    font-size: 2rem;
  }

  .game-modal-content p {
    font-size: 1rem;
  }

  .game-modal-content .btn {
    font-size: 1rem;
    padding: 0.8rem;
  }
}

/* Make canvas responsive on mobile */
#chopper-canvas {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Mahjong Styles */
#mahjong-board {
  position: relative;
  width: 100%;
  height: 500px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.mahjong-tile {
  position: absolute;
  width: 40px;
  height: 52px;
  background: #f0e6d2;
  border: 1px solid #c0b6a2;
  border-radius: 4px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3),
    inset 1px 1px 0 rgba(255, 255, 255, 0.5);
  transition: transform 0.1s, box-shadow 0.1s;
  user-select: none;
  z-index: 1;
}

.mahjong-tile:hover {
  transform: translateY(-2px);
  box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4),
    inset 1px 1px 0 rgba(255, 255, 255, 0.5);
  z-index: 10;
}

.mahjong-tile.selected {
  background: #fff8e0;
  border-color: #ffd700;

/* Risk Game Styles */
#risk-map-container {
  position: relative;
  user-select: none;
  transition: border-color 0.5s ease;
  border-radius: 10px;
}

.risk-territory-badge {
  position: absolute;
  width: 30px;
  height: 30px;
  background: #ccc;
  border: 2px solid #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 10;
}

.risk-territory-badge:hover {
  transform: translate(-50%, -50%) scale(1.2);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
  z-index: 20;
}

.risk-territory-badge.selected {
  box-shadow: 0 0 0 3px #FFD700, 0 4px 8px rgba(0, 0, 0, 0.6);
  transform: translate(-50%, -50%) scale(1.2);
  z-index: 30;
}

.badge-count {
  color: white;
  font-weight: bold;
  font-size: 0.9rem;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
}

/* Action feedback animations */
.risk-territory-badge.attacking {
  animation: pulse-attack 0.5s ease-in-out 3;
}

.risk-territory-badge.defending {
  animation: pulse-defend 0.5s ease-in-out 3;
}

.risk-territory-badge.reinforcing {
  animation: pulse-reinforce 0.3s ease-in-out 2;
}

.risk-territory-badge.conquered {
  animation: flash-conquered 0.8s ease-in-out;
}

@keyframes pulse-attack {

  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.4);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.6);
  }
}

@keyframes pulse-defend {

  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.3);
    box-shadow: 0 0 20px rgba(255, 165, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.6);
  }
}

@keyframes pulse-reinforce {

  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.2);
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
  }
}

@keyframes flash-conquered {
  0% {
    transform: translate(-50%, -50%) scale(1);
  }

  25% {
    transform: translate(-50%, -50%) scale(1.5);
    box-shadow: 0 0 30px rgba(255, 215, 0, 1);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.3);
  }

  75% {
    transform: translate(-50%, -50%) scale(1.5);
    box-shadow: 0 0 30px rgba(255, 215, 0, 1);
  }

  100% {
    transform: translate(-50%, -50%) scale(1);
  }
}

/* Global Full Screen for Chopper Game */
#chopper-game {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1000;
  background: #000;
  overflow: hidden;
  display: none;

  padding: 0;
}

  display: flex;
  /* Visible when active */
  flex-direction: column;
}

  flex: 1;

  display: flex;
  align-items: center;
  justify-content: center;

}

#chopper-canvas {

}

/* 2048 Game Styles */
#game-2048-grid {
  position: relative;
  width: 350px;
  height: 350px;
  background: #bbada0;
  border-radius: 6px;
  margin: 0 auto;
  padding: 10px;
  box-sizing: border-box;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 10px;
  touch-action: none;
  /* Prevent browser handling of gestures */
}

#2048-game .game-board {
  touch-action: none;
  /* Ensure the container also ignores gestures */
}

.grid-cell {
  width: 100%;
  height: 100%;
  background: rgba(238, 228, 218, 0.35);
  border-radius: 3px;
  position: static;
  /* Default */
}

/* The tiles are appended to #game-2048-grid. */

    <script>
    // Global Modal Utility
window.showGameModal = function (icon, title, message, callback, exitCallback) {
  const modal = document.getElementById('game-modal');
  const modalIcon = document.getElementById('game-modal-icon');
  const modalTitle = document.getElementById('game-modal-title');
  const modalMessage = document.getElementById('game-modal-message');
  const modalBtn = document.getElementById('game-modal-btn');
  const exitBtn = document.getElementById('game-modal-exit-btn');

  modalIcon.textContent = icon;
  modalTitle.textContent = title;
  modalMessage.textContent = message;

  // Remove previous click handlers
  const newBtn = modalBtn.cloneNode(true);
  modalBtn.parentNode.replaceChild(newBtn, modalBtn);

  // Add new click handler
  newBtn.addEventListener('click', () => {
    modal.classList.add('hidden');
    if (callback) callback();
  });

  // Handle exit button
  if (exitBtn) {
    if (exitCallback) {
      exitBtn.classList.remove('hidden');
      const newExitBtn = exitBtn.cloneNode(true);
      exitBtn.parentNode.replaceChild(newExitBtn, exitBtn);

      newExitBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        exitCallback();
      });
    } else {
      exitBtn.classList.add('hidden');
    }
  }

  // Show modal
  modal.classList.remove('hidden');
};

// Main App Controller
class GameApp {
  constructor() {
    this.currentGame = null;
    this.menuContainer = document.getElementById('menu-container');
    this.init();
  }

  init() {
    // Add click handlers for game cards
    const gameCards = document.querySelectorAll('.game-card');
    gameCards.forEach(card => {
      card.addEventListener('click', () => {
        const gameName = card.dataset.game;
        window.location.hash = gameName; // Update hash to trigger route handler
      });
    });

    // Add back button handlers (Event Delegation)
    document.addEventListener('click', (e) => {
      const backBtn = e.target.closest('.btn-back-icon');
      if (backBtn) {
        e.preventDefault();
        window.location.hash = ''; // Return to menu via hash
      }
    });

    // Handle routing
    window.addEventListener('hashchange', () => this.handleRoute());
    window.addEventListener('load', () => this.handleRoute());
  }

  handleRoute() {
    const hash = window.location.hash.slice(1); // Remove '#'
    if (hash) {
      this.showGame(hash);
    } else {
      this.showMenu();
    }
  }

  showGame(gameName) {
    // Hide menu first
    this.menuContainer.classList.add('hidden');

    // Hide any currently active game if switching directly between games (edge case)
    if (this.currentGame && this.currentGame !== gameName) {
      const currentContainer = document.getElementById(`${this.currentGame}-game`);
      if (currentContainer) currentContainer.classList.remove('active');
      this.cleanupGame(this.currentGame);
    }

    const gameContainer = document.getElementById(`${gameName}-game`);
    if (gameContainer) {
      gameContainer.classList.add('active');
      this.currentGame = gameName;

      // Show instructions if needed (simple check if already active handled by logic/CSS usually, but good to ensure)
      // Note: Some games hide instructions on start, so we only show if it's a "fresh" entry or we want to persist state?
      // Default behavior: show instructions when entering a game.
      const instructions = document.getElementById(`${gameName}-instructions`);
      if (instructions) {
        // Only show if we strictly want reset? 
        // Let's remove 'hidden' class to ensure they see it on entry.
        instructions.classList.remove('hidden');
      }

      // Initialize the game
      this.initializeGame(gameName);
    } else {
      // Invalid game hash -> go back to menu
      console.warn(`Game ${gameName} not found, redirecting to menu.`);
      window.location.hash = '';
    }
  }

  showMenu() {
    if (this.currentGame) {
      const gameContainer = document.getElementById(`${this.currentGame}-game`);
      if (gameContainer) {
        gameContainer.classList.remove('active');
      }

      // We don't necessarily need to reset instructions here, they are handled in showGame entry.

      // Clean up game
      this.cleanupGame(this.currentGame);
      this.currentGame = null;
    }
    this.menuContainer.classList.remove('hidden');
  }

  initializeGame(gameName) {
    switch (gameName) {
      case 'tap-match':
        if (window.tapMatchGame) window.tapMatchGame.init();
        break;
      case 'word-guess':
        if (window.wordGuessGame) window.wordGuessGame.init();
        break;
      case 'minesweeper':
        if (window.minesweeperGame) window.minesweeperGame.init();
        break;
      case 'hangman':
        if (window.hangmanGame) window.hangmanGame.init();
        break;
      case 'sound-memory':
        if (window.soundMemoryGame) window.soundMemoryGame.init();
        break;
      case 'snake':
        // Snake game is initialized by the user clicking "Start Game"
        break;
      case 'mahjong':
        if (window.mahjongGame) window.mahjongGame.init();
        break;
      case 'big2':
        if (window.big2Game) window.big2Game.init();
        break;
      case 'poker':
        if (window.pokerGame) window.pokerGame.init();
        break;
      case 'bubble-shooter':
        if (window.bubbleShooterGame) window.bubbleShooterGame.init();
        break;
      case 'risk-battles':
        if (window.riskGame) window.riskGame.init();
        break;
      case 'fruit-merge':
        if (window.fruitMergeGame) window.fruitMergeGame.init();
        break;
      case 'chopper':
        if (window.chopperGame) window.chopperGame.init();
        break;
      case '2048':
        if (window.game2048) window.game2048.init();
        break;
    }
  }

  cleanupGame(gameName) {
    switch (gameName) {
      case 'tap-match':
        if (window.tapMatchGame) window.tapMatchGame.cleanup();
        break;
      case 'word-guess':
        if (window.wordGuessGame) window.wordGuessGame.cleanup();
        break;
      case 'minesweeper':
        if (window.minesweeperGame) window.minesweeperGame.cleanup();
        break;
      case 'hangman':
        if (window.hangmanGame) window.hangmanGame.cleanup();
        break;
      case 'sound-memory':
        if (window.soundMemoryGame) window.soundMemoryGame.cleanup();
        break;
      case 'snake':
        if (window.snakeGame) window.snakeGame.cleanup();
        break;
      case 'mahjong':
        // No cleanup needed yet
        break;
      case 'big2':
        // No cleanup needed yet
        break;
      case 'poker':
        // No cleanup needed yet
        break;
      case 'chopper':
        if (window.chopperGame) window.chopperGame.cleanup();
        break;
    }
  }
}

// Initialize app when DOM is loaded
document.addEventListener('DOMContentLoaded', () => {
  window.gameApp = new GameApp();
});

    // Tap Match Game - Memory Card Matching
class TapMatchGame {
    constructor() {
        this.board = document.getElementById('tap-match-board');
        this.movesEl = document.getElementById('tap-match-moves');
        this.matchesEl = document.getElementById('tap-match-matches');
        this.timeEl = document.getElementById('tap-match-time');
        this.resetBtn = document.getElementById('tap-match-reset');

        this.cards = ['🍇', '🍉', '🍊', '🍋', '🍌', '🍎', '🍓', '🍒'];
        this.gameCards = [];
        this.flippedCards = [];
        this.matchedPairs = 0;
        this.moves = 0;
        this.timer = null;
        this.seconds = 0;
        this.canFlip = true;
        this.gameStarted = false;

        this.resetBtn.addEventListener('click', () => {
            if (this.gameStarted && !confirm('Game is in progress. Start a new game? Current progress will be lost.')) return;
            this.init();
        });
    }

    init() {
        this.gameCards = [...this.cards, ...this.cards].sort(() => Math.random() - 0.5);
        this.flippedCards = [];
        this.matchedPairs = 0;
        this.moves = 0;
        this.seconds = 0;
        this.canFlip = true;
        this.gameStarted = false;

        this.updateStats();
        this.createBoard();
        this.startTimer();
    }

    createBoard() {
        this.board.innerHTML = '';
        this.board.style.cssText = `
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      max-width: 500px;
      margin: 0 auto;
    `;

        this.gameCards.forEach((symbol, index) => {
            const card = document.createElement('div');
            card.className = 'tap-card';
            card.dataset.index = index;
            card.dataset.symbol = symbol;
            card.style.cssText = `
        aspect-ratio: 1;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid rgba(255, 255, 255, 0.3);
        position: relative;
        transform-style: preserve-3d;
      `;

            card.innerHTML = '<div class="card-back" style="position: absolute; backface-visibility: hidden;">❓</div><div class="card-front" style="position: absolute; backface-visibility: hidden; transform: rotateY(180deg);">' + symbol + '</div>';

            card.addEventListener('click', () => this.flipCard(card));
            this.board.appendChild(card);
        });
    }

    flipCard(card) {
        if (!this.canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) {
            return;
        }

        this.gameStarted = true;
        card.classList.add('flipped');
        card.style.transform = 'rotateY(180deg)';
        this.flippedCards.push(card);

        if (this.flippedCards.length === 2) {
            this.canFlip = false;
            this.moves++;
            this.updateStats();

            setTimeout(() => this.checkMatch(), 600);
        }
    }

    checkMatch() {
        const [card1, card2] = this.flippedCards;

        if (card1.dataset.symbol === card2.dataset.symbol) {
            card1.classList.add('matched');
            card2.classList.add('matched');
            card1.style.opacity = '1';
            card2.style.opacity = '1';
            this.matchedPairs++;
            this.updateStats();

            if (this.matchedPairs === this.cards.length) {
                setTimeout(() => this.gameWon(), 500);
            }
        } else {
            card1.style.transform = 'rotateY(0deg)';
            card2.style.transform = 'rotateY(0deg)';
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
            }, 300);
        }

        this.flippedCards = [];
        this.canFlip = true;
    }

    gameWon() {
        clearInterval(this.timer);
        showGameModal('🎉', 'You Won!', `Moves: ${this.moves} | Time: ${this.formatTime(this.seconds)}`, () => this.init(), () => window.gameApp.showMenu());
    }

    startTimer() {
        clearInterval(this.timer);
        this.timer = setInterval(() => {
            this.seconds++;
            this.timeEl.textContent = this.formatTime(this.seconds);
        }, 1000);
    }

    formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    updateStats() {
        this.movesEl.textContent = this.moves;
        this.matchesEl.textContent = this.matchedPairs;
    }

    cleanup() {
        clearInterval(this.timer);
    }
}

window.tapMatchGame = new TapMatchGame();

// Auto-init for standalone mode
    setTimeout(function() {tapMatchGame.init(); }, 100);
    </script>
