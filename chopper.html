<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🚁 Chopper - Classic Games</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  /* Color Palette - Vibrant & Modern */
  --coral: #FF6B6B;
  --coral-light: #FF8E8E;
  --peach: #FFD4A3;
  --peach-light: #FFE4C4;
  --navy: #2C3E50;
  --navy-dark: #1A252F;
  --teal: #4ECDC4;
  --teal-light: #7FE5DD;
  --yellow: #FFE66D;
  --yellow-light: #FFF4A3;
  --green: #95E1D3;
  --green-dark: #5FB8A8;
  --purple: #A8E6CF;
  --blue: #6C5CE7;

  /* Gradients */
  --gradient-coral: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
  --gradient-peach: linear-gradient(135deg, #FFD4A3 0%, #FFE4C4 100%);
  --gradient-navy: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%);
  --gradient-teal: linear-gradient(135deg, #4ECDC4 0%, #7FE5DD 100%);
  --gradient-yellow: linear-gradient(135deg, #FFE66D 0%, #FFF4A3 100%);
  --gradient-green: linear-gradient(135deg, #95E1D3 0%, #5FB8A8 100%);
  --gradient-blue: linear-gradient(135deg, #6C5CE7 0%, #a39bfe 100%);
  --gradient-purple: linear-gradient(135deg, #a55eea 0%, #d6a2e8 100%);

  /* Spacing */
  --spacing-xs: 0.5rem;
  --spacing-sm: 1rem;
  --spacing-md: 1.5rem;
  --spacing-lg: 2rem;
  --spacing-xl: 3rem;

  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
  --shadow-glow: 0 0 20px rgba(255, 107, 107, 0.3);

  /* Transitions */
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  /* Prevent auto-zoom on double tap for all interactive elements */
  touch-action: manipulation;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  /* Use a solid background color on body/html to prevent white flashes */
  background-color: #667eea;
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* Animated Background */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  /* Combine the base gradient and the bubbles animation */
  background:
    radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.2) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.2) 0%, transparent 50%),
    radial-gradient(circle at 40% 20%, rgba(255, 230, 109, 0.2) 0%, transparent 50%),
    linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  animation: backgroundShift 15s ease infinite;
  z-index: -1;
  /* Ensure background doesn't scroll with content */
  will-change: transform;
}

@keyframes backgroundShift {

  0%,
  100% {
    opacity: 1;
    transform: scale(1);
  }

  50% {
    opacity: 0.8;
    transform: scale(1.05);
    /* Reduced scale slightly for better performance */
  }
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--spacing-lg);
}

/* Header */
header {
  text-align: center;
  padding: var(--spacing-xl) 0;
  animation: fadeInDown 0.6s ease;
}

header h1 {
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: var(--spacing-sm);
  text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

header p {
  font-size: 1.2rem;
  opacity: 0.9;
  font-weight: 500;
}

/* Game Grid */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: var(--spacing-lg);
  margin-top: var(--spacing-xl);
  animation: fadeInUp 0.8s ease;
}

/* Game Card */
.game-card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  padding: var(--spacing-lg);
  cursor: pointer;
  transition: all var(--transition-normal);
  border: 2px solid rgba(255, 255, 255, 0.2);
  position: relative;
  overflow: hidden;
}

.game-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
  opacity: 0;
  transition: opacity var(--transition-normal);
}

.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: var(--shadow-lg);
  border-color: rgba(255, 255, 255, 0.4);
}

.game-card:hover::before {
  opacity: 1;
}

.game-card-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
  margin-bottom: var(--spacing-md);
}

.game-icon {
  width: 60px;
  height: 60px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform var(--transition-normal);
  color: white;
  /* Ensure SVG color is white */
}

.game-icon svg {
  width: 32px;
  height: 32px;
  stroke: currentColor;
  stroke-width: 2px;
}

.game-card:hover .game-icon {
  transform: rotate(5deg) scale(1.1);
}

.game-card h2 {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
}

.game-card p {
  opacity: 0.8;
  font-size: 0.95rem;
  line-height: 1.5;
}

/* Game Colors */
.game-card[data-game="tap-match"] .game-icon {
  background: var(--gradient-coral);
}

.game-card[data-game="word-guess"] .game-icon {
  background: var(--gradient-peach);
}

.game-card[data-game="minesweeper"] .game-icon {
  background: var(--gradient-navy);
}

.game-card[data-game="hangman"] .game-icon {
  background: linear-gradient(135deg, #FF9A76 0%, #FFBC94 100%);
}

.game-card[data-game="sound-memory"] .game-icon {
  background: var(--gradient-navy);
}

.game-card[data-game="snake"] .game-icon {
  background: var(--gradient-yellow);
}

.game-card[data-game="fruit-merge"] .game-icon {
  background: var(--gradient-green);
}

.game-card[data-game="chopper"] .game-icon {
  background: var(--gradient-teal);
}

.game-card[data-game="risk-battles"] .game-icon {
  background: var(--gradient-navy);
}

.game-card[data-game="poker"] .game-icon {
  background: var(--gradient-purple);
}

.game-card[data-game="mahjong"] .game-icon {
  background: var(--gradient-coral);
}

.game-card[data-game="bubble-shooter"] .game-icon {
  background: var(--gradient-blue);
}

.game-card[data-game="big2"] .game-icon {
  background: var(--gradient-peach);
}

.game-card[data-game="2048"] .game-icon {
  background: var(--gradient-yellow);
}

/* Game Container */
html,
body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

/* Ensure game container fills viewport without scrolling */
.game-container {
  display: none;
  animation: fadeIn 0.5s ease;
  position: relative;
  /* for HUD overlay */
  height: 100vh;
  /* fill viewport */
  overflow: hidden;
}

.game-container.active {
  display: block;
}

#menu-container {
  max-height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
  /* Firefox */
  -ms-overflow-style: none;
  /* IE/Edge */
}

#menu-container::-webkit-scrollbar {
  display: none;
  /* Chrome/Safari */
}

/* Hide scrollbar for horizontal controls */
.game-controls-bar::-webkit-scrollbar {
  display: none;
}

.game-controls-bar {
  scrollbar-width: none;
}


.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--spacing-lg);
  flex-wrap: wrap;
  gap: var(--spacing-md);
}

.game-title {
  font-size: 2.5rem;
  font-weight: 700;
}

.game-controls {
  display: flex;
  gap: var(--spacing-sm);
  align-items: center;
}

/* Buttons */
.btn {
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: 'Inter', sans-serif;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.btn:active::before {
  width: 300px;
  height: 300px;
}

.btn-primary {
  background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
  color: white;
}

.btn-primary:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255, 255, 255, 0.3);
}

.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(1.05);
}

.difficulty-btn.active {
  background: linear-gradient(135deg, #4ECDC4 0%, #7FE5DD 100%);
  border-color: #4ECDC4;
  box-shadow: 0 4px 20px rgba(78, 205, 196, 0.4);
  transform: scale(1.05);
}


/* Back Button - Circular Icon Style */
.btn-back-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  padding: 0;
  transition: all var(--transition-fast);
  backdrop-filter: blur(10px);
  cursor: pointer;
  flex-shrink: 0;
}

.btn-back-icon:hover {
  background: rgba(0, 0, 0, 0.5);
  transform: scale(1.1);
  border-color: rgba(255, 255, 255, 0.4);
}

.btn-back-icon svg {
  width: 24px;
  height: 24px;
  stroke: currentColor;
  stroke-width: 2.5;
}

/* Header Layout Alignment */
.game-header-left {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}

.btn-back:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* Game Board Styles */
.game-board {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-lg);
  padding: var(--spacing-lg);
  border: 2px solid rgba(255, 255, 255, 0.2);
  margin-top: var(--spacing-lg);
}

.game-stats {
  display: flex;
  gap: var(--spacing-lg);
  justify-content: center;
  margin-bottom: var(--spacing-lg);
  flex-wrap: wrap;
}

.stat {
  text-align: center;
  background: rgba(255, 255, 255, 0.1);
  padding: var(--spacing-sm) var(--spacing-md);
  border-radius: var(--radius-md);
  min-width: 120px;
}

.stat-label {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-bottom: 0.25rem;
}

.stat-value {
  font-size: 1.8rem;
  font-weight: 700;
}

/* Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {

  0%,
  100% {
    transform: scale(1);
  }

  50% {
    transform: scale(1.05);
  }
}

@keyframes shake {

  0%,
  100% {
    transform: translateX(0);
  }

  25% {
    transform: translateX(-10px);
  }

  75% {
    transform: translateX(10px);
  }
}

/* Responsive Design */
@media (max-width: 768px) {

  /* Prevent horizontal scroll */
  body {
    overflow-x: hidden;
  }

  header h1 {
    font-size: 2.5rem;
  }

  header p {
    font-size: 1rem;
  }

  .game-grid {
    grid-template-columns: 1fr;
    gap: var(--spacing-md);
  }

  .game-title {
    font-size: 1.8rem;
  }

  .container {
    padding: var(--spacing-sm);
  }

  .game-board {
    padding: var(--spacing-sm);
    overflow-x: auto;
  }

  /* Ensure game cards are tappable */
  .game-card {
    padding: var(--spacing-md);
    min-height: 80px;
  }

  .game-card h2 {
    font-size: 1.5rem;
  }

  .game-card p {
    font-size: 0.85rem;
  }

  /* Button improvements */
  .btn {
    padding: 0.875rem 1.25rem;
    font-size: 1rem;
    min-height: 44px;
    min-width: 44px;
  }

  .game-header {
    flex-direction: row;
    /* Keep row layout on mobile */
    align-items: center;
    gap: var(--spacing-sm);
  }

  .game-controls {
    width: auto;
    /* Don't take full width */
    justify-content: flex-end;
    /* Align to right */
    flex-wrap: wrap;
    flex-grow: 1;
    /* Allow to grow if needed, or keeping it auto is fine */
  }

  /* Reduce title size slightly to fit */
  .game-title {
    font-size: 1.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Stats adjustments */
  .game-stats {
    gap: var(--spacing-sm);
    font-size: 0.9rem;
  }

  .stat {
    min-width: 100px;
    padding: var(--spacing-xs) var(--spacing-sm);
  }

  .stat-value {
    font-size: 1.5rem;
  }

  /* Card game specific */
  .card {
    width: 60px;
    height: 85px;
    font-size: 14px;
  }

  .card-corner {
    font-size: 14px;
  }

  .card-center {
    font-size: 28px;
  }

  /* Mahjong tiles */
  .mahjong-tile {
    width: 35px;
    height: 45px;
    font-size: 20px;
  }

  /* Modal improvements */
  .game-modal-content {
    padding: var(--spacing-lg);
    max-width: 90%;
  }

  .game-modal-content h2 {
    font-size: 1.8rem;
  }

  .instructions-content {
    padding: var(--spacing-lg);
    max-width: 90%;
  }

  .instructions-content h3 {
    font-size: 1.5rem;
  }

  .instructions-content li {
    font-size: 0.9rem;
  }

  /* Mahjong mobile fixes */
  #mahjong-board {
    height: 400px;
    /* Reduced from 500px for better mobile fit */
  }

  /* Big 2 mobile fixes - reduce card overlap */
  #big2-player-hand {
    gap: -10px !important;
    /* Override inline style, less cramped than -30px */
    padding: 10px !important;
  }

  /* Poker mobile fixes - improve spacing */
  #poker-controls {
    gap: var(--spacing-sm) !important;
    flex-wrap: wrap;
  }

  #poker-community-cards {
    gap: 5px;
    flex-wrap: wrap;
  }

  #poker-player-hand {
    gap: 5px;
    flex-wrap: wrap;
  }

  /* Bubble Shooter mobile fixes */
  #bubble-shooter-canvas {
    max-width: 100%;
    height: auto;
  }

  #bubble-shooter-board {
    height: auto;
    min-height: 400px;
  }
}


/* Hidden utility */
.hidden {
  display: none !important;
}

/* Game Instructions Overlay */
.game-instructions {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.3s ease;
  padding: var(--spacing-lg);
}

.instructions-content {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  padding: var(--spacing-xl);
  max-width: 500px;
  width: 100%;
  border: 2px solid rgba(255, 255, 255, 0.3);
  box-shadow: var(--shadow-lg);
  animation: fadeInUp 0.5s ease;
}

.instructions-content h3 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: var(--spacing-md);
  text-align: center;
}

.instructions-content ul {
  list-style: none;
  margin-bottom: var(--spacing-lg);
}

.instructions-content li {
  padding: var(--spacing-xs) 0;
  font-size: 1rem;
  line-height: 1.6;
  position: relative;
  padding-left: 1.5rem;
}

.instructions-content li::before {
  content: '•';
  position: absolute;
  left: 0;
  color: var(--teal);
  font-weight: 700;
  font-size: 1.2rem;
}

.instructions-content strong {
  color: var(--yellow);
  font-weight: 600;
}

.instructions-content .btn {
  width: 100%;
  font-size: 1.1rem;
  padding: 1rem;
}

@media (max-width: 768px) {
  .instructions-content {
    padding: var(--spacing-lg);
  }

  .instructions-content h3 {
    font-size: 1.5rem;
  }

  .instructions-content li {
    font-size: 0.9rem;
  }
}

/* Game Modal */
.game-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  animation: fadeIn 0.3s ease;
  padding: var(--spacing-lg);
}

.game-modal-content {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(30px);
  border-radius: var(--radius-xl);
  padding: var(--spacing-xl);
  max-width: 450px;
  width: 100%;
  border: 2px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  text-align: center;
  animation: modalSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalSlideIn {
  from {
    opacity: 0;
    transform: scale(0.8) translateY(-50px);
  }

  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.game-modal-icon {
  font-size: 5rem;
  margin-bottom: var(--spacing-md);
  animation: iconBounce 0.6s ease;
  display: inline-block;
}

@keyframes iconBounce {

  0%,
  100% {
    transform: scale(1);
  }

  25% {
    transform: scale(1.2);
  }

  50% {
    transform: scale(0.9);
  }

  75% {
    transform: scale(1.1);
  }
}

.game-modal-content h2 {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: var(--spacing-sm);
  background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.game-modal-content p {
  font-size: 1.2rem;
  opacity: 0.9;
  margin-bottom: var(--spacing-lg);
  line-height: 1.6;
}

.game-modal-content .btn {
  width: 100%;
  font-size: 1.2rem;
  padding: 1rem;
}

@media (max-width: 768px) {
  .game-modal-content {
    padding: var(--spacing-lg);
  }

  .game-modal-icon {
    font-size: 4rem;
  }

  .game-modal-content h2 {
    font-size: 2rem;
  }

  .game-modal-content p {
    font-size: 1rem;
  }

  .game-modal-content .btn {
    font-size: 1rem;
    padding: 0.8rem;
  }
}

/* Make canvas responsive on mobile */
#chopper-canvas {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Mahjong Styles */
#mahjong-board {
  position: relative;
  width: 100%;
  height: 500px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.mahjong-tile {
  position: absolute;
  width: 40px;
  height: 52px;
  background: #f0e6d2;
  border: 1px solid #c0b6a2;
  border-radius: 4px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3),
    inset 1px 1px 0 rgba(255, 255, 255, 0.5);
  transition: transform 0.1s, box-shadow 0.1s;
  user-select: none;
  z-index: 1;
}

.mahjong-tile:hover {
  transform: translateY(-2px);
  box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4),
    inset 1px 1px 0 rgba(255, 255, 255, 0.5);
  z-index: 10;
}

.mahjong-tile.selected {
  background: #fff8e0;
  border-color: #ffd700;

/* Risk Game Styles */
#risk-map-container {
  position: relative;
  user-select: none;
  transition: border-color 0.5s ease;
  border-radius: 10px;
}

.risk-territory-badge {
  position: absolute;
  width: 30px;
  height: 30px;
  background: #ccc;
  border: 2px solid #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 10;
}

.risk-territory-badge:hover {
  transform: translate(-50%, -50%) scale(1.2);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
  z-index: 20;
}

.risk-territory-badge.selected {
  box-shadow: 0 0 0 3px #FFD700, 0 4px 8px rgba(0, 0, 0, 0.6);
  transform: translate(-50%, -50%) scale(1.2);
  z-index: 30;
}

.badge-count {
  color: white;
  font-weight: bold;
  font-size: 0.9rem;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
}

/* Action feedback animations */
.risk-territory-badge.attacking {
  animation: pulse-attack 0.5s ease-in-out 3;
}

.risk-territory-badge.defending {
  animation: pulse-defend 0.5s ease-in-out 3;
}

.risk-territory-badge.reinforcing {
  animation: pulse-reinforce 0.3s ease-in-out 2;
}

.risk-territory-badge.conquered {
  animation: flash-conquered 0.8s ease-in-out;
}

@keyframes pulse-attack {

  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.4);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.6);
  }
}

@keyframes pulse-defend {

  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.3);
    box-shadow: 0 0 20px rgba(255, 165, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.6);
  }
}

@keyframes pulse-reinforce {

  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.2);
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
  }
}

@keyframes flash-conquered {
  0% {
    transform: translate(-50%, -50%) scale(1);
  }

  25% {
    transform: translate(-50%, -50%) scale(1.5);
    box-shadow: 0 0 30px rgba(255, 215, 0, 1);
  }

  50% {
    transform: translate(-50%, -50%) scale(1.3);
  }

  75% {
    transform: translate(-50%, -50%) scale(1.5);
    box-shadow: 0 0 30px rgba(255, 215, 0, 1);
  }

  100% {
    transform: translate(-50%, -50%) scale(1);
  }
}

    // Global Modal Utility
window.showGameModal = function (icon, title, message, callback, exitCallback) {
  const modal = document.getElementById('game-modal');
  const modalIcon = document.getElementById('game-modal-icon');
  const modalTitle = document.getElementById('game-modal-title');
  const modalMessage = document.getElementById('game-modal-message');
  const modalBtn = document.getElementById('game-modal-btn');
  const exitBtn = document.getElementById('game-modal-exit-btn');

  modalIcon.textContent = icon;
  modalTitle.textContent = title;
  modalMessage.textContent = message;

  // Remove previous click handlers
  const newBtn = modalBtn.cloneNode(true);
  modalBtn.parentNode.replaceChild(newBtn, modalBtn);

  // Add new click handler
  newBtn.addEventListener('click', () => {
    modal.classList.add('hidden');
    if (callback) callback();
  });

  // Handle exit button
  if (exitBtn) {
    if (exitCallback) {
      exitBtn.classList.remove('hidden');
      const newExitBtn = exitBtn.cloneNode(true);
      exitBtn.parentNode.replaceChild(newExitBtn, exitBtn);

      newExitBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        exitCallback();
      });
    } else {
      exitBtn.classList.add('hidden');
    }
  }

  // Show modal
  modal.classList.remove('hidden');
};

// Main App Controller
class GameApp {
  constructor() {
    this.currentGame = null;
    this.menuContainer = document.getElementById('menu-container');
    this.init();
  }

  init() {
    // Add click handlers for game cards
    const gameCards = document.querySelectorAll('.game-card');
    gameCards.forEach(card => {
      card.addEventListener('click', () => {
        const gameName = card.dataset.game;
        window.location.hash = gameName; // Update hash to trigger route handler
      });
    });

    // Add back button handlers (Event Delegation)
    document.addEventListener('click', (e) => {
      const backBtn = e.target.closest('.btn-back-icon');
      if (backBtn) {
        e.preventDefault();
        window.location.hash = ''; // Return to menu via hash
      }
    });

    // Handle routing
    window.addEventListener('hashchange', () => this.handleRoute());
    window.addEventListener('load', () => this.handleRoute());
  }

  handleRoute() {
    const hash = window.location.hash.slice(1); // Remove '#'
    if (hash) {
      this.showGame(hash);
    } else {
      this.showMenu();
    }
  }

  showGame(gameName) {
    // Hide menu first
    this.menuContainer.classList.add('hidden');

    // Hide any currently active game if switching directly between games (edge case)
    if (this.currentGame && this.currentGame !== gameName) {
      const currentContainer = document.getElementById(`${this.currentGame}-game`);
      if (currentContainer) currentContainer.classList.remove('active');
      this.cleanupGame(this.currentGame);
    }

    const gameContainer = document.getElementById(`${gameName}-game`);
    if (gameContainer) {
      gameContainer.classList.add('active');
      this.currentGame = gameName;

      // Show instructions if needed (simple check if already active handled by logic/CSS usually, but good to ensure)
      // Note: Some games hide instructions on start, so we only show if it's a "fresh" entry or we want to persist state?
      // Default behavior: show instructions when entering a game.
      const instructions = document.getElementById(`${gameName}-instructions`);
      if (instructions) {
        // Only show if we strictly want reset? 
        // Let's remove 'hidden' class to ensure they see it on entry.
        instructions.classList.remove('hidden');
      }

      // Initialize the game
      this.initializeGame(gameName);
    } else {
      // Invalid game hash -> go back to menu
      console.warn(`Game ${gameName} not found, redirecting to menu.`);
      window.location.hash = '';
    }
  }

  showMenu() {
    if (this.currentGame) {
      const gameContainer = document.getElementById(`${this.currentGame}-game`);
      if (gameContainer) {
        gameContainer.classList.remove('active');
      }

      // We don't necessarily need to reset instructions here, they are handled in showGame entry.

      // Clean up game
      this.cleanupGame(this.currentGame);
      this.currentGame = null;
    }
    this.menuContainer.classList.remove('hidden');
  }

  initializeGame(gameName) {
    switch (gameName) {
      case 'tap-match':
        if (window.tapMatchGame) window.tapMatchGame.init();
        break;
      case 'word-guess':
        if (window.wordGuessGame) window.wordGuessGame.init();
        break;
      case 'minesweeper':
        if (window.minesweeperGame) window.minesweeperGame.init();
        break;
      case 'hangman':
        if (window.hangmanGame) window.hangmanGame.init();
        break;
      case 'sound-memory':
        if (window.soundMemoryGame) window.soundMemoryGame.init();
        break;
      case 'snake':
        // Snake game is initialized by the user clicking "Start Game"
        break;
      case 'mahjong':
        if (window.mahjongGame) window.mahjongGame.init();
        break;
      case 'big2':
        if (window.big2Game) window.big2Game.init();
        break;
      case 'poker':
        if (window.pokerGame) window.pokerGame.init();
        break;
      case 'bubble-shooter':
        if (window.bubbleShooterGame) window.bubbleShooterGame.init();
        break;
      case 'risk-battles':
        if (window.riskGame) window.riskGame.init();
        break;
      case 'fruit-merge':
        if (window.fruitMergeGame) window.fruitMergeGame.init();
        break;
      case 'chopper':
        if (window.chopperGame) window.chopperGame.init();
        break;
      case '2048':
        if (window.game2048) window.game2048.init();
        break;
    }
  }

  cleanupGame(gameName) {
    switch (gameName) {
      case 'tap-match':
        if (window.tapMatchGame) window.tapMatchGame.cleanup();
        break;
      case 'word-guess':
        if (window.wordGuessGame) window.wordGuessGame.cleanup();
        break;
      case 'minesweeper':
        if (window.minesweeperGame) window.minesweeperGame.cleanup();
        break;
      case 'hangman':
        if (window.hangmanGame) window.hangmanGame.cleanup();
        break;
      case 'sound-memory':
        if (window.soundMemoryGame) window.soundMemoryGame.cleanup();
        break;
      case 'snake':
        if (window.snakeGame) window.snakeGame.cleanup();
        break;
      case 'mahjong':
        // No cleanup needed yet
        break;
      case 'big2':
        // No cleanup needed yet
        break;
      case 'poker':
        // No cleanup needed yet
        break;
      case 'chopper':
        if (window.chopperGame) window.chopperGame.cleanup();
        break;
    }
  }
}

class Projectile {
    constructor(x, y, vx, vy, type, owner, damage) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.type = type; // 'bullet' or 'bomb'
        this.owner = owner; // 'player' or 'enemy'
        this.damage = damage || (type === 'bomb' ? 50 : 10);
        this.active = true;
        this.width = type === 'bullet' ? 6 : 8;
        this.height = type === 'bullet' ? 6 : 8;
        this.trail = []; // Store previous positions
    }

    update() {
        // Store position for trail
        if (this.type === 'bomb' || this.type === 'missile') {
            this.trail.push({ x: this.x, y: this.y });
            if (this.trail.length > 10) this.trail.shift();
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.type === 'bomb') {
            this.vy += 0.1; // Gravity for bombs
        }

        // Deactivate if out of bounds (with some buffer)
        if (this.y > 2000 || this.y < -1000 || this.x < -1000 || this.x > 4000) {
            this.active = false;
        }

        // Mark bombs for explosion when they hit ground (handled in game loop)
        this.hitGround = false;
    }

    draw(ctx) {
        // Draw trail
        if (this.trail.length > 0) {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for (let i = 1; i < this.trail.length; i++) {
                ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            ctx.strokeStyle = 'rgba(200, 200, 200, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        ctx.fillStyle = this.owner === 'player' ? '#ff0' : '#f00';
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

class Particle {
    constructor(x, y, color, type = 'default') {
        this.x = x;
        this.y = y;
        this.color = color;
        this.type = type;
        this.active = true;

        switch (type) {
            case 'explosion':
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = Math.random() * 3 + 2;
                this.lifetime = 30 + Math.random() * 20;
                this.gravity = 0;
                break;
            case 'smoke':
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -Math.random() * 2 - 1;
                this.size = Math.random() * 5 + 5;
                this.lifetime = 60 + Math.random() * 30;
                this.gravity = 0;
                break;
            case 'debris':
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = -Math.random() * 5 - 2;
                this.size = Math.random() * 3 + 2;
                this.lifetime = 60;
                this.gravity = 0.2;
                break;
            case 'spark':
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.size = Math.random() * 2 + 1;
                this.lifetime = 10;
                this.gravity = 0;
                break;
            default:
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = 2;
                this.lifetime = 30;
                this.gravity = 0.1;
        }
        this.maxLifetime = this.lifetime;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;

        if (this.type === 'smoke') {
            this.size += 0.1;
        } else if (this.type === 'debris') {
            // Simple ground collision
            if (this.y > 600) { // Approx ground level
                this.y = 600;
                this.vy *= -0.5;
                this.vx *= 0.8;
            }
        }

        this.lifetime--;

        if (this.lifetime <= 0) {
            this.active = false;
        }
    }

    draw(ctx) {
        const alpha = Math.max(0, this.lifetime / this.maxLifetime);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;

        // If rgba, we can try to adjust alpha directly, but globalAlpha is easier for generic support
        // However, the original code used replace for rgba to handle fade out without affecting other things?
        // But globalAlpha is fine for particles.

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class Bunker {
    constructor(x, y, game) {
        this.x = x;
        this.y = y;
        this.game = game;
        this.width = 40;
        this.height = 30;
        this.owner = 'neutral'; // 'neutral', 'friendly', 'enemy'
        this.captureProgress = 0; // 0 to 100
        this.captureSpeed = 0.5;
        this.turretCooldown = 0;
        this.turretRange = 400;
        this.active = true;
    }

    update() {
        // Capture Logic
        this.handleCapture();

        // Turret Logic
        this.handleTurret();
    }

    handleCapture() {
        let capturingUnit = null;

        // Check for infantry collision
        // We check all units, but only infantry can capture
        const units = [...this.game.friendlyUnits, ...this.game.enemies];

        // Count units from each side in range
        let friendlyCount = 0;
        let enemyCount = 0;

        units.forEach(unit => {
            if (!unit.active || unit.type !== 'infantry') return;

            if (unit.x > this.x - 20 && unit.x < this.x + this.width + 20 &&
                Math.abs(unit.y - this.y) < 50) {

                if (unit.friendly) friendlyCount++;
                else enemyCount++;
            }
        });

        // Capture logic
        if (friendlyCount > 0 && enemyCount === 0) {
            // Friendly capturing
            if (this.owner === 'friendly') {
                this.captureProgress = 100; // Already owned
            } else if (this.owner === 'neutral') {
                this.captureProgress += this.captureSpeed * friendlyCount;
                if (this.captureProgress >= 100) {
                    this.owner = 'friendly';
                    this.captureProgress = 100;
                    this.game.createExplosion(this.x + this.width / 2, this.y, 5); // Visual cue
                }
            } else { // Enemy owned
                this.captureProgress -= this.captureSpeed * friendlyCount;
                if (this.captureProgress <= 0) {
                    this.owner = 'neutral';
                    this.captureProgress = 0;
                }
            }
        } else if (enemyCount > 0 && friendlyCount === 0) {
            // Enemy capturing
            if (this.owner === 'enemy') {
                this.captureProgress = 100;
            } else if (this.owner === 'neutral') {
                this.captureProgress += this.captureSpeed * enemyCount;
                if (this.captureProgress >= 100) {
                    this.owner = 'enemy';
                    this.captureProgress = 100;
                    this.game.createExplosion(this.x + this.width / 2, this.y, 5);
                }
            } else { // Friendly owned
                this.captureProgress -= this.captureSpeed * enemyCount;
                if (this.captureProgress <= 0) {
                    this.owner = 'neutral';
                    this.captureProgress = 0;
                }
            }
        } else {
            // Decay if empty (optional, maybe keep progress?)
            // For now, let's keep progress so it's not too frustrating
        }

        // Clamp progress
        this.captureProgress = Math.max(0, Math.min(100, this.captureProgress));
    }

    handleTurret() {
        if (this.owner === 'neutral') return;

        if (this.turretCooldown > 0) {
            this.turretCooldown--;
            return;
        }

        // Target logic
        let target = null;

        if (this.owner === 'enemy') {
            // Enemy bunker shoots at player or friendly units
            // Prioritize player if close
            const distToPlayer = Math.abs(this.game.player.x - this.x);
            if (distToPlayer < this.turretRange && this.game.player.active) {
                target = this.game.player;
            } else {
                // Look for friendly units
                // Simple find nearest
                let minDist = this.turretRange;
                this.game.friendlyUnits.forEach(unit => {
                    if (!unit.active) return;
                    const dist = Math.abs(unit.x - this.x);
                    if (dist < minDist) {
                        minDist = dist;
                        target = unit;
                    }
                });
            }
        } else {
            // Friendly bunker shoots at enemy units
            let minDist = this.turretRange;
            this.game.enemies.forEach(unit => {
                if (!unit.active) return;
                const dist = Math.abs(unit.x - this.x);
                if (dist < minDist) {
                    minDist = dist;
                    target = unit;
                }
            });
        }

        if (target) {
            this.shoot(target);
            this.turretCooldown = 120; // 2 seconds
        }
    }

    shoot(target) {
        // Shoot horizontally toward target
        const speed = 6;
        const direction = target.x > this.x ? 1 : -1; // Shoot right or left
        const vx = speed * direction;
        const vy = 0; // Horizontal only

        // Create proper Projectile instance so collision detection works
        const owner = this.owner === 'friendly' ? 'player' : 'enemy';
        const projectile = new Projectile(
            this.x + this.width / 2,
            this.y - 5,  // Lower height so bullets hit infantry
            vx,
            vy,
            'bullet',
            owner,
            4 // Bunker damage (25% of original 15)
        );

        this.game.projectiles.push(projectile);
        this.game.createMuzzleFlash(this.x + this.width / 2, this.y - 5);
    }

    draw(ctx) {
        if (!this.active) return;

        // Color based on owner
        let color = '#9E9E9E'; // Neutral
        if (this.owner === 'friendly') color = '#4CAF50';
        if (this.owner === 'enemy') color = '#F44336';

        // Bunker Body
        ctx.fillStyle = color;
        ctx.fillRect(this.x, this.y - this.height, this.width, this.height);

        // Slits
        ctx.fillStyle = '#333';
        ctx.fillRect(this.x + 5, this.y - 20, 30, 5);

        // Turret on top
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(this.x + this.width / 2, this.y - this.height, 10, Math.PI, 0);
        ctx.fill();

        // Capture Progress Bar (if neutral or being captured)
        if (this.captureProgress > 0 && this.captureProgress < 100) {
            ctx.fillStyle = '#333';
            ctx.fillRect(this.x, this.y - this.height - 10, this.width, 4);

            // Bar color depends on who is capturing (based on current owner state transition)
            // If neutral, color matches who is filling it up.
            // Simplified: Just show white for progress
            ctx.fillStyle = '#FFF';
            ctx.fillRect(this.x, this.y - this.height - 10, this.width * (this.captureProgress / 100), 4);
        }

        // Flag/Indicator
        ctx.strokeStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(this.x + this.width, this.y - this.height);
        ctx.lineTo(this.x + this.width, this.y - this.height - 20);
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(this.x + this.width, this.y - this.height - 20);
        ctx.lineTo(this.x + this.width + 15, this.y - this.height - 15);
        ctx.lineTo(this.x + this.width, this.y - this.height - 10);
        ctx.fill();
    }
}

class GroundUnit {
    constructor(x, y, type, friendly = true) {
        this.x = x;
        this.y = y;
        this.type = type; // 'infantry', 'tank', 'missile', 'demo'
        this.friendly = friendly;
        this.active = true;
        this.state = 'move'; // move, attack, idle
        this.target = null;

        // Stats based on type
        this.width = 20;
        this.height = 20;
        this.attackRange = 100;
        this.attackCooldown = 0;
        this.attackInterval = 60;
        this.damage = 1;

        switch (type) {
            case 'infantry':
                this.health = 5;
                this.speed = 0.5; // Standardized speed
                this.cost = 5;
                this.width = 10;
                this.height = 10;
                this.attackRange = 100;
                this.damage = 1;
                this.attackInterval = 45;
                break;
            case 'tank':
                this.health = 30;
                this.speed = 0.5;
                this.cost = 20;
                this.width = 30;
                this.height = 16;
                this.attackRange = 150;
                this.damage = 5;
                this.attackInterval = 90;
                break;
            case 'missile':
                this.health = 15;
                this.speed = 0.5;
                this.cost = 30;
                this.width = 24;
                this.height = 16;
                this.attackRange = 300; // Long range vs air
                this.damage = 10;
                this.attackInterval = 10; // Fast fire rate like auto-fire
                break;
            case 'demo':
                this.health = 40;
                this.speed = 0.5; // Standardized speed
                this.cost = 100;
                this.width = 36;
                this.height = 20;
                this.attackRange = 50;
                this.damage = 50; // Huge damage to buildings
                this.attackInterval = 180;
                break;
        }
        this.maxHealth = this.health;
    }

    update(targets, game) {
        if (!this.active) return;

        // Handle parachuting
        if (this.parachuting) {
            const groundY = game.canvas.height - 50;
            if (this.y < groundY) {
                // Fall slowly
                this.y += this.fallSpeed;
            } else {
                // Landed - stop parachuting
                this.y = groundY;
                this.parachuting = false;
                game.createDustPuff(this.x, this.y); // Landing dust
            }
            return; // Don't do normal AI while parachuting
        }

        // Cooldowns
        if (this.attackCooldown > 0) this.attackCooldown--;

        // AI State Machine
        this.target = this.findTarget(targets);

        if (this.target) {
            const dist = Math.abs(this.target.x - this.x);
            // Check if target is a Base (larger hitbox)
            const targetWidth = this.target instanceof Base ? this.target.width : 0;

            if (dist <= this.attackRange + targetWidth / 2) {
                this.state = 'attack';
            } else {
                this.state = 'move';
            }
        } else {
            this.state = 'move';
        }

        // Collision Avoidance (Spacing)
        let blocked = false;
        const safeDistance = 30; // Minimum pixels between units
        const allies = this.friendly ? game.friendlyUnits : game.enemies;

        for (const ally of allies) {
            if (ally === this || !ally.active || ally.parachuting) continue;

            // Check if ally is directly ahead
            if (this.friendly) {
                // Moving Right: Ally is to the right (x > this.x) and close
                if (ally.x > this.x && ally.x < this.x + safeDistance) {
                    blocked = true;
                    break;
                }
            } else {
                // Moving Left: Ally is to the left (x < this.x) and close
                if (ally.x < this.x && ally.x > this.x - safeDistance) {
                    blocked = true;
                    break;
                }
            }
        }

        // Execute State
        if (this.state === 'move' && !blocked) {
            if (this.friendly) {
                this.x += this.speed;
            } else {
                this.x -= this.speed;
            }
            // Keep in bounds
            if (this.x < 0) this.x = 0;
            if (this.x > game.levelWidth) this.x = game.levelWidth;

            // Demo Truck Logic: Detonate on base contact
            if (this.type === 'demo') {
                const targetBase = this.friendly ? game.enemyBase : game.friendlyBase;
                if (targetBase && targetBase.active) {
                    const dist = Math.abs(this.x - targetBase.x);
                    // Check if touching base (approximate width)
                    if (dist < (this.width + targetBase.width) / 2) {
                        // Detonate!
                        game.createExplosion(this.x, this.y, 30); // Big explosion
                        this.active = false; // Truck destroyed
                        targetBase.takeDamage(targetBase.maxHealth); // Instantly destroy base
                        console.log('Demo Truck detonated on base!');
                    }
                }
            }
        } else if (this.state === 'attack') {
            if (this.attackCooldown <= 0 && this.target) {
                this.attack(this.target, game);
                this.attackCooldown = this.attackInterval;
            }
        }
    }

    findTarget(targets) {
        let nearest = null;
        let minDist = Infinity;

        targets.forEach(target => {
            if (!target.active || target.friendly === this.friendly) return;

            // Calculate distance
            const dist = Math.abs(target.x - this.x);

            // Prioritize Base if close enough (Demo trucks love bases)
            if (this.type === 'demo' && target instanceof Base) {
                if (dist < minDist) {
                    minDist = dist;
                    nearest = target;
                }
                return;
            }

            // Missiles prioritize helicopters
            if (this.type === 'missile') {
                const isHelicopter = target.type === 'helicopter' || target instanceof EnemyHelicopter;
                if (isHelicopter && dist < 600) { // Longer range for air targets
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = target;
                    }
                }
                return; // Only target helicopters
            }

            // Standard targeting for other units
            if (dist < minDist && dist < 400) { // Detection range
                minDist = dist;
                nearest = target;
            }
        });

        return nearest;
    }

    attack(target, game) {
        // Visual effect
        game.createMuzzleFlash(this.friendly ? this.x + this.width / 2 : this.x - this.width / 2, this.y, this.friendly ? 'right' : 'left');

        let vx, vy;

        if (this.type === 'missile' && target) {
            // Aim at target center
            let targetX = target.x;
            let targetY = target.y;

            // Adjust for different anchor points
            if (target instanceof Base) {
                targetX += target.width / 2; // Base x is left
                targetY -= target.height / 2; // Base y is bottom
            } else if (target instanceof GroundUnit) {
                targetY -= target.height / 2; // Unit y is bottom
            }
            // Helicopter x,y is center, so no adjustment needed

            const dx = targetX - this.x;
            const dy = targetY - (this.y - 10); // Fire from slightly above ground
            const angle = Math.atan2(dy, dx);
            const speed = 5;

            vx = Math.cos(angle) * speed;
            vy = Math.sin(angle) * speed;
        } else {
            // Standard horizontal fire
            vx = this.friendly ? 5 : -5;
            // Add some inaccuracy
            vy = (Math.random() - 0.5) * 1;
        }

        // Use Projectile class!
        game.projectiles.push(new Projectile(
            this.x,
            this.y - 5,
            vx,
            vy,
            this.type === 'missile' ? 'missile' : 'bullet',
            this.friendly ? 'player' : 'enemy',
            this.damage
        ));
    }

    takeDamage(amount) {
        this.health -= amount;
        if (this.health <= 0) {
            this.active = false;
            return true; // Destroyed
        }
        return false;
    }

    draw(ctx, game = null) {
        if (!this.active) return;

        // Draw parachute if parachuting
        if (this.parachuting) {
            // Parachute canopy
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(this.x, this.y - 20, 12, 0, Math.PI, true); // Half circle
            ctx.fill();

            // Parachute lines
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(this.x - 10, this.y - 8);
            ctx.lineTo(this.x - 5, this.y - 5);
            ctx.moveTo(this.x + 10, this.y - 8);
            ctx.lineTo(this.x + 5, this.y - 5);
            ctx.stroke();
        }

        ctx.fillStyle = this.friendly ? '#4CAF50' : '#F44336';

        // Draw health bar if damaged
        if (this.health < this.maxHealth) {
            const hpPct = this.health / this.maxHealth;
            ctx.fillStyle = '#333';
            ctx.fillRect(this.x - 10, this.y - 25, 20, 4);
            ctx.fillStyle = hpPct > 0.5 ? '#0f0' : '#f00';
            ctx.fillRect(this.x - 10, this.y - 25, 20 * hpPct, 4);

            // Reset color
            ctx.fillStyle = this.friendly ? '#4CAF50' : '#F44336';
        }

        switch (this.type) {
            case 'infantry':
                ctx.fillRect(this.x - 5, this.y - 10, 10, 10);
                // Head
                ctx.fillStyle = '#eec';
                ctx.beginPath();
                ctx.arc(this.x, this.y - 12, 3, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'tank':
                // Disable sprite for now - original graphics look better
                const useSprite = false; // game && game.spritesLoaded && game.sprites.tank.complete;

                if (useSprite) {
                    ctx.save();
                    ctx.translate(this.x, this.y - 12);

                    // Flip if not friendly (enemy tanks face left)
                    if (!this.friendly) {
                        ctx.scale(-1, 1);
                    }

                    const spriteWidth = 40;
                    const spriteHeight = 24;
                    ctx.drawImage(game.sprites.tank, -spriteWidth / 2, -spriteHeight / 2, spriteWidth, spriteHeight);

                    ctx.restore();
                } else {
                    // Fallback to original graphics
                    ctx.save();
                    ctx.translate(this.x, this.y - 12);

                    // Flip if not friendly (enemy tanks face left)
                    if (!this.friendly) {
                        ctx.scale(-1, 1);
                    }

                    // Treads (Tracks)
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-18, 6, 36, 6);

                    // Wheels inside treads
                    ctx.fillStyle = '#555';
                    for (let i = -14; i <= 14; i += 7) {
                        ctx.beginPath();
                        ctx.arc(i, 9, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Main Hull
                    ctx.fillStyle = this.friendly ? '#558B2F' : '#C62828'; // Olive Green or Dark Red
                    ctx.beginPath();
                    ctx.moveTo(-18, 6);
                    ctx.lineTo(-14, 0);
                    ctx.lineTo(14, 0);
                    ctx.lineTo(18, 6);
                    ctx.closePath();
                    ctx.fill();

                    // Hull shading/detail
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(-14, 0, 28, 2);

                    // Turret
                    ctx.fillStyle = this.friendly ? '#689F38' : '#D32F2F'; // Slightly lighter
                    ctx.beginPath();
                    ctx.moveTo(-8, 0);
                    ctx.lineTo(-6, -8);
                    ctx.lineTo(6, -8);
                    ctx.lineTo(10, 0);
                    ctx.closePath();
                    ctx.fill();

                    // Turret Hatch
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.arc(0, -5, 3, 0, Math.PI * 2);
                    ctx.fill();

                    // Barrel
                    ctx.fillStyle = '#212121';
                    ctx.fillRect(6, -6, 14, 3);

                    // Muzzle brake
                    ctx.fillRect(18, -7, 4, 5);

                    // Star marking for friendly
                    if (this.friendly) {
                        ctx.fillStyle = '#FFF';
                        ctx.beginPath();
                        // Simple star approximation or just a white square/circle
                        ctx.arc(-4, 3, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.restore();
                }
                break;
            case 'missile':
                ctx.fillRect(this.x - 12, this.y - 12, 24, 12);
                // Launcher
                ctx.fillStyle = '#333';
                ctx.save();
                ctx.translate(this.x, this.y - 15);
                ctx.rotate(this.friendly ? -Math.PI / 4 : Math.PI / 4);
                ctx.fillRect(-5, -8, 10, 16);
                ctx.restore();
                break;
            case 'demo':
                ctx.fillRect(this.x - 18, this.y - 15, 36, 15);
                // Cargo
                ctx.fillStyle = '#FFC107';
                ctx.fillRect(this.x - 15, this.y - 22, 30, 7);
                break;
        }
    }
}

class Helicopter {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 40;
        this.height = 20;
        this.type = 'helicopter'; // For identification (missile targeting)

        // Resources
        this.health = 100;
        this.maxHealth = 100;
        this.fuel = 100;
        this.maxFuel = 100;
        this.ammo = 10; // Bombs
        this.maxAmmo = 10;
        this.lives = 3;
        this.active = true; // Indicates if helicopter is alive and controllable

        // Transport system
        this.cargo = []; // Infantry being transported
        this.maxCargo = 5; // Can carry up to 5 infantry

        // Facing direction: 1 = right, -1 = left
        this.facing = 1;
        this.targetFacing = 1;

        // Cooldowns
        this.shootCooldown = 0;
        this.bombCooldown = 0;

        // Landing state
        this.isLanded = false;
    }

    update(input, groundY) {
        if (!this.active) return;

        // Update facing direction immediately (no smooth transition)
        // Only update facing when NOT shooting (allows strafing/backward movement)
        if (!input.shooting) {
            if (input.horizontal < 0) {
                this.facing = -1;
            } else if (input.horizontal > 0) {
                this.facing = 1;
            }
        }
        // Apply horizontal input (tilt or arrow keys)
        const thrust = 0.3;
        this.vx += input.horizontal * thrust;

        // Apply gravity
        this.vy += 0.15;

        // Automatic hover lift (rotor keeps helicopter up)
        // Adjust hover strength based on vertical input
        let hoverLift = 0.2; // Base hover lift



        if (!this.isLanded || input.vertical < 0) {
            // W/ArrowUp increases lift (go up faster)
            if (input.vertical < 0) {
                hoverLift = 0.35;
            }
            // S/ArrowDown decreases lift (descend)
            else if (input.vertical > 0) {
                hoverLift = 0.05;
            }

            this.vy -= hoverLift;
        }

        // Air resistance
        this.vx *= 0.95;
        this.vy *= 0.98;

        // Update position
        this.x += this.vx;
        this.y += this.vy;

        // Fuel consumption (only when airborne)
        if (!this.isLanded && this.fuel > 0) {
            this.fuel -= 0.0165; // Depletes slowly (reduced to 33%)

            // Crash if out of fuel
            if (this.fuel <= 0) {
                this.fuel = 0;
                this.vy += 0.5; // Accelerate downward
            }
        }

        // Update cooldowns
        if (this.shootCooldown > 0) this.shootCooldown--;
        if (this.bombCooldown > 0) this.bombCooldown--;
    }

    draw(ctx, game = null) {
        if (!this.active) return;

        // Disable sprite for now - original graphics look better
        const useSprite = false; // game && game.spritesLoaded && game.sprites.helicopter.complete;

        if (useSprite) {
            // Draw using sprite
            ctx.save();

            // Detect backward movement
            const isBackward = (this.facing === 1 && this.vx < -0.5) || (this.facing === -1 && this.vx > 0.5);
            let tilt = this.vx * 0.15;
            if (isBackward) {
                tilt = 0.3;
            }
            tilt = Math.max(-0.5, Math.min(0.5, tilt));

            ctx.translate(this.x, this.y);
            ctx.scale(this.facing, 1);
            ctx.rotate(tilt);

            // Draw sprite (centered)
            const spriteWidth = 60;
            const spriteHeight = 30;
            ctx.drawImage(game.sprites.helicopter, -spriteWidth / 2, -spriteHeight / 2, spriteWidth, spriteHeight);

            ctx.restore();
        } else {
            // Fallback to original graphics
            ctx.save();

            // Tilt: Nose always points downward when moving (forward or backward)
            // Positive rotation rotates the nose (local +X) downwards (towards local +Y)
            // Since we scale by (facing, 1), a positive rotation always dips the nose in screen space too.
            let tilt = Math.abs(this.vx) * 0.35;
            tilt = Math.max(0, Math.min(0.6, tilt)); // Clamp between 0 and 0.6

            ctx.translate(this.x, this.y);
            ctx.scale(this.facing, 1);
            ctx.rotate(tilt);

            // Draw helicopter in outline style (like reference image)
            ctx.strokeStyle = '#1565C0';
            ctx.fillStyle = '#1976D2';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Main body - angular shape with rounded front
            ctx.beginPath();
            // Start from back bottom
            ctx.moveTo(-20, 8);
            // Back side up
            ctx.lineTo(-20, -8);
            // Top line
            ctx.lineTo(10, -8);
            // Front top curve
            ctx.quadraticCurveTo(24, -8, 24, 0);
            // Front bottom curve
            ctx.quadraticCurveTo(24, 8, 10, 8);
            // Bottom line back
            ctx.lineTo(-20, 8);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Cockpit windows (two rectangular panels)
            ctx.fillStyle = '#64B5F6';
            ctx.strokeStyle = '#1565C0';
            ctx.lineWidth = 1.5;

            // Left window panel
            ctx.beginPath();
            ctx.rect(2, -6, 8, 10);
            ctx.fill();
            ctx.stroke();

            // Right window panel
            ctx.beginPath();
            ctx.rect(10, -6, 8, 10);
            ctx.fill();
            ctx.stroke();

            // Window divider
            ctx.beginPath();
            ctx.moveTo(10, -6);
            ctx.lineTo(10, 4);
            ctx.stroke();

            // Tail boom
            ctx.strokeStyle = '#1565C0';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-22, 0);
            ctx.lineTo(-35, 0);
            ctx.stroke();

            // Tail fin (vertical stabilizer)
            ctx.fillStyle = '#1976D2';
            ctx.beginPath();
            ctx.moveTo(-32, 0);
            ctx.lineTo(-35, -10);
            ctx.lineTo(-30, -10);
            ctx.lineTo(-28, 0);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Tail rotor housing
            ctx.fillStyle = '#1976D2';
            ctx.beginPath();
            ctx.arc(-35, -5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Landing skids (two parallel bars)
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;

            // Front skid strut
            ctx.beginPath();
            ctx.moveTo(10, 8);
            ctx.lineTo(10, 14);
            ctx.stroke();

            // Rear skid strut
            ctx.beginPath();
            ctx.moveTo(-10, 8);
            ctx.lineTo(-10, 14);
            ctx.stroke();

            // Skid bars
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-15, 14);
            ctx.lineTo(15, 14);
            ctx.stroke();

            // Main rotor mast
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(0, -14);
            ctx.stroke();

            // Rotor hub
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(0, -14, 3, 0, Math.PI * 2);
            ctx.fill();

            // Main rotor blades (static horizontal line)
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-35, -14);
            ctx.lineTo(35, -14);
            ctx.stroke();

            // Tail rotor (animated)
            const rotorAngle = Date.now() * 0.05; // Keep rotorAngle for tail rotor
            ctx.save();
            ctx.translate(-35, -5);
            ctx.rotate(rotorAngle * 2);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(0, 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.lineTo(8, 0);
            ctx.stroke();
            ctx.restore();

            ctx.restore();
        }

        // Health bar (always visible above helicopter, not rotated)
        ctx.fillStyle = '#333';
        ctx.fillRect(this.x - 20, this.y - 30, 40, 4);
        ctx.fillStyle = this.health > 30 ? '#4CAF50' : '#F44336';
        ctx.fillRect(this.x - 20, this.y - 30, 40 * (Math.max(0, this.health) / this.maxHealth), 4);
    }

    shoot() {
        if (this.shootCooldown <= 0 && this.fuel > 0) {
            this.shootCooldown = 10; // Fast cooldown for machine gun

            // Detect backward movement (moving opposite to facing)
            const isBackward = (this.facing === 1 && this.vx < -0.5) || (this.facing === -1 && this.vx > 0.5);

            let angle, spawnY;

            if (isBackward) {
                // Fire downward at 45-degree angle when moving backward
                // Fire in the direction we're FACING (not the direction we're moving)
                angle = this.facing === 1 ? Math.PI / 4 : (-Math.PI / 4);
                spawnY = this.y + 10; // Spawn lower
            } else {
                // Normal horizontal fire
                angle = this.facing === 1 ? 0 : Math.PI;
                spawnY = this.y;
            }

            const bulletSpeed = 10;

            // Calculate velocity vector
            const vx = Math.cos(angle) * bulletSpeed;
            const vy = Math.sin(angle) * bulletSpeed;

            // Calculate spawn position (nose of helicopter)
            const spawnDist = 25;
            const spawnX = this.x + Math.cos(angle) * spawnDist;

            return new Projectile(
                spawnX,
                spawnY,
                vx,
                vy,
                'bullet',
                'player'
            );
        }
        return null;
    }

    dropBomb() {
        if (this.bombCooldown <= 0 && this.ammo > 0 && this.fuel > 0) {
            this.bombCooldown = 30;
            this.ammo--;
            return new Projectile(
                this.x,
                this.y + 10,
                this.vx,
                this.vy + 2,
                'bomb',
                'player'
            );
        }
        return null;
    }

    hit(damage = 10) {
        this.health = Math.max(0, this.health - damage);
        return this.health <= 0;
    }

    die() {
        this.lives--;
        this.active = false; // Mark as inactive during respawn
        return this.lives <= 0; // Return true if game over
    }

    respawn(x, y) {
        // Respawn at specified location (friendly base)
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.health = this.maxHealth;
        this.fuel = this.maxFuel;
        this.ammo = this.maxAmmo;
        this.active = true;
    }

    pickUpInfantry(unit, game) {
        // Check if we have space
        if (this.cargo.length >= this.maxCargo) {
            return false; // Cargo full
        }

        // Add to cargo
        this.cargo.push(unit);

        // Remove from friendly units
        unit.active = false;

        // Visual feedback - dust puff instead of explosion
        game.createDustPuff(unit.x, unit.y);

        return true;
    }

    dropInfantry(game) {
        // If cargo is empty, try to buy one instantly (QoL feature)
        if (this.cargo.length === 0) {
            if (game.economy && game.economy.funds >= 500) {
                game.economy.purchase(500);
                // Proceed to drop (auto-bought)
            } else {
                return null; // No cargo and can't afford
            }
        } else {
            // Use existing cargo
            this.cargo.pop();
        }

        // Create new infantry at helicopter position (in the air)

        // Create new infantry at helicopter position (in the air)
        const newInfantry = new GroundUnit(
            this.x,
            this.y, // Start at helicopter's Y position
            'infantry',
            true // Friendly
        );

        // Set parachuting state
        newInfantry.parachuting = true;
        newInfantry.fallSpeed = 1; // Slow fall speed

        game.friendlyUnits.push(newInfantry);

        // Visual feedback - dust puff instead of explosion
        game.createDustPuff(this.x, this.y);

        return newInfantry;
    }

    tryPickupNearbyInfantry(game) {
        // Only pick up when landed or hovering very low
        const groundY = game.canvas.height - 50;
        if (this.y < groundY - 20 || this.cargo.length >= this.maxCargo) {
            return; // Too high or cargo full
        }

        // Check for nearby friendly infantry
        game.friendlyUnits.forEach(unit => {
            if (unit.active && unit.type === 'infantry' && this.cargo.length < this.maxCargo) {
                const dist = Math.abs(unit.x - this.x);
                if (dist < 30) { // Within 30 pixels
                    this.pickUpInfantry(unit, game);
                }
            }
        });
    }
}

class Helipad {
    constructor(x, y, width = 80, height = 10) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.refuelRate = 1.0; // Faster refueling
        this.repairRate = 1.0; // Faster repairs
        this.rearmRate = 1;
        this.rearmCounter = 0;
    }

    checkLanding(helicopter) {
        // Check if helicopter is within helipad bounds and low enough
        const inBounds =
            helicopter.x > this.x - this.width / 2 &&
            helicopter.x < this.x + this.width / 2 &&
            helicopter.y > this.y - 30 &&
            helicopter.y < this.y - 10;

        // Only consider landing if not moving up significantly
        const lowSpeed = Math.abs(helicopter.vx) < 2 && helicopter.vy > -0.5 && helicopter.vy < 2;

        return inBounds && lowSpeed;
    }

    service(helicopter) {
        // Refuel
        if (helicopter.fuel < helicopter.maxFuel) {
            helicopter.fuel = Math.min(helicopter.maxFuel, helicopter.fuel + this.refuelRate);
        }

        // Repair
        if (helicopter.health < helicopter.maxHealth) {
            helicopter.health = Math.min(helicopter.maxHealth, helicopter.health + this.repairRate);
        }

        // Rearm (slower but faster than before)
        if (helicopter.ammo < helicopter.maxAmmo) {
            this.rearmCounter++;
            if (this.rearmCounter >= 10) { // Every ~0.16 seconds (was 30)
                helicopter.ammo = Math.min(helicopter.maxAmmo, helicopter.ammo + 1);
                this.rearmCounter = 0;
            }
        } else {
            this.rearmCounter = 0;
        }
    }

    draw(ctx) {
        // Helipad platform
        ctx.fillStyle = '#666';
        ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);

        // Landing cross
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(this.x - 15, this.y + 5);
        ctx.lineTo(this.x + 15, this.y + 5);
        ctx.moveTo(this.x, this.y - 10);
        ctx.lineTo(this.x, this.y + 20);
        ctx.stroke();

        // "H" marking
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('H', this.x, this.y + 35);
    }
}

class Economy {
    constructor() {
        this.funds = 1000; // Starting money
        this.incomeTimer = 0;
        this.incomeInterval = 120; // 2 seconds at 60fps
        this.baseIncome = 100; // Doubled income rate
    }

    update() {
        // Passive income tick
        this.incomeTimer++;
        if (this.incomeTimer >= this.incomeInterval) {
            this.funds += this.baseIncome;
            this.incomeTimer = 0;
        }
    }

    awardBounty(amount) {
        this.funds += amount;
    }

    canAfford(cost) {
        return this.funds >= cost;
    }

    purchase(cost) {
        if (this.canAfford(cost)) {
            this.funds -= cost;
            return true;
        }
        return false;
    }
}

// Enemy AI Commander - Strategic decision making
class EnemyAICommander {
    constructor(economy, game) {
        this.economy = economy;
        this.game = game;

        // Decision timing
        this.decisionInterval = 120; // 2 seconds at 60fps (Faster decisions)
        this.decisionTimer = 0;

        // Strategy state
        this.strategy = 'balanced'; // defensive, balanced, aggressive
        this.threatLevel = 50; // 0-100

        // Unit counts for tracking
        this.unitCounts = {
            infantry: 0,
            tank: 0,
            missile: 0,
            demo: 0
        };
    }

    update() {
        this.decisionTimer++;
        // if (this.decisionTimer % 60 === 0) console.log('[AI Update] Frame:', this.decisionTimer, 'Funds:', this.economy.funds);

        if (this.decisionTimer >= this.decisionInterval) {
            this.makeDecision();
            this.decisionTimer = 0;
        }
    }

    makeDecision() {
        // console.log('[AI] Making decision at frame', this.decisionTimer, 'funds:', this.economy.funds, 'strategy:', this.strategy);
        // Assess the current situation
        this.assessSituation();

        // Choose strategy based on situation
        this.chooseStrategy();

        // Decide what unit to purchase
        const unitToPurchase = this.decideUnitPurchase();

        if (unitToPurchase) {
            this.purchaseUnit(unitToPurchase);
        }
    }

    assessSituation() {
        // Count enemy units (friendly to player = enemy to AI)
        const playerUnits = this.game.friendlyUnits.length;
        const aiUnits = this.game.enemies.length;

        // Count bunkers controlled
        const playerBunkers = this.game.bunkers.filter(b => b.owner === 'friendly').length;
        const aiBunkers = this.game.bunkers.filter(b => b.owner === 'enemy').length;

        // Calculate threat level
        let threat = 50; // Baseline

        // Unit superiority
        if (playerUnits > aiUnits) {
            threat += (playerUnits - aiUnits) * 5;
        } else {
            threat -= (aiUnits - playerUnits) * 5;
        }

        // Territory control
        if (playerBunkers > aiBunkers) {
            threat += (playerBunkers - aiBunkers) * 10;
        } else {
            threat -= (aiBunkers - playerBunkers) * 10;
        }

        // Player helicopter proximity to enemy base
        if (this.game.enemyBase) {
            const distToEnemyBase = Math.abs(this.game.player.x - this.game.enemyBase.x);
            if (distToEnemyBase < 1000) { // Increased threat range
                threat += 30;
            }
        }

        // Clamp threat level
        this.threatLevel = Math.max(0, Math.min(100, threat));
    }

    chooseStrategy() {
        if (this.threatLevel > 70) {
            this.strategy = 'defensive';
        } else if (this.threatLevel < 30) {
            this.strategy = 'aggressive';
        } else {
            this.strategy = 'balanced';
        }
    }

    decideUnitPurchase() {
        // Update unit counts
        this.updateUnitCounts();

        const funds = this.economy.funds;

        // Unit costs (match player costs)
        const costs = {
            infantry: 500,
            tank: 2000,
            missile: 3000,
            demo: 5000
        };

        // Check if player helicopter is a threat (nearby and alive)
        const playerHelicopterThreat = this.game.player.health > 0 &&
            this.game.player.x > this.game.levelWidth / 2;

        // Count neutral bunkers that can be captured
        const neutralBunkers = this.game.bunkers.filter(b => b.owner === 'neutral').length;

        // Decision tree based on strategy
        if (this.strategy === 'defensive') {
            // Prioritize anti-air and tanks
            if (playerHelicopterThreat && this.unitCounts.missile < 3 && funds >= costs.missile) {
                return 'missile';
            }
            if (this.unitCounts.tank < 5 && funds >= costs.tank) {
                return 'tank';
            }
            if (funds >= costs.infantry) {
                return 'infantry'; // Cheap meat shield
            }
        } else if (this.strategy === 'aggressive') {
            // Try for demo truck if we can afford it
            if (funds >= costs.demo && this.unitCounts.tank >= 2) {
                return 'demo';
            }
            // Build up tank force
            if (this.unitCounts.tank < 8 && funds >= costs.tank) {
                return 'tank';
            }
            // Capture bunkers for income
            if (neutralBunkers > 0 && this.unitCounts.infantry < 5 && funds >= costs.infantry) {
                return 'infantry';
            }
            // Default to tanks
            if (funds >= costs.tank) {
                return 'tank';
            }
        } else { // balanced
            // Balanced mix of units
            if (neutralBunkers > 0 && this.unitCounts.infantry < 3 && funds >= costs.infantry) {
                return 'infantry';
            }
            if (playerHelicopterThreat && this.unitCounts.missile < 2 && funds >= costs.missile) {
                return 'missile';
            }
            if (this.unitCounts.tank < 4 && funds >= costs.tank) {
                return 'tank';
            }
            if (funds >= costs.infantry) {
                return 'infantry';
            }
        }

        return null; // Can't afford anything or satisfied
    }

    updateUnitCounts() {
        this.unitCounts = {
            infantry: 0,
            tank: 0,
            missile: 0,
            demo: 0
        };

        for (const unit of this.game.enemies) {
            if (this.unitCounts.hasOwnProperty(unit.type)) {
                this.unitCounts[unit.type]++;
            }
        }
    }

    purchaseUnit(unitType) {
        const costs = {
            infantry: 500,
            tank: 2000,
            missile: 3000,
            demo: 5000
        };

        const cost = costs[unitType];

        if (this.economy.purchase(cost)) {
            // Spawn unit at enemy base
            if (this.game.enemyBase) {
                const spawnX = this.game.enemyBase.x - 50;
                const spawnY = this.game.canvas.height - 50;
                const newUnit = new GroundUnit(spawnX, spawnY, unitType, false);
                this.game.enemies.push(newUnit);

                // console.log(`AI purchased ${unitType} for $${cost}. Remaining funds: $${this.economy.funds}`);
            }
        }
    }
}

class RescueRaidersGame {
    constructor() {
        this.canvas = document.getElementById('chopper-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.scoreEl = document.getElementById('chopper-score');
        this.levelEl = document.getElementById('chopper-level');
        this.healthEl = document.getElementById('chopper-health');
        this.highScoreEl = document.getElementById('chopper-high-score');
        this.fuelEl = document.getElementById('chopper-fuel');
        this.ammoEl = document.getElementById('chopper-ammo');
        this.livesEl = document.getElementById('chopper-lives');
        this.fundsEl = document.getElementById('chopper-funds');

        this.gameLoop = null;
        this.player = null;
        this.helipad = null;
        this.economy = new Economy();
        this.enemies = [];
        this.projectiles = [];
        this.particles = [];
        this.terrain = [];
        this.score = 0;
        this.level = 1;
        this.difficulty = 'easy';
        this.gameState = 'menu';

        // Input state
        this.input = {
            horizontal: 0,
            vertical: 0,
            shooting: false,
            bombing: false
        };

        // Mobile orientation
        this.tiltEnabled = false;
        this.baseGamma = 0;

        // Camera offset
        this.cameraX = 0;
        this.levelWidth = 3000; // Wider map for RTS gameplay
        this.levelComplete = false;
        this.level = 1;
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('rescueRaidersHighScore') || '0');
        this.difficulty = 'easy';
        this.gameState = 'menu';
        this.respawnDelay = 120; // 2 seconds at 60fps (player only)
        this.respawnTimer = this.respawnDelay;

        // Load sprite images
        this.sprites = {
            helicopter: new Image(),
            tank: new Image()
        };
        this.sprites.helicopter.src = 'images/sprites/helicopter.png';
        this.sprites.tank.src = 'images/sprites/tank.png';
        this.spritesLoaded = false;

        // Check when all sprites are loaded
        let loadedCount = 0;
        const totalSprites = Object.keys(this.sprites).length;
        Object.values(this.sprites).forEach(img => {
            img.onload = () => {
                loadedCount++;
                if (loadedCount === totalSprites) {
                    this.spritesLoaded = true;
                    // console.log('All sprites loaded successfully');
                }
            };
            img.onerror = () => {
