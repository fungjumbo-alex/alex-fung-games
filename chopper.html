                console.warn('Failed to load sprite:', img.src);
            };
        });

        this.setupEventListeners();
    }

    setupEventListeners() {
        // Reset button
        const resetBtn = document.getElementById('chopper-reset');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => this.init());
        }

        // Keyboard controls
        this.keydownHandler = (e) => this.handleKeyDown(e);
        this.keyupHandler = (e) => this.handleKeyUp(e);

        // Touch/Mouse controls for shooting
        this.canvas.addEventListener('touchstart', (e) => this.handleTouch(e), { passive: false });
        this.canvas.addEventListener('touchend', (e) => this.handleTouchEnd(e), { passive: false });
        this.canvas.addEventListener('touchcancel', (e) => this.handleTouchEnd(e), { passive: false });
        this.canvas.addEventListener('mousedown', (e) => { this.canvas.focus(); this.handleClick(e); });

        // Virtual D-Pad for mobile
        this.setupVirtualDpad();

        // Device orientation for tilt controls
        if (window.DeviceOrientationEvent) {
            // Request permission for iOS 13+
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ requires permission
                // We'll request it when the user starts playing
                this.needsOrientationPermission = true;
            } else {
                // Non-iOS or older iOS, just add the listener
                window.addEventListener('deviceorientation', (e) => this.handleOrientation(e));
            }
        }

        // Unit purchase buttons
        document.getElementById('buy-infantry').addEventListener('click', () => this.purchaseUnit('infantry', 500));
        document.getElementById('buy-tank').addEventListener('click', () => this.purchaseUnit('tank', 2000));
        document.getElementById('buy-missile').addEventListener('click', () => this.purchaseUnit('missile', 3000));
        document.getElementById('buy-demo').addEventListener('click', () => this.purchaseUnit('demo', 5000));

        // Difficulty buttons
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                this.difficulty = btn.dataset.difficulty;
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Action buttons (Drop Bomb, Deploy Infantry)
        const btnDropBomb = document.getElementById('btn-drop-bomb');
        const btnDeployInfantry = document.getElementById('btn-deploy-infantry');

        if (btnDropBomb) {
            btnDropBomb.addEventListener('click', () => {
                if (this.gameState === 'playing') {
                    this.input.bombing = true;
                    setTimeout(() => this.input.bombing = false, 100); // Brief pulse
                }
            });
        }

        if (btnDeployInfantry) {
            btnDeployInfantry.addEventListener('click', () => {
                if (this.gameState === 'playing' && this.player) {
                    this.player.dropInfantry(this);
                }
            });
        }

        // Mobile controls setup removed (buttons removed)
    }

    // Helper to clean up event listeners
    cleanup() {
        document.removeEventListener('keydown', this.keydownHandler);
        document.removeEventListener('keyup', this.keyupHandler);
        window.removeEventListener('keydown', this.keydownHandler);
        window.removeEventListener('keyup', this.keyupHandler);
        if (this.gameLoop) {
            cancelAnimationFrame(this.gameLoop);
            this.gameLoop = null;
        }
    }

    init() {
        this.cleanup(); // Ensure clean slate
        this.level = 1;
        this.score = 0;
        // Don't set difficulty here - let user choose
        // Don't call startLevel() - wait for user to click "Got it! Let's Play"

        // Add event listeners
        document.addEventListener('keydown', this.keydownHandler);
        document.addEventListener('keyup', this.keyupHandler);
        // Also listen on window as fallback for embedded/iframed contexts
        window.addEventListener('keydown', this.keydownHandler);
        window.addEventListener('keyup', this.keyupHandler);

        // Prevent double-tap zoom on buttons
        document.addEventListener('dblclick', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                e.preventDefault();
            }
        }, { passive: false });

        // Robust double-tap prevention for touch devices
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });
    }

    startLevel() {
        this.gameState = 'playing';
        this.canvas.focus(); // Ensure keyboard events work

        // Show control hint briefly
        const hint = document.createElement('div');
        hint.id = 'control-hint';
        hint.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);padding:20px 30px;border-radius:12px;z-index:100;text-align:center;font-size:16px;color:#fff;pointer-events:none;';
        hint.innerHTML = '⌨️ WASD/Arrows to fly<br>Space to shoot<br><small>(fades in 2s)</small>';
        document.body.appendChild(hint);
        setTimeout(() => { hint.style.transition = 'opacity 1s'; hint.style.opacity = '0'; setTimeout(() => hint.remove(), 1000); }, 2000);

        // Resize canvas to fill the container (maximize play area)
        const container = this.canvas.parentElement;
        if (container) {
            this.canvas.width = container.clientWidth;
            this.canvas.height = container.clientHeight;
        }

        // Request gyroscope permission for iOS devices
        this.requestOrientationPermission();

        this.player = new Helicopter(150, this.canvas.height / 2);
        this.helipad = new Helipad(150, this.canvas.height - 50); // In front of base
        this.economy = new Economy();
        this.enemyEconomy = new Economy();
        this.aiCommander = new EnemyAICommander(this.enemyEconomy, this);

        // Initialize Audio
        if (!this.audio) {
            this.audio = new AudioController();
        }

        this.enemies = [];
        this.enemyChoppers = [];
        this.friendlyUnits = [];
        this.bases = [];
        this.bunkers = [];
        this.projectiles = [];
        this.particles = [];
        this.levelComplete = false;
        this.cameraX = 0; // Will be updated in first frame to follow player

        this.generateLevel();
        this.updateStats();
        this.respawnTimer = 0;

        // Start game loop
        if (this.gameLoop) cancelAnimationFrame(this.gameLoop);
        this.gameLoop = requestAnimationFrame(() => this.update());
    }

    generateLevel() {
        this.enemies = [];
        this.terrain = [];

        // Calculate difficulty multipliers
        // Start with just 2 enemies, let the AI build more with funds
        let enemyCount = 2 + this.level;

        // Create Bases
        const groundY = this.canvas.height - 50;
        this.friendlyBase = new Base(50, groundY, true, this);
        this.enemyBase = new Base(this.levelWidth - 100, groundY, false, this);
        this.bases = [this.friendlyBase, this.enemyBase];

        // Create enemy helipad in front of enemy base
        this.enemyHelipad = new Helipad(this.levelWidth - 200, this.canvas.height - 50);

        // Generate terrain
        for (let x = 0; x < this.levelWidth; x += 50) {
            // Flat terrain everywhere
            this.terrain.push({ x, y: groundY });

            // Chance to spawn bunker (every ~600px)
            if (x > 500 && x < this.levelWidth - 500 && x % 600 === 0) {
                this.bunkers.push(new Bunker(x, groundY, this));
            }
        }

        // Spawn enemies (reduced starting units)
        for (let i = 0; i < enemyCount; i++) {
            const x = 800 + Math.random() * (this.levelWidth - 1000);
            const type = Math.random() > 0.7 ? 'tank' : 'infantry';
            this.enemies.push(new GroundUnit(x, this.canvas.height - 50, type, false));
        }
    }

    purchaseUnit(type, cost) {
        if (this.economy && this.economy.purchase(cost)) {
            // Spawn unit at friendly base
            // Base is at x=50, width=80. Spawn to the right of it.
            const spawnX = this.friendlyBase ? this.friendlyBase.x + this.friendlyBase.width + 10 : 150;
            const groundY = this.canvas.height - 50;

            // Create unit
            const unit = new GroundUnit(spawnX, groundY, type, true);
            this.friendlyUnits.push(unit);

            // Visual feedback
            this.createExplosion(spawnX, groundY, 5); // Small puff
        }
    }

    handleKeyDown(e) {
        if (this.gameState !== 'playing') return;

        switch (e.key) {
            case 'ArrowLeft':
            case 'a':
            case 'A':
                this.input.horizontal = -1;
                e.preventDefault();
                break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                this.input.horizontal = 1;
                e.preventDefault();
                break;
            case 'ArrowUp':
            case 'w':
            case 'W':
                this.input.vertical = -1;
                e.preventDefault();
                break;
            case 'ArrowDown':
            case 's':
            case 'S':
                this.input.vertical = 1;
                e.preventDefault();
                break;
            case ' ':
                this.input.shooting = true;
                e.preventDefault();
                break;
            case 'Shift':
                this.input.bombing = true;
                e.preventDefault();
                break;
            // Unit purchasing shortcuts
            case '1':
                this.purchaseUnit('infantry', 500);
                break;
            case '2':
                this.purchaseUnit('tank', 2000);
                break;
            case '3':
                this.purchaseUnit('missile', 3000);
                break;
            case '4':
                this.purchaseUnit('demo', 5000);
                break;
            // Drop infantry
            case 'e':
            case 'E':
                if (this.player && this.player.cargo.length > 0) {
                    this.player.dropInfantry(this);
                }
                e.preventDefault();
                break;
        }
    }

    handleKeyUp(e) {
        // This method is no longer directly called by event listeners
        // as the logic has been moved into the anonymous function in setupEventListeners.
        // Keeping it here for reference or if it's called elsewhere.
        switch (e.key) {
            case 'ArrowLeft':
            case 'a':
            case 'A':
            case 'ArrowRight':
            case 'd':
            case 'D':
                this.input.horizontal = 0;
                break;
            case 'ArrowUp':
            case 'w':
            case 'W':
            case 'ArrowDown':
            case 's':
            case 'S':
                this.input.vertical = 0;
                break;
            case ' ':
                this.input.shooting = false;
                break;
            case 'Shift':
                this.input.bombing = false;
                break;
        }
    }

    setupVirtualDpad() {
        const dpad = document.getElementById('virtual-dpad');
        const fireBtn = document.getElementById('virtual-fire');
        if (!dpad) return;

        const dirMap = { up: 'vertical', down: 'vertical', left: 'horizontal', right: 'horizontal' };
        const valMap = { up: -1, down: 1, left: -1, right: 1 };

        dpad.querySelectorAll('[data-dir]').forEach(btn => {
            const dir = btn.dataset.dir;
            const axis = dirMap[dir];
            const val = valMap[dir];

            const start = (e) => {
                e.preventDefault();
                this.input[axis] = val;
                btn.style.background = 'rgba(255,255,255,0.5)';
            };
            const end = (e) => {
                e.preventDefault();
                this.input[axis] = 0;
                btn.style.background = 'rgba(255,255,255,0.25)';
            };

            btn.addEventListener('touchstart', start, { passive: false });
            btn.addEventListener('touchend', end, { passive: false });
            btn.addEventListener('touchcancel', end, { passive: false });
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('mouseleave', end);
        });

        if (fireBtn) {
            const fireStart = (e) => { e.preventDefault(); this.input.shooting = true; fireBtn.style.background = 'rgba(231,76,60,0.7)'; };
            const fireEnd = (e) => { e.preventDefault(); this.input.shooting = false; fireBtn.style.background = 'rgba(231,76,60,0.4)'; };
            fireBtn.addEventListener('touchstart', fireStart, { passive: false });
            fireBtn.addEventListener('touchend', fireEnd, { passive: false });
            fireBtn.addEventListener('touchcancel', fireEnd, { passive: false });
            fireBtn.addEventListener('mousedown', fireStart);
            fireBtn.addEventListener('mouseup', fireEnd);
            fireBtn.addEventListener('mouseleave', fireEnd);
        }
    }

    handleTouch(e) {
        if (this.gameState !== 'playing') return;
        if (e.cancelable) e.preventDefault(); // Prevent scrolling/zooming if possible

        // Touch to Fly removed in favor of vertical tilt control
        // Auto-fire handles shooting
    }

    handleTouchEnd(e) {
        if (this.gameState !== 'playing') return;
        if (e.cancelable) e.preventDefault();

        // Flight logic removed
    }

    handleClick(e) {
        if (this.gameState !== 'playing') return;

        const projectile = this.player.shoot();
        if (projectile) this.projectiles.push(projectile);
    }

    handleOrientation(e) {
        if (this.gameState !== 'playing') return;

        // Initialize base orientation on first tilt
        if (e.gamma !== null && e.beta !== null) {
            if (!this.tiltEnabled) {
                this.tiltEnabled = true;
                this.baseGamma = e.gamma;
                this.baseBeta = e.beta;
            }

            // Horizontal control (gamma: left-right tilt)
            const tiltX = e.gamma - this.baseGamma;
            if (Math.abs(tiltX) > 3) {
                this.input.horizontal = Math.max(-1, Math.min(1, tiltX / 30)); // Less sensitive (was 15)
            } else {
                this.input.horizontal = 0;
            }

            // Vertical control (beta: forward-backward tilt)
            // User requested: "up and down using gyroscope should be reverse"
            const tiltY = e.beta - this.baseBeta;
            if (Math.abs(tiltY) > 3) {
                // Reversed: Positive tiltY (tilting back) now goes DOWN (1), Negative (tilting forward) goes UP (-1)
                // Wait, standard: Tilt Forward (negative beta) -> Up (-1). Tilt Back (positive beta) -> Down (1).
                // Previous code was: -tiltY / 15. So Forward (-beta) -> -(-beta) = +beta -> Down?
                // Let's try: Tilt Forward (top of phone goes down) -> Move Down. Tilt Back -> Move Up.
                // Or: Tilt Forward -> Move Up (like diving?).
                // User said "reverse".
                // Let's implement: Tilt Forward (negative beta) -> Move Down (1). Tilt Back (positive beta) -> Move Up (-1).
                // So: -tiltY / 30 would be: Forward (-beta) -> +val -> Down. Back (+beta) -> -val -> Up.
                // Let's try that.
                this.input.vertical = Math.max(-1, Math.min(1, tiltY / 30)); // Less sensitive
            } else {
                this.input.vertical = 0;
            }
        }
    }

    async requestOrientationPermission() {
        if (this.needsOrientationPermission && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    window.addEventListener('deviceorientation', (e) => this.handleOrientation(e));
                    this.needsOrientationPermission = false;
                    console.log('Gyroscope controls enabled!');
                } else {
                    console.log('Gyroscope permission denied');
                }
            } catch (error) {
                console.error('Error requesting orientation permission:', error);
            }
        }
    }

    calibrateGyroscope() {
        // Reset the base orientation
        this.tiltEnabled = false;
        this.baseGamma = null;
        this.baseBeta = null;
        console.log('Gyroscope calibrated! Tilt your device to set new base position.');
    }


    update() {
        if (this.gameState !== 'playing') {
            this.gameLoop = requestAnimationFrame(() => this.update());
            return;
        }

        // Get ground Y for current position
        const groundY = this.canvas.height - 50;

        // Update economy
        if (this.economy) this.economy.update();

        // Update enemy economy and AI commander
        if (this.enemyEconomy) this.enemyEconomy.update();
        if (this.aiCommander) this.aiCommander.update();

        // Check helipad landing
        this.player.isLanded = this.helipad.checkLanding(this.player);
        if (this.player.isLanded) {
            this.helipad.service(this.player);
            // Only stabilize if not actively taking off
            if (this.input.vertical >= 0) {
                this.player.vx *= 0.8;
                this.player.vy *= 0.8;
                this.player.y = groundY - 18; // Slightly above helipad
            }
        }

        // Update player
        this.player.update(this.input, groundY);

        // Keep player in bounds (altitude limits)
        if (this.player.y < 10) {
            this.player.y = 10;
            this.player.vy = 0;
        }

        // Ground collision
        if (this.player.active && this.player.y > groundY - 15 && !this.player.isLanded) {
            this.player.y = groundY - 15;
            this.player.vy = 0;
            // Damage from hard landing
            if (Math.abs(this.player.vy) > 2) {
                if (this.player.hit(10)) {
                    const gameOver = this.player.die();
                    this.createExplosion(this.player.x, this.player.y, 50);
                    if (gameOver) {
                        this.gameOver();
                        return;
                    } else {
                        this.respawnTimer = this.respawnDelay;
                    }
                }
            }
        }

        // Check fuel - crash if empty
        if (this.player.active && this.player.fuel <= 0 && !this.player.isLanded) {
            if (this.player.hit(1)) { // Continuous damage
                const gameOver = this.player.die();
                this.createExplosion(this.player.x, this.player.y, 50);
                if (gameOver) {
                    this.gameOver();
                    return;
                } else {
                    this.respawnTimer = this.respawnDelay;
                }
            }
        }

        // Handle respawn timer
        if (this.respawnTimer > 0) {
            this.respawnTimer--;
            if (this.respawnTimer === 0 && this.player.lives > 0) {
                // Respawn at friendly base
                const spawnX = this.friendlyBase.x + 50;
                const spawnY = this.canvas.height / 2;
                this.player.respawn(spawnX, spawnY);
            }
        }

        // Only update player controls if active
        if (this.player.active) {
            // Keep player in horizontal bounds
            if (this.player.x < 50) this.player.x = 50;
            if (this.player.x > this.levelWidth - 50) this.player.x = this.levelWidth - 50;

            // Camera follows player
            this.cameraX = this.player.x - 250;
            if (this.cameraX < 0) this.cameraX = 0;
            if (this.cameraX > this.levelWidth - this.canvas.width) {
                this.cameraX = this.levelWidth - this.canvas.width;
            }

            // Shoot if holding space OR auto-fire triggers
            if (this.input.shooting || this.checkAutoFire()) {
                const projectile = this.player.shoot();
                if (projectile) {
                    this.projectiles.push(projectile);
                    this.createMuzzleFlash(projectile.x, projectile.y, this.player.facing);
                }
            }

            // Drop bomb if holding Shift
            if (this.input.bombing) {
                const projectile = this.player.dropBomb();
                if (projectile) this.projectiles.push(projectile);
            }

            // Auto-pickup nearby infantry when low/landed
            this.player.tryPickupNearbyInfantry(this);
        }


        // Update friendly units
        if (this.friendlyUnits) {
            const enemyTargets = [...this.enemies, ...this.enemyChoppers, this.enemyBase]; // Include enemy helicopters
            this.friendlyUnits = this.friendlyUnits.filter(unit => {
                unit.update(enemyTargets, this);
                return unit.active;
            });
        }

        // Update enemies
        const friendlyTargets = [this.player, ...(this.friendlyUnits || []), this.friendlyBase]; // Target player helicopter, units, friendly base
        this.enemies = this.enemies.filter(enemy => {
            enemy.update(friendlyTargets, this);
            return enemy.active;
        });

        // Update Enemy Choppers
        if (this.enemyChoppers.length === 0 && this.level >= 1 && this.enemyBase && this.enemyBase.active) {
            // Spawn one at enemy base
            this.enemyChoppers.push(new EnemyHelicopter(this.enemyBase.x, this.enemyBase.y - 100, this));
        }

        this.enemyChoppers = this.enemyChoppers.filter(chopper => {
            chopper.update(friendlyTargets, this);

            // Check for landing on enemy helipad
            if (this.enemyHelipad && this.enemyHelipad.checkLanding(chopper)) {
                this.enemyHelipad.service(chopper);
                // If fully serviced, resume patrol/attack
                if (chopper.fuel >= chopper.maxFuel && chopper.health >= chopper.maxHealth && chopper.ammo >= chopper.maxAmmo) {
                    chopper.state = 'patrol';
                }
            }

            return chopper.active || (chopper.respawnTimer && chopper.respawnTimer > 0);
        });

        // Update bases
        this.bases.forEach(base => base.update());

        // Update bunkers
        this.bunkers.forEach(bunker => bunker.update());

        // Update economy with bunker income
        if (this.economy && this.gameLoop % 120 === 0) { // Every 2 seconds
            const friendlyBunkers = this.bunkers.filter(b => b.owner === 'friendly').length;
            this.economy.funds += friendlyBunkers * 4; // Doubled bunker income
        }

        // Update enemy economy with bunker income
        if (this.enemyEconomy && this.gameLoop % 120 === 0) { // Every 2 seconds
            const enemyBunkers = this.bunkers.filter(b => b.owner === 'enemy').length;
            this.enemyEconomy.funds += enemyBunkers * 4; // Doubled bunker income
        }

        // Update projectiles
        this.projectiles = this.projectiles.filter(p => {
            p.update();

            // Check for bomb ground collision
            if (p.type === 'bomb' && p.y > groundY) {
                this.createExplosion(p.x, groundY, 20); // Big explosion for bomb
                return false; // Remove projectile
            }

            // Remove out of bounds (limit to visible screen area)
            const screenLeft = this.cameraX - 50;
            const screenRight = this.cameraX + this.canvas.width + 50;
            if (p.x < screenLeft || p.x > screenRight || p.y < -50 || p.y > this.canvas.height + 50) {
                return false;
            }

            return p.active;
        });

        // Check collisions
        this.checkCollisions();

        // Update particles
        this.particles = this.particles.filter(p => {
            p.update();
            return p.active;
        });

        // Check level complete - win by destroying enemy base
        if (this.enemyBase && !this.enemyBase.active && !this.levelComplete) {
            this.levelComplete = true;
            setTimeout(() => this.levelVictory(), 2000);
        }


        // Update HUD
        this.updateStats();

        // Draw Enemy Choppers
        this.enemyChoppers.forEach(chopper => chopper.draw(this.ctx));

        // Draw everything
        this.draw();

        // Continue game loop
        this.gameLoop = requestAnimationFrame(() => this.update());
    }

    checkAutoFire() {
        if (!this.player || !this.player.active) return false;

        // Range for auto-fire (increased for better coverage)
        const range = 600;
        const verticalTolerance = 100; // Bullets fly straight, so target must be roughly level

        // Collect all potential targets
        const targets = [
            ...this.enemies,
            ...this.enemyChoppers,
            ...(this.enemyBase && this.enemyBase.active ? [this.enemyBase] : []),
            ...this.bunkers.filter(b => b.owner === 'enemy' || b.owner === 'neutral')
        ];

        for (const target of targets) {
            if (!target.active) continue;

            // Check if target is in front
            const dx = target.x - this.player.x;
            const dy = Math.abs(target.y - this.player.y);

            // Facing right (1) and target is to the right (dx > 0)
            // OR Facing left (-1) and target is to the left (dx < 0)
            const isInFront = (this.player.facing === 1 && dx > 0) || (this.player.facing === -1 && dx < 0);

            if (isInFront && Math.abs(dx) < range && dy < verticalTolerance) {
                // Debug: Log when auto-fire triggers
                // if (Math.random() < 0.01) { 
                //    console.log('Auto-fire triggered!', { dx: Math.abs(dx), dy, facing: this.player.facing });
                // }
                return true; // Found a valid target
            }
        }

        return false;
    }

    checkCollisions() {
        // Projectile collisions
        this.projectiles.forEach(projectile => {
            if (!projectile.active) return;

            // Projectile AABB (Top-Left)
            const pLeft = projectile.x;
            const pRight = projectile.x + projectile.width;
            const pTop = projectile.y;
            const pBottom = projectile.y + projectile.height;

            if (projectile.owner === 'player') {
                // Player projectiles hit enemies (GroundUnit: Center-Bottom)
                this.enemies.forEach(enemy => {
                    if (!enemy.active) return;

                    const eLeft = enemy.x - enemy.width / 2;
                    const eRight = enemy.x + enemy.width / 2;
                    const eTop = enemy.y - enemy.height;
                    const eBottom = enemy.y;

                    // AABB Collision
                    if (pRight > eLeft && pLeft < eRight && pBottom > eTop && pTop < eBottom) {
                        projectile.active = false;
                        this.createHitEffect(projectile.x, projectile.y);

                        if (enemy.takeDamage(projectile.damage)) {
                            // Enemy destroyed
                            this.createExplosion(enemy.x, enemy.y, enemy.type === 'tank' ? 15 : 10);
                            this.score += enemy.type === 'tank' ? 100 : 50;

                            // Award bounty
                            if (this.economy) {
                                this.economy.awardBounty(enemy.type === 'tank' ? 20 : 5);
                            }
                        }
                    }
                });

                // Player projectiles hit enemy base (Base: Left-Bottom)
                if (this.enemyBase && this.enemyBase.active) {
                    const bLeft = this.enemyBase.x;
                    const bRight = this.enemyBase.x + this.enemyBase.width;
                    const bTop = this.enemyBase.y - this.enemyBase.height;
                    const bBottom = this.enemyBase.y;

                    if (pRight > bLeft && pLeft < bRight && pBottom > bTop && pTop < bBottom) {
                        projectile.active = false;
                        this.createHitEffect(projectile.x, projectile.y);
                        this.enemyBase.takeDamage(projectile.damage);
                    }
                }

                // Player projectiles hit enemy choppers
                this.enemyChoppers.forEach(chopper => {
                    if (!chopper.active) return;

                    // Chopper AABB (Center-Center approx like player)
                    const cLeft = chopper.x - 20;
                    const cRight = chopper.x + 20;
                    const cTop = chopper.y - 10;
                    const cBottom = chopper.y + 10;

                    if (pRight > cLeft && pLeft < cRight && pBottom > cTop && pTop < cBottom) {
                        projectile.active = false;
                        this.createHitEffect(projectile.x, projectile.y);
                        chopper.takeDamage(projectile.damage);
                    }
                });
            } else if (projectile.owner === 'enemy') {
                // Enemy projectiles hit player (Helicopter: Center-Center approx)
                // Player width ~40, height ~20 based on draw
                const plLeft = this.player.x - 20;
                const plRight = this.player.x + 20;
                const plTop = this.player.y - 10;
                const plBottom = this.player.y + 10;

                if (pRight > plLeft && pLeft < plRight && pBottom > plTop && pTop < plBottom) {
                    projectile.active = false;
                    this.createHitEffect(projectile.x, projectile.y);
                    if (this.player.hit(projectile.damage)) {
                        const gameOver = this.player.die();
                        this.createExplosion(this.player.x, this.player.y, 50);
                        if (gameOver) {
                            this.gameOver();
                        } else {
                            this.respawnTimer = this.respawnDelay;
                        }
                    }
                }

                // Enemy projectiles hit friendly units (GroundUnit: Center-Bottom)
                if (this.friendlyUnits) {
                    this.friendlyUnits.forEach(unit => {
                        if (!unit.active) return;

                        const uLeft = unit.x - unit.width / 2;
                        const uRight = unit.x + unit.width / 2;
                        const uTop = unit.y - unit.height;
                        const uBottom = unit.y;

                        if (pRight > uLeft && pLeft < uRight && pBottom > uTop && pTop < uBottom) {
                            projectile.active = false;
                            this.createHitEffect(projectile.x, projectile.y);

                            if (unit.takeDamage(projectile.damage)) {
                                this.createExplosion(unit.x, unit.y, 10);
                            }
                        }
                    });
                }

                // Enemy projectiles hit friendly base (Base: Left-Bottom)
                if (this.friendlyBase && this.friendlyBase.active) {
                    const bLeft = this.friendlyBase.x;
                    const bRight = this.friendlyBase.x + this.friendlyBase.width;
                    const bTop = this.friendlyBase.y - this.friendlyBase.height;
                    const bBottom = this.friendlyBase.y;

                    if (pRight > bLeft && pLeft < bRight && pBottom > bTop && pTop < bBottom) {
                        projectile.active = false;
                        this.createHitEffect(projectile.x, projectile.y);
                        this.friendlyBase.takeDamage(projectile.damage);
                    }
                }
            }
        });

        // Chopper vs Chopper Collision
        this.enemyChoppers.forEach(enemy => {
            if (!enemy.active) return;

            // Simple distance check for mid-air collision
            const dist = Math.sqrt(Math.pow(this.player.x - enemy.x, 2) + Math.pow(this.player.y - enemy.y, 2));
            if (dist < 40) { // Approx combined radius
                // Massive damage to both
                this.player.hit(50);
                enemy.takeDamage(50);
                this.createExplosion((this.player.x + enemy.x) / 2, (this.player.y + enemy.y) / 2, 30);

                if (this.player.health <= 0) {
                    const gameOver = this.player.die();
                    this.createExplosion((this.player.x + enemy.x) / 2, (this.player.y + enemy.y) / 2, 30);
                    if (gameOver) {
                        this.gameOver();
                    } else {
                        this.respawnTimer = this.respawnDelay;
                    }
                }
            }
        });
    }


    handleBaseDestroyed(base) {
        this.createExplosion(base.x + base.width / 2, base.y - base.height / 2, 50);

        if (base === this.enemyBase) {
            // Level Victory
            setTimeout(() => {
                this.levelVictory();
            }, 1000);
        } else {
            // Defeat
            this.gameOver();
        }
    }

    levelVictory() {
        this.gameState = 'gameover';
        if (this.gameLoop) cancelAnimationFrame(this.gameLoop);

        window.showGameModal(
            '🎉',
            'Victory!',
            `Enemy base destroyed!`,
            () => this.init(), // Restart game
            () => window.gameApp.showMenu(), // Exit action
            'Play Again' // Button text
        );
    }

    createExplosion(x, y, particleCount = 10) {
        if (this.audio) this.audio.playExplosion(particleCount > 20 ? 'large' : 'small');

        const colors = ['rgba(255, 100, 0, 1)', 'rgba(255, 200, 0, 1)', 'rgba(255, 50, 0, 1)', 'rgba(100, 100, 100, 1)'];

        for (let i = 0; i < particleCount; i++) {
            this.particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], 'explosion'));
        }

        // Add some smoke
        for (let i = 0; i < particleCount / 2; i++) {
            this.particles.push(new Particle(x, y, 'rgba(100, 100, 100, 0.8)', 'smoke'));
        }

        // Add debris
        if (particleCount > 20) {
            for (let i = 0; i < 5; i++) {
                this.particles.push(new Particle(x, y, '#555', 'debris'));
            }
        }
    }

    createDustPuff(x, y) {
        // Create gentle dust/smoke particles for non-destructive actions
        const dustColors = ['rgba(200, 200, 180, 0.6)', 'rgba(180, 180, 160, 0.5)', 'rgba(160, 160, 140, 0.4)'];

        for (let i = 0; i < 8; i++) {
            this.particles.push(new Particle(x, y, dustColors[Math.floor(Math.random() * dustColors.length)], 'smoke'));
        }
    }

    createMuzzleFlash(x, y, facing) {
        if (this.audio) this.audio.playShoot();
        const offset = facing === 'right' ? 10 : -10;
        this.particles.push(new Particle(x + offset, y, 'rgba(255, 255, 0, 0.8)', 'spark'));
    }

    createHitEffect(x, y) {
        if (this.audio) this.audio.playHit();
        for (let i = 0; i < 3; i++) {
            this.particles.push(new Particle(x, y, 'rgba(255, 255, 200, 1)', 'spark'));
        }
    }

    draw() {
        // Clear screen
        this.ctx.fillStyle = '#87CEEB'; // Sky blue
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Save context for camera transform
        this.ctx.save();
        this.ctx.translate(-this.cameraX, 0);

        // Draw terrain
        this.ctx.fillStyle = '#4CAF50'; // Green ground
        this.ctx.beginPath();
        this.ctx.moveTo(0, this.canvas.height);
        this.terrain.forEach(point => {
            this.ctx.lineTo(point.x, point.y);
        });
        this.ctx.lineTo(this.levelWidth, this.canvas.height);
        this.ctx.fill();

        // Draw helipad
        this.helipad.draw(this.ctx);

        // Draw enemy helipad
        if (this.enemyHelipad) {
            this.enemyHelipad.draw(this.ctx);
        }

        // Draw bases
        this.bases.forEach(base => base.draw(this.ctx));

        // Draw bunkers
        this.bunkers.forEach(bunker => bunker.draw(this.ctx));

        // Draw enemies
        this.enemies.forEach(enemy => enemy.draw(this.ctx, this));

        // Draw enemy choppers
        this.enemyChoppers.forEach(chopper => chopper.draw(this.ctx));

        // Draw friendly units
        if (this.friendlyUnits) {
            this.friendlyUnits.forEach(unit => unit.draw(this.ctx, this));
        }

        // Draw player
        this.player.draw(this.ctx, this);

        // Draw projectiles
        this.projectiles.forEach(p => p.draw(this.ctx));

        // Draw particles
        this.particles.forEach(p => p.draw(this.ctx));

        // Restore context (remove camera transform) for HUD
        this.ctx.restore();

        // Draw HUD
        this.drawHUD();
        this.drawMinimap();
    }

    drawHUD() {
        // HUD constants
        const margin = 10;
        const barWidth = 150;
        const barHeight = 20;

        // Fuel bar background
        this.ctx.fillStyle = '#333';
        this.ctx.fillRect(margin, margin, barWidth, barHeight);

        // Fuel bar fill
        const fuelPercent = this.player.fuel / this.player.maxFuel;

        // Flash red if low fuel
        if (fuelPercent < 0.2 && Math.floor(Date.now() / 500) % 2 === 0) {
            this.ctx.fillStyle = '#ff0000';
        } else {
            this.ctx.fillStyle = fuelPercent > 0.3 ? '#4CAF50' : '#F44336';
        }

        this.ctx.fillRect(margin, margin, barWidth * fuelPercent, barHeight);
        this.ctx.fillStyle = '#FFF';
        this.ctx.font = '12px Arial';
        this.ctx.textAlign = 'left';
        this.ctx.fillText(`⛽ Fuel: ${Math.floor(this.player.fuel)}/${this.player.maxFuel}`, margin + 5, margin + 15);

        // Health bar
        this.ctx.fillStyle = '#333';
        this.ctx.fillRect(margin, margin + 30, barWidth, barHeight);
        const healthPercent = this.player.health / this.player.maxHealth;

        // Flash red if low health
        if (healthPercent < 0.3 && Math.floor(Date.now() / 200) % 2 === 0) {
            this.ctx.fillStyle = '#ff0000';
        } else {
            this.ctx.fillStyle = healthPercent > 0.3 ? '#4CAF50' : '#F44336';
        }

        this.ctx.fillRect(margin, margin + 30, barWidth * healthPercent, barHeight);
        this.ctx.fillStyle = '#FFF';
        this.ctx.fillText(`❤️ Health: ${Math.floor(this.player.health)}/${this.player.maxHealth}`, margin + 5, margin + 45);

        // Ammo counter
        this.ctx.fillStyle = '#FFF';
        this.ctx.font = '16px Arial';
        this.ctx.textAlign = 'right';
        this.ctx.fillText(`💣 Bombs: ${this.player.ammo}/${this.player.maxAmmo}`, this.canvas.width - margin, margin + 20);

        // Lives
        this.ctx.fillText(`Lives: ${'❤️'.repeat(Math.max(0, this.player.lives))}`, this.canvas.width - margin, margin + 45);

        // Cargo count
        this.ctx.fillText(`🎖️ Cargo: ${this.player.cargo.length}/${this.player.maxCargo}`, this.canvas.width - margin, margin + 70);

        // Funds
        this.ctx.fillStyle = '#4CAF50';
        this.ctx.fillText(`💰 Funds: $${this.economy.funds}`, this.canvas.width - margin, margin + 95);

        // Landed indicator
        if (this.player.isLanded) {
            this.ctx.fillStyle = '#FFD700';
            this.ctx.font = 'bold 18px Arial';
            this.ctx.textAlign = 'center';
            this.ctx.fillText('🔧 SERVICING...', this.canvas.width / 2, 20);
        }

        // Respawn countdown
        if (this.respawnTimer > 0) {
            this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.ctx.fillStyle = '#FFD700';
            this.ctx.font = 'bold 48px Arial';
            this.ctx.textAlign = 'center';
            const secondsLeft = Math.ceil(this.respawnTimer / 60);
            this.ctx.fillText(`RESPAWNING IN ${secondsLeft}...`, this.canvas.width / 2, this.canvas.height / 2);

            this.ctx.font = '24px Arial';
            this.ctx.fillStyle = '#FFF';
            this.ctx.fillText(`Lives Remaining: ${this.player.lives}`, this.canvas.width / 2, this.canvas.height / 2 + 50);
        }
    }

    drawMinimap() {
        const mapWidth = 200;
        const mapHeight = 30;
        const mapX = (this.canvas.width - mapWidth) / 2;
        const mapY = 10;

        // Background
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        this.ctx.fillRect(mapX, mapY, mapWidth, mapHeight);
        this.ctx.strokeStyle = '#FFF';
        this.ctx.strokeRect(mapX, mapY, mapWidth, mapHeight);

        // Helper to scale X
        const scaleX = (x) => mapX + (x / this.levelWidth) * mapWidth;
        const scaleY = (y) => mapY + (y / this.canvas.height) * mapHeight;

        // Draw Bases
        this.bases.forEach(base => {
            this.ctx.fillStyle = base.friendly ? '#4CAF50' : '#F44336';
            this.ctx.fillRect(scaleX(base.x), mapY + 5, 6, 20);
        });

        // Draw Bunkers
        this.bunkers.forEach(bunker => {
            let color = '#9E9E9E';
            if (bunker.owner === 'friendly') color = '#4CAF50';
            if (bunker.owner === 'enemy') color = '#F44336';
            this.ctx.fillStyle = color;
            this.ctx.fillRect(scaleX(bunker.x), mapY + 10, 4, 10);
        });

        // Draw Units
        // Friendly
        this.ctx.fillStyle = '#81C784';
        this.friendlyUnits.forEach(unit => {
            if (!unit.active) return;
            this.ctx.fillRect(scaleX(unit.x), scaleY(unit.y), 2, 2);
        });

        // Enemy
        this.ctx.fillStyle = '#E57373';
        this.enemies.forEach(unit => {
            if (!unit.active) return;
            this.ctx.fillRect(scaleX(unit.x), scaleY(unit.y), 2, 2);
        });

        // Enemy Choppers (Larger/Brighter Red)
        this.ctx.fillStyle = '#D32F2F';
        this.enemyChoppers.forEach(chopper => {
            if (!chopper.active) return;
            this.ctx.fillRect(scaleX(chopper.x), scaleY(chopper.y), 4, 3);
        });

        // Player
        if (this.player.active) {
            this.ctx.fillStyle = '#FFF';
            this.ctx.fillRect(scaleX(this.player.x), scaleY(this.player.y), 3, 3);
        }

        // Camera Viewport Box
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        this.ctx.strokeRect(scaleX(this.cameraX), mapY, (this.canvas.width / this.levelWidth) * mapWidth, mapHeight);
    }

    nextLevel() {
        this.level++;

        // Max 60 levels
        if (this.level > 60) {
            this.winGame();
            return;
        }

        // Every 20 levels, increase difficulty
        if (this.level === 21 && this.difficulty === 'easy') {
            this.difficulty = 'medium';
        } else if (this.level === 41 && this.difficulty === 'medium') {
            this.difficulty = 'hard';
        }

        this.player = new Helicopter(150, this.canvas.height / 2);
        this.helipad = new Helipad(150, this.canvas.height - 50); // In front of base
        this.enemies = [];
        this.projectiles = [];
        this.cameraX = 0;
        this.levelComplete = false;

        this.generateLevel();
        this.updateStats();
    }

    winGame() {
        this.gameState = 'gameover';
        if (this.gameLoop) cancelAnimationFrame(this.gameLoop);

        window.showGameModal(
            '🎉',
            'Victory!',
            `You've completed all 60 levels! Final Score: ${this.score}`,
            () => this.init(),
            () => window.gameApp.showMenu()
        );
    }

    gameOver() {
        this.gameState = 'gameover';
        if (this.gameLoop) cancelAnimationFrame(this.gameLoop);

        // Update high score
        if (this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('rescueRaidersHighScore', this.highScore.toString());
        }

        window.showGameModal(
            '💥',
            'Game Over',
            `Level ${this.level} - Score: ${this.score}`,
            () => this.init(),
            () => window.gameApp.showMenu()
        );
    }

    updateStats() {
        if (this.scoreEl) this.scoreEl.textContent = this.score;
        if (this.levelEl) this.levelEl.textContent = this.level;
        if (this.healthEl) this.healthEl.textContent = Math.max(0, Math.floor(this.player.health));
        if (this.highScoreEl) this.highScoreEl.textContent = this.highScore;
        if (this.fuelEl) this.fuelEl.textContent = Math.max(0, Math.floor(this.player.fuel));
        if (this.ammoEl) this.ammoEl.textContent = this.player.ammo;
        if (this.livesEl) this.livesEl.textContent = this.player.lives;
        if (this.fundsEl && this.economy) {
            this.fundsEl.textContent = '$' + this.economy.funds;

            // Update button states
            const buttons = [
                { id: 'buy-infantry', cost: 5 },
                { id: 'buy-tank', cost: 20 },
                { id: 'buy-missile', cost: 30 },
                { id: 'buy-demo', cost: 100 }
            ];

            buttons.forEach(btn => {
                const el = document.getElementById(btn.id);
                if (el) {
                    if (this.economy.canAfford(btn.cost)) {
                        el.classList.remove('disabled');
                    } else {
                        el.classList.add('disabled');
                    }
                }
            });
        }
    }

    purchaseUnit(type, cost) {
        if (!this.economy) return;

        if (this.economy.purchase(cost)) {
            // Spawn unit at base
            const unit = new GroundUnit(100, this.canvas.height - 50, type, true);
            this.friendlyUnits.push(unit);

            // Visual feedback
            this.createHitEffect(100, this.canvas.height - 50);
        }
    }

    cleanup() {
        if (this.gameLoop) {
            cancelAnimationFrame(this.gameLoop);
            this.gameLoop = null;
        }
        document.removeEventListener('keydown', this.keydownHandler);
        document.removeEventListener('keyup', this.keyupHandler);
        this.gameState = 'menu';
    }
}

class AudioController {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.enabled = false;

        // Unlock audio context on first user interaction
        const unlock = () => {
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
            this.enabled = true;
            window.removeEventListener('click', unlock);
            window.removeEventListener('keydown', unlock);
        };
        window.addEventListener('click', unlock);
        window.addEventListener('keydown', unlock);
    }

    playShoot() {
        if (!this.enabled) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'square';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    }

    playExplosion(size = 'small') {
        if (!this.enabled) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + (size === 'large' ? 0.5 : 0.2));

        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + (size === 'large' ? 0.5 : 0.2));

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start();
        osc.stop(this.ctx.currentTime + (size === 'large' ? 0.5 : 0.2));
    }

    playHit() {
        if (!this.enabled) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.05);

        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.05);
    }
}

 class EnemyHelicopter {
    constructor(x, y, game) {
        this.x = x;
        this.y = y;
        this.game = game; // Reference to game for accessing player/economy
        this.vx = 0;
        this.vy = 0;
        this.width = 40;
        this.height = 20;
        this.type = 'helicopter'; // For identification

        // Resources
        this.health = 100;
        this.maxHealth = 100;
        this.fuel = 100;
        this.maxFuel = 100;
        this.ammo = 20; // More ammo for bot
        this.maxAmmo = 20;
        this.friendly = false;

        // AI State
        this.state = 'patrol'; // patrol, chase, attack, evade
        this.facing = -1;
        this.targetFacing = -1;
        this.shootCooldown = 0;
        this.evadeTimer = 0;

        this.active = true;
        // Respawn handling for bot only
        this.respawnDelay = 900; // 15 seconds at 60fps
        this.respawnTimer = 0;
        this.spawnX = x;
        this.spawnY = y;
    }

    update(targets, game) {
        if (!this.active) {
            // Handle respawn timer
            if (this.respawnTimer > 0) {
                this.respawnTimer--;
                if (this.respawnTimer === 0) {
                    this.respawn();
                }
            } else {
                // Safety check: if inactive but timer is 0, respawn immediately
                this.respawn();
            }
            return;
        }

        const player = game.player;
        const distToPlayer = Math.abs(player.x - this.x);
        const heightDiff = player.y - this.y;

        // AI Logic
        if (player.health > 0 && player.lives > 0) {
            // Face player by default
            this.targetFacing = player.x > this.x ? 1 : -1;

            // Check needs
            const needsRefuel = this.fuel < 30;
            const needsRepair = this.health < 40;
            const needsAmmo = this.ammo <= 0;

            // If already returning to base, stay there until FULLY serviced
            const isFullyServiced = this.fuel >= this.maxFuel &&
                this.health >= this.maxHealth &&
                this.ammo >= this.maxAmmo;

            if (this.state === 'return_to_base' && !isFullyServiced) {
                // Stay in return_to_base until completely serviced
                // Don't change state
            } else if (needsRefuel || needsRepair || needsAmmo) {
                this.state = 'return_to_base';
            } else if (this.health < 30) {
                this.state = 'evade';
            } else if (distToPlayer < 400) {
                this.state = 'attack';
            } else {
                this.state = 'chase';
            }
        } else {
            this.state = 'patrol';
        }

        // Consume fuel
        if (this.active) {
            this.fuel -= 0.05; // Slower consumption for bot
            if (this.fuel <= 0) {
                this.fuel = 0;
                this.vy += 0.2; // Fall if out of fuel
            }
        }

        // Apply Physics & Movement based on state
        const speed = 4; // Slightly faster than ground units
        const accel = 0.15;

        if (this.state === 'chase') {
            // Move towards player
            if (player.x > this.x) this.vx += accel;
            else this.vx -= accel;

            // Match altitude roughly, but stay above ground
            const targetY = Math.max(50, player.y - 50); // Try to stay above player
            if (this.y < targetY) this.vy += 0.1;
            else this.vy -= 0.1;

        } else if (this.state === 'attack') {
            // Slow down to aim
            this.vx *= 0.95;

            // Try to align Y for shooting
            if (Math.abs(heightDiff) > 20) {
                if (heightDiff < 0) this.vy -= 0.1; // Player is above
                else this.vy += 0.1; // Player is below
            }

            // Shoot if aligned and facing
            if (Math.abs(heightDiff) < 60 && this.facing === this.targetFacing) {
                this.shoot();
            }
        } else if (this.state === 'evade') {
            // Fly away from player
            if (player.x > this.x) this.vx -= accel;
            else this.vx += accel;

            // Change altitude erratically
            this.evadeTimer++;
            if (this.evadeTimer % 60 < 30) this.vy -= 0.2;
            else this.vy += 0.2;
        } else if (this.state === 'patrol') {
            // Just fly back and forth
            this.vx += this.facing * 0.05;
            if (this.x < 100) this.targetFacing = 1;
            if (this.x > game.levelWidth - 100) this.targetFacing = -1;

        } else if (this.state === 'return_to_base') {
            // Fly to enemy helipad
            if (game.enemyHelipad) {
                const padX = game.enemyHelipad.x;
                const padY = game.enemyHelipad.y;
                const distToPad = Math.abs(padX - this.x);

                // Face base
                this.targetFacing = padX > this.x ? 1 : -1;

                // Move towards pad
                if (distToPad > 10) {
                    if (padX > this.x) this.vx += accel;
                    else this.vx -= accel;
                } else {
                    // Slow down when close
                    this.vx *= 0.9;
                }

                // Descent logic
                if (distToPad < 50) {
                    // Close enough to descend
                    const targetLandY = padY - 20;
                    if (this.y < targetLandY - 2) {
                        this.vy += 0.1; // Go down
                    } else if (this.y > targetLandY + 2) {
                        this.vy -= 0.1; // Go up (too low!)
                    } else {
                        // Hover at target height
                        this.vy *= 0.8;
                        this.y = targetLandY; // Snap to exact height for stability
                    }
                } else {
                    // Cruising altitude
                    const cruiseY = 100;
                    if (this.y > cruiseY) this.vy -= 0.1;
                    else this.vy += 0.1;
                }
            }
        }

        // Physics limits
        this.vx = Math.max(-speed, Math.min(speed, this.vx));
        this.vy = Math.max(-3, Math.min(3, this.vy));

        // Drag
        this.vx *= 0.98;
        this.vy *= 0.98;

        // Apply position
        this.x += this.vx;
        this.y += this.vy;

        // Bounds
        if (this.y < 20) { this.y = 20; this.vy = 0; }
        if (this.y > game.canvas.height - 50) { this.y = game.canvas.height - 50; this.vy = 0; }
        if (this.x < 0) { this.x = 0; this.vx = -this.vx; }
        if (this.x > game.levelWidth) { this.x = game.levelWidth; this.vx = -this.vx; }

        // Smooth facing
        if (this.facing !== this.targetFacing) {
            this.facing += (this.targetFacing - this.facing) * 0.1;
            if (Math.abs(this.facing - this.targetFacing) < 0.1) this.facing = this.targetFacing;
        }

        // Cooldowns
        if (this.shootCooldown > 0) this.shootCooldown--;
    }

    shoot() {
        if (this.shootCooldown <= 0) {
            this.shootCooldown = 30; // Fire rate

            // Calculate angle with slight randomness for "AI aim error"
            const angle = (this.facing === 1 ? 0 : Math.PI) + (Math.random() * 0.1 - 0.05);
            const bulletSpeed = 10;
            const vx = Math.cos(angle) * bulletSpeed;
            const vy = Math.sin(angle) * bulletSpeed;

    }

            // Tint red for enemy (using composite operation)

            ctx.globalCompositeOperation = 'source-over';

        } else {

            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-22, 0);
            ctx.lineTo(-35, 0);
            ctx.stroke();

            // Tail fin (vertical stabilizer)
            ctx.fillStyle = '#C62828';
            ctx.beginPath();
            ctx.moveTo(-32, 0);
            ctx.lineTo(-35, -10);
            ctx.lineTo(-30, -10);
            ctx.lineTo(-28, 0);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Tail rotor housing
            ctx.fillStyle = '#C62828';
            ctx.beginPath();
            ctx.arc(-35, -5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Landing skids (two parallel bars)
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;

            // Front skid strut
            ctx.beginPath();
            ctx.moveTo(10, 8);
            ctx.lineTo(10, 14);
            ctx.stroke();

            // Rear skid strut
            ctx.beginPath();
            ctx.moveTo(-10, 8);
            ctx.lineTo(-10, 14);
            ctx.stroke();

            // Skid bars
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-15, 14);
            ctx.lineTo(15, 14);
            ctx.stroke();

            // Main rotor mast
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(0, -14);
            ctx.stroke();

            // Rotor hub
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(0, -14, 3, 0, Math.PI * 2);
            ctx.fill();

            // Main rotor blades (static horizontal line)
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-35, -14);
            ctx.lineTo(35, -14);
            ctx.stroke();

            // Tail rotor (animated)
            const rotorAngle = Date.now() * 0.05;
            ctx.save();
            ctx.translate(-35, -5);
            ctx.rotate(rotorAngle * 2);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(0, 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.lineTo(8, 0);
            ctx.stroke();
            ctx.restore();

            ctx.restore();
        }

        // Health bar
        // Health bar
        if (this.health < this.maxHealth) {
            ctx.fillStyle = '#333';
            ctx.fillRect(this.x - 20, this.y - 30, 40, 4);
            ctx.fillStyle = '#F44336';
            ctx.fillRect(this.x - 20, this.y - 30, 40 * (this.health / this.maxHealth), 4);
        }

        // Fuel bar (if not full)
        if (this.fuel < this.maxFuel) {
            ctx.fillStyle = '#333';
            ctx.fillRect(this.x - 20, this.y - 25, 40, 3);
            ctx.fillStyle = '#FFC107'; // Amber for fuel
            ctx.fillRect(this.x - 20, this.y - 25, 40 * (this.fuel / this.maxFuel), 3);
        }
    }

    takeDamage(amount) {
        this.health -= amount;
        if (this.health <= 0) {
            this.active = false;
            this.respawnTimer = this.respawnDelay; // Start respawn timer
            this.game.createExplosion(this.x, this.y, 30);
            this.game.economy.awardBounty(1000); // Big bounty for chopper
        }
    }

    respawn() {
        this.x = this.spawnX;
        this.y = this.spawnY;
        this.vx = 0;
        this.vy = 0;
        this.health = this.maxHealth;
        this.fuel = this.maxFuel;
        this.ammo = this.maxAmmo;
        this.active = true;
        this.state = 'patrol';
    }
}

    </script>
