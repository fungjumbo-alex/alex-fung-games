<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #2d5a27 0%, #1a3a15 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #fff; overflow-x:hidden;}
        h1 { margin: 10px 0; }
        .info { display: flex; gap: 20px; margin-bottom: 15px; font-size: 1.2em; }
        .info span { background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 90px); gap: 15px; }
        .hole { width: 90px; height: 90px; background: radial-gradient(circle at 50% 60%, #3d2817, #1a0f09); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .mole { font-size: 50px; position: absolute; bottom: -60px; transition: bottom 0.1s; }
        .mole.up { bottom: 10px; }
        .hole:active .mole.up { transform: scale(0.8); }
        button { margin-top: 20px; padding: 12px 30px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; background: #f1c40f; color: #333; font-weight: bold; outline:none;}}
    button:focus-visible{outline:2px solid #fff;outline-offset:2px;}</style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;" aria-label="Back to games">← Back</a>
    <h1>🔨 Whack-a-Mole</h1>
    <div class="info"><span>Score: <b id="score">0</b></span><span>Time: <b id="time">30</b></span></div>
    <div class="grid" id="grid"></div>
    <button onclick="start()">▶️ Start</button>
    <script>
        let score = 0, time = 30, playing = false, current = -1, timer;
        const grid = document.getElementById('grid');

        function init() {
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.innerHTML = '<div class="mole">🐹</div>';
                hole.onclick = () => whack(i);
                grid.appendChild(hole);
            }
        }

        function whack(i) {
            if (!playing) return;
            const moles = document.querySelectorAll('.mole');
            if (moles[i].classList.contains('up')) {
                moles[i].classList.remove('up');
                score += 10;
                document.getElementById('score').textContent = score;
            }
        }

        function showMole() {
            if (!playing) return;
            const moles = document.querySelectorAll('.mole');
            moles.forEach(m => m.classList.remove('up'));
            current = Math.floor(Math.random() * 9);
            moles[current].classList.add('up');
            setTimeout(() => moles[current].classList.remove('up'), 800);
        }

        function start() {
            score = 0;
            time = 30;
            playing = true;
            document.getElementById('score').textContent = 0;
            document.getElementById('time').textContent = 30;
            init();
            timer = setInterval(() => {
                time--;
                document.getElementById('time').textContent = time;
                if (time <= 0) {
                    clearInterval(timer);
                    playing = false;
                    document.querySelectorAll('.mole').forEach(m => m.classList.remove('up'));
                    setTimeout(() => alert(`🎮 Game Over! Score: ${score}`), 100);
                }
            }, 1000);
            setInterval(showMole, 900);
        }

        init();
    </script>
</body>
</html>
