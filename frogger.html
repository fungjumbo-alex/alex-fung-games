<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frogger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #fff; }
        h1 { margin: 10px 0; }
        .info { display: flex; gap: 20px; margin-bottom: 10px; font-size: 1.2em; }
        .info span { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        canvas { border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .touch { display: flex; gap: 10px; margin-top: 15px; }
        .touch button { width: 60px; height: 60px; font-size: 24px; background: rgba(255,255,255,0.2); border: none; border-radius: 10px; color: #fff; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;">← Back</a>
    <h1>🐸 Frogger</h1>
    <div class="info"><span>Lives: <b id="lives">3</b></span><span>Score: <b id="score">0</b></span></div>
    <canvas id="game" width="320" height="400"></canvas>
    <div class="touch">
        <button onclick="move(-1,0)">⬅️</button>
        <button onclick="move(0,-1)">⬆️</button>
        <button onclick="move(0,1)">⬇️</button>
        <button onclick="move(1,0)">➡️</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const TILE = 40;
        let frog, cars, logs, score, lives, over, won;

        function init() {
            frog = { x: 4, y: 9, onLog: null };
            cars = [];
            logs = [];
            score = 0;
            lives = 3;
            over = false;
            won = false;
            document.getElementById('lives').textContent = 3;
            document.getElementById('score').textContent = 0;

            // Cars (rows 6-8)
            for (let r = 6; r <= 8; r++) {
                for (let i = 0; i < 3; i++) {
                    cars.push({ x: i * 120, y: r, dir: r % 2 === 0 ? 1 : -1, speed: 2 + r * 0.3 });
                }
            }
            // Logs (rows 1-3)
            for (let r = 1; r <= 3; r++) {
                for (let i = 0; i < 3; i++) {
                    logs.push({ x: i * 130, y: r, w: 80, dir: r % 2 === 0 ? 1 : -1, speed: 1 + r * 0.2 });
                }
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, canvas.width, TILE);
            ctx.fillStyle = '#3498db';
            ctx.fillRect(0, TILE, canvas.width, TILE * 4);
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, TILE * 5, canvas.width, TILE);
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(0, TILE * 6, canvas.width, TILE * 4);

            // Road lines
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([20, 20]);
            for (let r = 6; r <= 9; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * TILE + TILE / 2);
                ctx.lineTo(canvas.width, r * TILE + TILE / 2);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // Logs
            logs.forEach(l => {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(l.x, l.y * TILE + 5, l.w, TILE - 10);
            });

            // Cars
            cars.forEach(c => {
                ctx.fillStyle = c.dir > 0 ? '#e74c3c' : '#3498db';
                ctx.fillRect(c.x, c.y * TILE + 5, 50, TILE - 10);
            });

            // Frog
            ctx.font = '32px Arial';
            ctx.fillText('🐸', frog.x * TILE + 4, frog.y * TILE + 32);
        }

        function update() {
            if (over) return;

            // Move cars
            cars.forEach(c => {
                c.x += c.dir * c.speed;
                if (c.x > canvas.width) c.x = -50;
                if (c.x < -50) c.x = canvas.width;
            });

            // Move logs
            logs.forEach(l => {
                l.x += l.dir * l.speed;
                if (l.x > canvas.width) l.x = -l.w;
                if (l.x < -l.w) l.x = canvas.width;
            });

            // Frog on log
            if (frog.y >= 1 && frog.y <= 3) {
                const onLog = logs.find(l => 
                    frog.y === l.y && 
                    frog.x * TILE >= l.x - 10 && 
                    frog.x * TILE <= l.x + l.w - 30
                );
                if (onLog) {
                    frog.x += onLog.dir * onLog.speed / TILE;
                } else {
                    die();
                }
            }

            // Car collision
            cars.forEach(c => {
                if (frog.y === c.y && 
                    frog.x * TILE + 20 > c.x && 
                    frog.x * TILE < c.x + 50) {
                    die();
                }
            });

            // Win
            if (frog.y === 0) {
                score += 100;
                document.getElementById('score').textContent = score;
                frog = { x: 4, y: 9, onLog: null };
            }

            // Bounds
            if (frog.x < 0 || frog.x > 7) die();

            draw();
            if (!over) requestAnimationFrame(update);
        }

        function move(dx, dy) {
            if (over) return;
            frog.x = Math.max(0, Math.min(7, frog.x + dx));
            frog.y = Math.max(0, Math.min(9, frog.y + dy));
        }

        function die() {
            lives--;
            document.getElementById('lives').textContent = lives;
            if (lives <= 0) {
                over = true;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('💀 Game Over!', canvas.width / 2, canvas.height / 2);
            } else {
                frog = { x: 4, y: 9 };
            }
        }

        function start() {
            init();
            update();
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
            if (e.key === 'ArrowUp') move(0, -1);
            if (e.key === 'ArrowDown') move(0, 1);
        });

        init();
        draw();
    </script>
</body>
</html>
