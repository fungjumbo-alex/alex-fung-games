<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #fff; }
        h1 { margin: 10px 0; text-shadow: 0 0 10px #27ae60; }
        .info { display: flex; gap: 30px; margin-bottom: 10px; font-size: 1.2em; }
        .info span { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        canvas { border-radius: 15px; box-shadow: 0 0 30px rgba(39, 174, 96, 0.3), 0 10px 40px rgba(0,0,0,0.5); }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; background: linear-gradient(145deg, #27ae60, #1e8449); color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(39,174,96,0.4); }
        .touch-btns { display: grid; grid-template-columns: repeat(3, 60px); gap: 8px; margin-top: 15px; }
        .touch-btn { width: 60px; height: 60px; font-size: 24px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; color: #fff; }
        .touch-btn:active { background: #27ae60; transform: scale(1.1); }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;">← Back</a>
    <h1>🐍 Snake</h1>
    <div class="info"><span>Score: <b id="score">0</b></span><span>High: <b id="high">0</b></span></div>
    <canvas id="game" width="300" height="300"></canvas>
    <div class="controls"><button onclick="start()">▶️ Start</button><button onclick="pause()">⏸️ Pause</button></div>
    <div class="touch-btns">
        <div></div>
        <button class="touch-btn" onclick="go('up')">⬆️</button>
        <div></div>
        <button class="touch-btn" onclick="go('left')">⬅️</button>
        <button class="touch-btn" onclick="go('down')">⬇️</button>
        <button class="touch-btn" onclick="go('right')">➡️</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const S = 20, G = 15;
        let snake, dir, food, score, high=0, loop, paused, over;

        high = localStorage.getItem('snakeHigh') || 0;
        document.getElementById('high').textContent = high;

        function init() {
            snake = [{x:7,y:7}];
            dir = {x:1,y:0};
            score = 0; paused = false; over = false;
            document.getElementById('score').textContent = 0;
            spawn();
            draw();
        }

        function spawn() {
            do { food = {x:Math.floor(Math.random()*G), y:Math.floor(Math.random()*G)}; } while(snake.some(s=>s.x===food.x&&s.y===food.y));
        }

        function draw() {
            // Background gradient
            const bg = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
            bg.addColorStop(0, '#1a1a3e');
            bg.addColorStop(1, '#0f0f23');
            ctx.fillStyle = bg;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for(let i=0;i<=G;i++){
                ctx.beginPath(); ctx.moveTo(i*S,0); ctx.lineTo(i*S,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i*S); ctx.lineTo(canvas.width,i*S); ctx.stroke();
            }

            // Food with glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e74c3c';
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(food.x*S+S/2, food.y*S+S/2, S/2-3, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Snake
            snake.forEach((s,i)=>{
                const g = ctx.createRadialGradient(s.x*S+S/2, s.y*S+S/2, 0, s.x*S+S/2, s.y*S+S/2, S/2);
                if(i===0){
                    g.addColorStop(0, '#5dade2');
                    g.addColorStop(1, '#2980b9');
                } else {
                    g.addColorStop(0, '#58d68d');
                    g.addColorStop(1, '#27ae60');
                }
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.roundRect(s.x*S+2, s.y*S+2, S-4, S-4, 5);
                ctx.fill();

                // Eyes on head
                if(i===0){
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(s.x*S+S/2-4, s.y*S+S/2-3, 3, 0, Math.PI*2);
                    ctx.arc(s.x*S+S/2+4, s.y*S+S/2-3, 3, 0, Math.PI*2);
                    ctx.fill();
                }
            });
        }

        function update() {
            if(paused || over) return;
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            
            if(head.x < 0 || head.x >= G || head.y < 0 || head.y >= G) { endGame(); return; }
            if(snake.some(s=>s.x===head.x && s.y===head.y)) { endGame(); return; }
            
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawn();
            } else {
                snake.pop();
            }
            draw();
        }

        function start() { clearInterval(loop); init(); loop = setInterval(update, 100); }
        function pause() { paused = !paused; }

        function go(d) {
            if(d==='up' && dir.y!==1) dir={x:0,y:-1};
            if(d==='down' && dir.y!==-1) dir={x:0,y:1};
            if(d==='left' && dir.x!==1) dir={x:-1,y:0};
            if(d==='right' && dir.x!==-1) dir={x:1,y:0};
        }

        function endGame() {
            over = true;
            clearInterval(loop);
            if(score > high) { high = score; localStorage.setItem('snakeHigh', high); document.getElementById('high').textContent = high; }
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('💀 Game Over', canvas.width/2, canvas.height/2 - 15);
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 20);
        }

        document.addEventListener('keydown', e => {
            if(e.key==='ArrowUp'||e.key==='w') go('up');
            if(e.key==='ArrowDown'||e.key==='s') go('down');
            if(e.key==='ArrowLeft'||e.key==='a') go('left');
            if(e.key==='ArrowRight'||e.key==='d') go('right');
        });

        init();
    </script>
</body>
</html>
