<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #fff; overflow-x: hidden; }
        h1 { margin: 10px 0; text-shadow: 0 0 10px #27ae60; }
        .info { display: flex; gap: 30px; margin-bottom: 10px; font-size: 1.2em; }
        .info span { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        canvas { border-radius: 15px; box-shadow: 0 0 30px rgba(39, 174, 96, 0.3), 0 10px 40px rgba(0,0,0,0.5); max-width: 100%; height: auto; touch-action: none; }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; background: linear-gradient(145deg, #27ae60, #1e8449); color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(39,174,96,0.4); transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .touch-btns { display: grid; grid-template-columns: repeat(3, 60px); gap: 8px; margin-top: 15px; }
        .touch-btn { width: 60px; height: 60px; font-size: 24px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; color: #fff; cursor: pointer; }
        .touch-btn:active { background: #27ae60; transform: scale(1.1); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; }
        .overlay.show { display: block; }
        .overlay h2 { font-size: 1.8em; margin-bottom: 10px; }
        .overlay p { font-size: 1.2em; margin-bottom: 15px; color: #aaa; }
        .speed-label { margin-top: 10px; font-size: 0.85em; color: #888; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;">← Back</a>
    <h1>🐍 Snake</h1>
    <div class="info"><span>Score: <b id="score">0</b></span><span>High: <b id="high">0</b></span></div>
    <div style="position:relative;display:inline-block;">
        <canvas id="game" width="300" height="300"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="overlay-title">💀 Game Over</h2>
            <p id="overlay-text">Score: 0</p>
            <button onclick="start()" aria-label="Restart game">🔄 Play Again</button>
        </div>
    </div>
    <div class="controls"><button onclick="start()" aria-label="Start game">▶️ Start</button><button onclick="pause()" aria-label="Pause game">⏸️ Pause</button></div>
    <div class="touch-btns">
        <div></div>
        <button class="touch-btn" onclick="go('up')" aria-label="Up">⬆️</button>
        <div></div>
        <button class="touch-btn" onclick="go('left')" aria-label="Left">⬅️</button>
        <button class="touch-btn" onclick="go('down')" aria-label="Down">⬇️</button>
        <button class="touch-btn" onclick="go('right')" aria-label="Right">➡️</button>
    </div>
    <div class="speed-label" id="speedLabel">Speed: 1x</div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const S = 20, G = 15;
        const BASE_SPEED = 100; // ms per tick
        let snake, dir, nextDir, food, score, high = 0, rafId, paused, over;
        let lastTick = 0, speed = BASE_SPEED;

        // Safe localStorage
        function loadHigh() { try { return parseInt(localStorage.getItem('snakeHigh')) || 0; } catch(e) { return 0; } }
        function saveHigh(v) { try { localStorage.setItem('snakeHigh', v); } catch(e) {} }

        high = loadHigh();
        document.getElementById('high').textContent = high;

        function init() {
            snake = [{x:7,y:7}];
            dir = {x:1,y:0};
            nextDir = {x:1,y:0};
            score = 0; paused = false; over = false;
            speed = BASE_SPEED;
            document.getElementById('score').textContent = 0;
            document.getElementById('speedLabel').textContent = 'Speed: 1x';
            overlay.classList.remove('show');
            spawn();
            draw();
        }

        function spawn() {
            let attempts = 0;
            do { food = {x:Math.floor(Math.random()*G), y:Math.floor(Math.random()*G)}; attempts++; } while(snake.some(s=>s.x===food.x&&s.y===food.y) && attempts < 200);
        }

        function draw() {
            const bg = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
            bg.addColorStop(0, '#1a1a3e');
            bg.addColorStop(1, '#0f0f23');
            ctx.fillStyle = bg;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for(let i=0;i<=G;i++){
                ctx.beginPath(); ctx.moveTo(i*S,0); ctx.lineTo(i*S,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i*S); ctx.lineTo(canvas.width,i*S); ctx.stroke();
            }

            // Food with glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e74c3c';
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(food.x*S+S/2, food.y*S+S/2, S/2-3, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Snake
            snake.forEach((s,i)=>{
                const g = ctx.createRadialGradient(s.x*S+S/2, s.y*S+S/2, 0, s.x*S+S/2, s.y*S+S/2, S/2);
                if(i===0){
                    g.addColorStop(0, '#5dade2');
                    g.addColorStop(1, '#2980b9');
                } else {
                    g.addColorStop(0, '#58d68d');
                    g.addColorStop(1, '#27ae60');
                }
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.roundRect(s.x*S+2, s.y*S+2, S-4, S-4, 5);
                ctx.fill();

                if(i===0){
                    ctx.fillStyle = '#fff';
                    // Eyes follow direction
                    const ex = dir.x * 2, ey = dir.y * 2;
                    ctx.beginPath();
                    ctx.arc(s.x*S+S/2-4+ex, s.y*S+S/2-3+ey, 3, 0, Math.PI*2);
                    ctx.arc(s.x*S+S/2+4+ex, s.y*S+S/2-3+ey, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(s.x*S+S/2-4+ex, s.y*S+S/2-3+ey, 1.5, 0, Math.PI*2);
                    ctx.arc(s.x*S+S/2+4+ex, s.y*S+S/2-3+ey, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            if(paused) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸️ Paused', canvas.width/2, canvas.height/2);
            }
        }

        function gameLoop(timestamp) {
            if(over) return;
            rafId = requestAnimationFrame(gameLoop);
            if(paused) return;
            
            if(timestamp - lastTick < speed) return;
            lastTick = timestamp;
            
            // Apply queued direction
            dir = nextDir;
            
            update();
            draw();
        }

        function update() {
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            
            if(head.x < 0 || head.x >= G || head.y < 0 || head.y >= G) { endGame(); return; }
            if(snake.some(s=>s.x===head.x && s.y===head.y)) { endGame(); return; }
            
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                // Speed up every 50 points
                const level = Math.floor(score / 50);
                speed = Math.max(40, BASE_SPEED - level * 8);
                document.getElementById('speedLabel').textContent = 'Speed: ' + (BASE_SPEED / speed).toFixed(1) + 'x';
                spawn();
            } else {
                snake.pop();
            }
        }

        function start() {
            cancelAnimationFrame(rafId);
            init();
            lastTick = 0;
            rafId = requestAnimationFrame(gameLoop);
        }

        function pause() {
            if(over) return;
            paused = !paused;
            if(!paused) lastTick = performance.now();
            draw();
        }

        function go(d) {
            if(d==='up' && dir.y!==1) nextDir={x:0,y:-1};
            if(d==='down' && dir.y!==-1) nextDir={x:0,y:1};
            if(d==='left' && dir.x!==1) nextDir={x:-1,y:0};
            if(d==='right' && dir.x!==-1) nextDir={x:1,y:0};
        }

        function endGame() {
            over = true;
            cancelAnimationFrame(rafId);
            if(score > high) {
                high = score;
                saveHigh(high);
                document.getElementById('high').textContent = high;
            }
            document.getElementById('overlay-title').textContent = score >= 200 ? '🏆 Amazing!' : '💀 Game Over';
            document.getElementById('overlay-text').textContent = 'Score: ' + score + (score >= high ? ' 🎉 New High!' : '');
            overlay.classList.add('show');
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if(e.key==='ArrowUp'||e.key==='w') { go('up'); e.preventDefault(); }
            if(e.key==='ArrowDown'||e.key==='s') { go('down'); e.preventDefault(); }
            if(e.key==='ArrowLeft'||e.key==='a') { go('left'); e.preventDefault(); }
            if(e.key==='ArrowRight'||e.key==='d') { go('right'); e.preventDefault(); }
            if(e.key===' ') { paused ? pause() : (over ? start() : start()); e.preventDefault(); }
            if(e.key==='p') pause();
        });

        // Swipe support
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});
        canvas.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx), absDy = Math.abs(dy);
            if(Math.max(absDx, absDy) < 20) return; // too small
            if(absDx > absDy) {
                go(dx > 0 ? 'right' : 'left');
            } else {
                go(dy > 0 ? 'down' : 'up');
            }
        }, {passive: true});

        init();
    </script>
</body>
</html>
