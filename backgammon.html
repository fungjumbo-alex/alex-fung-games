<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgammon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 100%); min-height: 100vh; color: #fff; padding: 50px 5px 10px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.3em; margin-bottom: 10px; }
        .status { color: #4a90d9; margin-bottom: 10px; font-size: 0.9em; }
        .game { display: flex; flex-direction: column; align-items: center; }
        .board { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: #5d4037; padding: 8px; border-radius: 8px; }
        .bar { display: flex; flex-direction: column; gap: 5px; margin: 0 5px; background: #3e2723; padding: 5px; border-radius: 4px; }
        .point { width: 28px; height: 100px; display: flex; flex-direction: column; align-items: center; padding: 2px; cursor: pointer; }
        .point.top { justify-content: flex-start; }
        .point.bottom { justify-content: flex-end; }
        .point:nth-child(odd) { background: #8d6e63; }
        .point:nth-child(even) { background: #4e342e; }
        .point.selected { box-shadow: inset 0 0 0 2px #4a90d9; }
        .checker { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
        .checker.white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); }
        .checker.black { background: radial-gradient(circle at 30% 30%, #444, #111); }
        .checker-count { font-size: 0.6em; color: #ffd700; font-weight: bold; }
        .dice-area { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .die { width: 35px; height: 35px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.2em; font-weight: bold; color: #333; }
        .die.used { opacity: 0.4; }
        .home { display: flex; gap: 2px; padding: 5px; background: #3e2723; border-radius: 4px; min-width: 35px; }
        button { padding: 8px 16px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; background: #4a90d9; color: white; }
        button:disabled { background: #555; }
        .info { display: flex; gap: 20px; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;">← Back</a>
    <h1>🎲 Backgammon</h1>
    <div class="status" id="status">Roll to start</div>
    <div class="game">
        <div style="display:flex;align-items:center">
            <div class="home" id="aiHome"></div>
            <div class="board" id="board"></div>
            <div class="bar" id="aiBar"></div>
        </div>
        <div class="dice-area">
            <div class="die" id="die1">?</div>
            <div class="die" id="die2">?</div>
            <button onclick="roll()" id="rollBtn">Roll</button>
        </div>
        <div style="display:flex;align-items:center">
            <div class="home" id="playerHome"></div>
            <div class="board" id="board2"></div>
            <div class="bar" id="playerBar"></div>
        </div>
    </div>
    <div class="info">
        <span>White: You (home: 0-5)</span>
        <span>Black: AI (home: 18-23)</span>
    </div>
    <button onclick="newGame()" style="margin-top:10px">New Game</button>
    
    <script>
        // Points: 0-23, 0-5 = player home, 18-23 = AI home
        let board = []; // point index -> [{color, count}]
        let bar = { white: 0, black: 0 };
        let home = { white: 0, black: 0 };
        let dice = [], usedDice = [];
        let currentPlayer = 'white'; // white = player
        let selectedPoint = null;
        let gameOver = false;
        let gameStarted = false;

        function init() {
            // Initial setup
            board = Array(24).fill(null).map(() => ({ white: 0, black: 0 }));
            board[0] = { white: 2, black: 0 };
            board[5] = { white: 0, black: 5 };
            board[7] = { white: 0, black: 3 };
            board[11] = { white: 5, black: 0 };
            board[12] = { white: 0, black: 5 };
            board[16] = { white: 3, black: 0 };
            board[18] = { white: 5, black: 0 };
            board[23] = { white: 0, black: 2 };
            
            bar = { white: 0, black: 0 };
            home = { white: 0, black: 0 };
            dice = [];
            usedDice = [];
            currentPlayer = 'white';
            selectedPoint = null;
            gameOver = false;
            gameStarted = false;
            document.getElementById('rollBtn').disabled = false;
            render();
        }

        function render() {
            // Top board (points 12-23, right to left for display)
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 12; i < 18; i++) {
                boardEl.innerHTML += renderPoint(i, 'top');
            }
            // Bar spacer
            for (let i = 18; i < 24; i++) {
                boardEl.innerHTML += renderPoint(i, 'top');
            }
            
            // Bottom board (points 11-0, left to right)
            const board2El = document.getElementById('board2');
            board2El.innerHTML = '';
            for (let i = 11; i >= 6; i--) {
                board2El.innerHTML += renderPoint(i, 'bottom');
            }
            for (let i = 5; i >= 0; i--) {
                board2El.innerHTML += renderPoint(i, 'bottom');
            }
            
            // Bars
            document.getElementById('playerBar').innerHTML = bar.white > 0 ? 
                `<div style="color:#fff">${bar.white} on bar</div>` : '';
            document.getElementById('aiBar').innerHTML = bar.black > 0 ? 
                `<div style="color:#888">${bar.black} on bar</div>` : '';
            
            // Homes
            document.getElementById('playerHome').innerHTML = home.white > 0 ? 
                Array(Math.min(home.white, 5)).fill('<div class="checker white"></div>').join('') : '';
            document.getElementById('aiHome').innerHTML = home.black > 0 ? 
                Array(Math.min(home.black, 5)).fill('<div class="checker black"></div>').join('') : '';
            
            // Dice
            document.getElementById('die1').textContent = dice[0] || '?';
            document.getElementById('die2').textContent = dice[1] || '?';
            document.getElementById('die1').className = 'die' + (usedDice.includes(0) ? ' used' : '');
            document.getElementById('die2').className = 'die' + (usedDice.includes(1) ? ' used' : '');
        }

        function renderPoint(idx, pos) {
            const p = board[idx];
            const color = p.white > 0 ? 'white' : (p.black > 0 ? 'black' : null);
            const count = p.white || p.black || 0;
            const sel = selectedPoint === idx ? 'selected' : '';
            
            return `<div class="point ${pos} ${sel}" onclick="clickPoint(${idx})">
                ${count > 0 ? `<div class="checker ${color}"></div>` : ''}
                ${count > 1 ? `<span class="checker-count">${count}</span>` : ''}
            </div>`;
        }

        function roll() {
            if (dice.length > 0 && usedDice.length < dice.length) return;

            gameStarted = true;
            dice = [Math.floor(Math.random() * 6) + 1, Math.floor(Math.random() * 6) + 1];
            if (dice[0] === dice[1]) dice = [dice[0], dice[0], dice[0], dice[0]]; // Doubles
            usedDice = [];
            
            document.getElementById('rollBtn').disabled = true;
            
            if (!hasValidMoves()) {
                document.getElementById('status').textContent = 'No valid moves - skipping';
                setTimeout(endTurn, 1000);
            } else {
                document.getElementById('status').textContent = currentPlayer === 'white' ? 'Your turn' : 'AI thinking...';
                if (currentPlayer === 'black') setTimeout(aiTurn, 500);
            }
            render();
        }

        function hasValidMoves() {
            const player = currentPlayer;
            if (bar[player] > 0) return canEnterFromBar();
            
            const available = usedDice.length < dice.length;
            return available;
        }

        function canEnterFromBar() {
            const player = currentPlayer;
            const entryStart = player === 'white' ? 18 : 0;
            
            for (let d of getAvailableDice()) {
                const target = player === 'white' ? 24 - d : d - 1;
                if (target >= entryStart && target < entryStart + 6) {
                    if (board[target][opponent(player)] <= 1) return true;
                }
            }
            return false;
        }

        function getAvailableDice() {
            return dice.filter((d, i) => !usedDice.includes(i));
        }

        function opponent(player) { return player === 'white' ? 'black' : 'white'; }

        function clickPoint(idx) {
            if (gameOver || currentPlayer !== 'white') return;
            
            const player = 'white';
            
            // Must enter from bar first
            if (bar[player] > 0) {
                if (tryEnterFromBar(idx)) return;
            }
            
            if (selectedPoint === null) {
                // Select
                if (board[idx][player] > 0) {
                    selectedPoint = idx;
                    render();
                }
            } else {
                // Try move
                if (tryMove(selectedPoint, idx)) {
                    selectedPoint = null;
                } else {
                    selectedPoint = board[idx][player] > 0 ? idx : null;
                }
                render();
            }
        }

        function tryEnterFromBar(targetIdx) {
            const player = currentPlayer;
            const entryPoints = player === 'white' ? 
                getAvailableDice().map(d => 24 - d) : 
                getAvailableDice().map(d => d - 1);
            
            if (!entryPoints.includes(targetIdx)) return false;
            
            const die = player === 'white' ? 24 - targetIdx : targetIdx + 1;
            const dieIdx = dice.findIndex((d, i) => d === die && !usedDice.includes(i));
            
            if (dieIdx < 0) return false;
            if (board[targetIdx][opponent(player)] > 1) return false;
            
            // Hit
            if (board[targetIdx][opponent(player)] === 1) {
                board[targetIdx][opponent(player)] = 0;
                bar[opponent(player)]++;
            }
            
            bar[player]--;
            board[targetIdx][player]++;
            usedDice.push(dieIdx);
            
            checkEndTurn();
            return true;
        }

        function tryMove(from, to) {
            const player = currentPlayer;
            const direction = player === 'white' ? -1 : 1;
            const dist = (to - from) * direction;
            
            if (dist <= 0) return false;
            
            // Check bearing off
            if ((player === 'white' && to < 0) || (player === 'black' && to > 23)) {
                return tryBearOff(from);
            }
            
            const dieIdx = dice.findIndex((d, i) => d === dist && !usedDice.includes(i));
            if (dieIdx < 0) return false;
            if (board[to][opponent(player)] > 1) return false;
            
            // Hit
            if (board[to][opponent(player)] === 1) {
                board[to][opponent(player)] = 0;
                bar[opponent(player)]++;
            }
            
            board[from][player]--;
            board[to][player]++;
            usedDice.push(dieIdx);
            
            checkEndTurn();
            return true;
        }

        function tryBearOff(from) {
            const player = currentPlayer;
            const homeStart = player === 'white' ? 0 : 18;
            const homeEnd = player === 'white' ? 5 : 23;
            
            // Check all checkers are in home
            for (let i = 0; i < 24; i++) {
                if (i >= homeStart && i <= homeEnd) continue;
                if (board[i][player] > 0) return false;
            }
            if (bar[player] > 0) return false;
            
            const dist = player === 'white' ? from + 1 : 24 - from;
            let dieIdx = dice.findIndex((d, i) => d === dist && !usedDice.includes(i));
            
            // Can use higher die if no checker further
            if (dieIdx < 0) {
                const higherDice = dice.filter((d, i) => d >= dist && !usedDice.includes(i));
                if (higherDice.length > 0) {
                    // Check no further checker exists
                    const further = player === 'white' ?
                        board.slice(from + 1, 6).some(p => p[player] > 0) :
                        board.slice(18, from).some(p => p[player] > 0);
                    if (!further) {
                        dieIdx = dice.findIndex((d, i) => d >= dist && !usedDice.includes(i));
                    }
                }
            }
            
            if (dieIdx < 0) return false;
            
            board[from][player]--;
            home[player]++;
            usedDice.push(dieIdx);
            
            if (home[player] === 15) {
                gameOver = true;
                document.getElementById('status').textContent = player === 'white' ? '🎉 You win!' : 'AI wins!';
            }
            
            checkEndTurn();
            return true;
        }

        function checkEndTurn() {
            if (usedDice.length >= dice.length || !hasValidMoves()) {
                endTurn();
            } else {
                document.getElementById('status').textContent = currentPlayer === 'white' ? 'Your turn' : 'AI thinking...';
                if (currentPlayer === 'black') setTimeout(aiTurn, 500);
            }
            render();
        }

        function endTurn() {
            currentPlayer = opponent(currentPlayer);
            dice = [];
            usedDice = [];
            selectedPoint = null;
            document.getElementById('rollBtn').disabled = false;
            document.getElementById('status').textContent = currentPlayer === 'white' ? 'Roll to move' : 'AI turn';
            if (currentPlayer === 'black') {
                document.getElementById('rollBtn').disabled = true;
                setTimeout(() => { roll(); }, 500);
            }
        }

        function aiTurn() {
            if (gameOver || currentPlayer !== 'black') return;
            
            // Simple AI: try to move
            const player = 'black';
            
            if (bar[player] > 0) {
                // Enter from bar
                const entries = getAvailableDice().map(d => d - 1).filter(t => board[t][player] <= 1);
                if (entries.length > 0) {
                    tryEnterFromBar(entries[0]);
                    return;
                }
            }
            
            // Find any valid move
            for (let from = 0; from < 24; from++) {
                if (board[from][player] <= 0) continue;
                
                for (let d of getAvailableDice()) {
                    const to = from + d;
                    if (to > 23) {
                        if (tryBearOff(from)) return;
                    } else if (board[to][player] <= 1) {
                        if (tryMove(from, to)) return;
                    }
                }
            }
            
            endTurn();
        }

        function newGame() {
            if (gameStarted && !confirm('Game is in progress. Start a new game? Current progress will be lost.')) return;
            init();
        }
        init();
    </script>
</body>
</html>
