<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #0f0; overflow-x:hidden;}
        h1 { margin: 10px 0; font-family: monospace; }
        .info { display: flex; gap: 20px; margin-bottom: 10px; font-family: monospace; }
        canvas { border: 2px solid #0f0; max-width:100%;height:auto;}
        .touch { display: flex; gap: 10px; margin-top: 10px; }
        .touch button { width: 60px; height: 60px; font-size: 24px; border: 2px solid #0f0; background: #000; color: #0f0; cursor: pointer; outline:none;}}
        .start-btn { padding: 12px 30px; font-size: 18px; border: 2px solid #0f0; background: #000; color: #0f0; font-family: monospace; cursor: pointer; margin-top: 10px; }
    button:focus-visible{outline:2px solid #fff;outline-offset:2px;}</style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;background:#4a90d9;color:#fff;padding:8px 15px;border-radius:5px;text-decoration:none;font-size:14px;z-index:9999;" aria-label="Back to games">← Back</a>
    <h1>👾 SPACE INVADERS</h1>
    <div class="info"><span>SCORE: <b id="score">0</b></span><span>LIVES: <b id="lives">3</b></span></div>
    <canvas style="touch-action:none;" id="game" width="320" height="400"></canvas>
    <button class="start-btn" id="startBtn" onclick="start()">▶️ START</button>
    <div class="touch">
        <button onclick="move(-1)">⬅️</button>
        <button onclick="shoot()">🔥</button>
        <button onclick="move(1)">➡️</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let player, bullets, aliens, alienDir, score, lives, over, running, lastShot;

        function init() {
            player = { x: 140, y: 370, w: 40, h: 20 };
            bullets = [];
            aliens = [];
            alienDir = 1;
            score = 0;
            lives = 3;
            over = false;
            running = false;
            lastShot = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('lives').textContent = 3;
            document.getElementById('startBtn').style.display = 'block';
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 8; c++) {
                    aliens.push({ x: 20 + c * 38, y: 30 + r * 35, w: 30, h: 20, alive: true });
                }
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Player
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillRect(player.x + 17, player.y - 10, 6, 10);
            
            // Aliens
            aliens.forEach(a => {
                if (a.alive) {
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(a.x, a.y, a.w, a.h);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(a.x + 5, a.y + 5, 5, 5);
                    ctx.fillRect(a.x + 20, a.y + 5, 5, 5);
                }
            });
            
            // Bullets
            ctx.fillStyle = '#ff0';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 10));
            
            // Start message
            if (!running && !over) {
                ctx.fillStyle = '#0f0';
                ctx.font = '20px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('Press START', canvas.width / 2, canvas.height / 2);
            }
        }

        function update() {
            if (!running || over) return;
            
            // Auto fire (every 10 frames)
            lastShot++;
            if (lastShot >= 10 && bullets.length < 3) {
                bullets.push({ x: player.x + player.w / 2 - 2, y: player.y - 10 });
                lastShot = 0;
            }
            
            // Move bullets
            bullets.forEach(b => b.y -= 8);
            bullets = bullets.filter(b => b.y > 0);
            
            // Move aliens
            let moveDown = false;
            aliens.forEach(a => {
                if (a.alive) {
                    a.x += alienDir * 1;
                    if (a.x <= 0 || a.x + a.w >= canvas.width) moveDown = true;
                }
            });
            
            if (moveDown) {
                alienDir *= -1;
                aliens.forEach(a => a.y += 15);
            }
            
            // Collision
            bullets.forEach(b => {
                aliens.forEach(a => {
                    if (a.alive && b.x > a.x && b.x < a.x + a.w && b.y > a.y && b.y < a.y + a.h) {
                        a.alive = false;
                        b.y = -100;
                        score += 10;
                        document.getElementById('score').textContent = score;
                    }
                });
            });
            
            // Alien reaches player
            if (aliens.some(a => a.alive && a.y + a.h >= player.y)) {
                endGame();
                return;
            }
            
            // Win
            if (aliens.every(a => !a.alive)) {
                running = false;
                over = true;
                ctx.fillStyle = 'rgba(0,255,0,0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                ctx.font = '24px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('🎉 YOU WIN!', canvas.width / 2, canvas.height / 2);
                ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 30);
                return;
            }
            
            draw();
            requestAnimationFrame(update);
        }

        function move(d) {
            if (over) return;
            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x + d * 25));
            if (!running) draw();
        }

        function shoot() {
            if (over || !running) return;
            if (bullets.length < 3) {
                bullets.push({ x: player.x + player.w / 2 - 2, y: player.y - 10 });
            }
        }

        function start() {
            if (running) return;
            init();
            running = true;
            document.getElementById('startBtn').style.display = 'none';
            update();
        }

        function endGame() {
            over = true;
            running = false;
            ctx.fillStyle = 'rgba(255,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '24px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 30);
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('startBtn').textContent = '🔄 PLAY AGAIN';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move(-1);
            if (e.key === 'ArrowRight') move(1);
            if (e.key === ' ') { e.preventDefault(); shoot(); }
        });

        init();
    </script>
</body>
</html>
